# Dependabot configuration — https://docs.github.com/code-security/dependabot
# Keeps each ecosystem's dependencies patched. PRs carry the release:*/area:*
# labels required by .github/workflows/pr-metadata.yml so they pass CI checks.
version: 2
updates:
  # JavaScript / TypeScript — pnpm workspace (root lockfile covers all packages)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "release:maintenance"
      - "area:release"
    ignore:
      # Expo SDK packages are version-locked to the installed Expo SDK and must be
      # upgraded together via `expo install` during an SDK bump — never piecemeal by
      # Dependabot (it proposes SDK-56 versions while apps/mobile is pinned to SDK 54,
      # which fails "Repo shape checks"). See apps/mobile/package.json.
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      # Major upgrades are handled deliberately (they need manual migration work),
      # not as routine auto-PRs — this is what stops the recurring major-bump churn.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust — Cargo workspace (root lockfile covers all crates)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "release:maintenance"
      - "area:release"
    ignore:
      # Major upgrades are handled deliberately, not as routine auto-PRs.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # 0.x crates with breaking changes that need a dedicated migration
      # (RustCrypto digest 0.11 generic-array → hybrid-array; see #688/#689/#713).
      - dependency-name: "hmac"
        versions: [">=0.13.0"]
      - dependency-name: "sha2"
        versions: [">=0.11.0"]
      - dependency-name: "rfd"
        versions: [">=0.16.0"]
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Python — server (uv-managed)
  - package-ecosystem: "uv"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "release:maintenance"
      - "area:server"
    ignore:
      # Major upgrades are handled deliberately, not as routine auto-PRs.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker — server image
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
    labels:
      - "release:maintenance"
      - "area:server"
    ignore:
      # Base-image major bumps must be verified by building/running the image,
      # which PR CI doesn't do — handle as a deliberate upgrade.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — workflow pinned actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "release:maintenance"
      - "area:release"
    groups:
      github-actions:
        patterns:
          - "*"
