name: Nightly Release Train

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to release. Defaults to main.
        required: false
        type: string
      only_surfaces:
        description: Exact comma-separated surfaces to release, or all. Defaults to detected changes since the previous train.
        required: false
        type: string
      version_bump:
        description: Public Proliferate version bump for this train.
        default: patch
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Plan only; do not push commits, tags, releases, or deploys.
        default: false
        required: false
        type: boolean

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write
  pull-requests: read

concurrency:
  group: nightly-release-train
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.meta.outputs.release_id }}
      base_sha: ${{ steps.meta.outputs.base_sha }}
      head_sha: ${{ steps.commit.outputs.head_sha }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      product_version: ${{ steps.artifacts.outputs.product_version }}
      product_tag: ${{ steps.artifacts.outputs.product_tag }}
      selected_surfaces: ${{ steps.detect.outputs.selected_surfaces }}
      server: ${{ steps.detect.outputs.server }}
      workers: ${{ steps.detect.outputs.workers }}
      e2b: ${{ steps.detect.outputs.e2b }}
      web: ${{ steps.detect.outputs.web }}
      mobile: ${{ steps.detect.outputs.mobile }}
      desktop: ${{ steps.detect.outputs.desktop }}
      runtime: ${{ steps.detect.outputs.runtime }}
      desktop_version: ${{ steps.artifacts.outputs.desktop_version }}
      runtime_version: ${{ steps.artifacts.outputs.runtime_version }}
      server_version: ${{ steps.artifacts.outputs.server_version }}
      desktop_tag: ${{ steps.artifacts.outputs.desktop_tag }}
      runtime_tag: ${{ steps.artifacts.outputs.runtime_tag }}
      server_tag: ${{ steps.artifacts.outputs.server_tag }}
      artifact_tags: ${{ steps.artifacts.outputs.artifact_tags }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve train metadata
        id: meta
        env:
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          git fetch origin main --tags --prune
          head_sha="$(git rev-parse HEAD)"
          release_id="release-$(date -u +%F)"
          previous_train="$(git tag --list 'release-*' --sort=-creatordate | grep -v "^$release_id$" | head -n 1 || true)"
          if [[ -n "$previous_train" ]]; then
            base_sha="$(git rev-parse "$previous_train")"
          else
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-list --max-parents=0 "$head_sha" | tail -n1)"
          fi
          if [[ -n "$INPUT_REF" && "$INPUT_REF" != "main" && "$DRY_RUN" != "true" ]]; then
            git merge-base --is-ancestor "$head_sha" refs/remotes/origin/main
          fi
          {
            echo "release_id=$release_id"
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
            echo "dry_run=$DRY_RUN"
          } >> "$GITHUB_OUTPUT"

      - name: Detect release surfaces
        id: detect
        run: >
          node scripts/ci-cd/detect-deploy-surfaces.mjs
          --base "${{ steps.meta.outputs.base_sha }}"
          --head "${{ steps.meta.outputs.head_sha }}"
          --only "$ONLY_SURFACES"
        env:
          ONLY_SURFACES: ${{ github.event.inputs.only_surfaces || '' }}

      - name: Prepare product and artifact versions
        id: artifacts
        run: >
          node scripts/ci-cd/prepare-artifact-release.mjs
          --surfaces "${{ steps.detect.outputs.selected_surfaces }}"
          --release-id "${{ steps.meta.outputs.release_id }}"
          --version-bump "${{ github.event.inputs.version_bump || 'patch' }}"
          --dry-run "${{ steps.meta.outputs.dry_run }}"

      - name: Verify version tags are free
        # Runs before the version-bump commit is pushed. desktop-v*/server-v*/
        # runtime-v*/proliferate-v* tags must be brand new — prepare-artifact-release
        # already picks the next version past every existing tag, so any of these
        # existing at all here means a real collision (e.g. a race with another
        # train), and we want that to abort before main gets a throwaway commit.
        if: steps.meta.outputs.dry_run != 'true' && steps.artifacts.outputs.product_tag != ''
        env:
          ARTIFACT_TAGS: ${{ steps.artifacts.outputs.artifact_tags }}
          PRODUCT_TAG: ${{ steps.artifacts.outputs.product_tag }}
        run: |
          set -euo pipefail
          tags="$PRODUCT_TAG"
          if [[ -n "$ARTIFACT_TAGS" ]]; then
            tags="$tags,$ARTIFACT_TAGS"
          fi
          node scripts/ci-cd/create-release-tags.mjs \
            --target pending \
            --tags "$tags" \
            --check-only true

      - name: Commit version bumps
        id: commit
        env:
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
          DRY_RUN: ${{ steps.meta.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet; then
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION apps/desktop/package.json apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml anyharness/sdk/package.json
          git commit -m "release: prepare $RELEASE_ID"
          git push origin HEAD:main
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release train tags
        if: steps.meta.outputs.dry_run != 'true' && steps.artifacts.outputs.product_tag != ''
        env:
          ARTIFACT_TAGS: ${{ steps.artifacts.outputs.artifact_tags }}
          PRODUCT_TAG: ${{ steps.artifacts.outputs.product_tag }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          set -euo pipefail
          tags="$PRODUCT_TAG,$RELEASE_ID"
          if [[ -n "$ARTIFACT_TAGS" ]]; then
            tags="$tags,$ARTIFACT_TAGS"
          fi
          # RELEASE_ID (release-YYYY-MM-DD) is a checkpoint marker, not a version
          # pointer: nightly-release-train.yml's own "Resolve train metadata" step
          # is its only reader, and it always excludes *today's* release_id when
          # picking the previous train tag. A same-day rerun should move it
          # forward to the new head, not fail the whole train.
          node scripts/ci-cd/create-release-tags.mjs \
            --target "${{ steps.commit.outputs.head_sha }}" \
            --tags "$tags" \
            --movable-tags "$RELEASE_ID" \
            --dry-run false

      - name: Summarize train
        run: |
          {
            echo "### Nightly release train"
            echo "- Product: \`${{ steps.artifacts.outputs.product_tag || 'no release' }}\`"
            echo "- Train: \`${{ steps.meta.outputs.release_id }}\`"
            echo "- Base: \`${{ steps.meta.outputs.base_sha }}\`"
            echo "- Head: \`${{ steps.commit.outputs.head_sha }}\`"
            echo "- Dry run: \`${{ steps.meta.outputs.dry_run }}\`"
            echo "- Selected surfaces: \`${{ steps.detect.outputs.selected_surfaces }}\`"
            echo "- Desktop: \`${{ steps.artifacts.outputs.desktop_tag }}\`"
            echo "- Runtime: \`${{ steps.artifacts.outputs.runtime_tag }}\`"
            echo "- Server: \`${{ steps.artifacts.outputs.server_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release-runtime:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.runtime == 'true' }}
    uses: ./.github/workflows/release-runtime.yml
    with:
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      version: ${{ needs.prepare.outputs.runtime_version }}
      dry_run: false
      publish: true
    secrets: inherit

  release-server:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.server == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/server-ci.yml
    with:
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      version: ${{ needs.prepare.outputs.server_version }}
      dry_run: false
      publish: true
    secrets: inherit

  release-desktop:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.desktop == 'true' }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release-desktop.yml
    with:
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      version: ${{ needs.prepare.outputs.desktop_version }}
      dry_run: false
      # Zero-touch auto-prod: publish the updater/download assets so existing
      # installs auto-update on every train. release-desktop.yml is not bound to a
      # GitHub Environment, so there is no approval gate on this step.
      publish_updater: true
      target_os: all
    secrets: inherit

  deploy-e2b:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-e2b.yml
    with:
      environment: staging
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.e2b == 'true' }}
      rolling_tag: staging
      mode: build_and_promote
    secrets: inherit

  deploy-server:
    needs: [prepare, deploy-e2b]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-server.yml
    with:
      environment: staging
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.server == 'true' }}
    secrets: inherit

  deploy-workers:
    needs: [prepare, deploy-server]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-workers.yml
    with:
      environment: staging
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.workers == 'true' }}
    secrets: inherit

  deploy-web:
    needs: [prepare, deploy-server]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-web.yml
    with:
      environment: staging
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.web == 'true' }}
    secrets: inherit

  deploy-mobile:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-mobile.yml
    with:
      environment: staging
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.mobile == 'true' }}
    secrets: inherit

  # ── Production promotion (zero-touch auto-prod) ───────────────────────────────
  # Each prod job promotes only after its staging counterpart deploys cleanly, so
  # the train still validates on staging first — but with no human approval step.
  # Targets the existing `Production` GitHub Environment (prod cluster, deploy
  # role, prod E2B template, secrets). The Environment's required-reviewer rule
  # must be removed for these to run unattended.

  deploy-e2b-prod:
    needs: [prepare, deploy-e2b]
    if: ${{ always() && needs.prepare.outputs.dry_run != 'true' && needs.deploy-e2b.result == 'success' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-e2b.yml
    with:
      environment: Production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.e2b == 'true' }}
      rolling_tag: production
      mode: build_and_promote
    secrets: inherit

  deploy-server-prod:
    needs: [prepare, deploy-server, deploy-e2b-prod]
    if: ${{ always() && needs.prepare.outputs.dry_run != 'true' && needs.deploy-server.result == 'success' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-server.yml
    with:
      environment: Production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.server == 'true' }}
    secrets: inherit

  deploy-workers-prod:
    needs: [prepare, deploy-workers, deploy-server-prod]
    if: ${{ always() && needs.prepare.outputs.dry_run != 'true' && needs.deploy-workers.result == 'success' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-workers.yml
    with:
      environment: Production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.workers == 'true' }}
    secrets: inherit

  deploy-web-prod:
    needs: [prepare, deploy-web, deploy-server-prod]
    if: ${{ always() && needs.prepare.outputs.dry_run != 'true' && needs.deploy-web.result == 'success' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-web.yml
    with:
      environment: Production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.web == 'true' }}
    secrets: inherit

  deploy-mobile-prod:
    needs: [prepare, deploy-mobile]
    if: ${{ always() && needs.prepare.outputs.dry_run != 'true' && needs.deploy-mobile.result == 'success' && needs.prepare.outputs.selected_surfaces != '' }}
    uses: ./.github/workflows/_deploy-mobile.yml
    with:
      environment: Production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.mobile == 'true' }}
    secrets: inherit

  publish-product-release:
    needs:
      - prepare
      - release-runtime
      - release-server
      - release-desktop
      - deploy-e2b
      - deploy-server
      - deploy-workers
      - deploy-web
      - deploy-mobile
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        needs.prepare.outputs.product_tag != '' &&
        needs.prepare.outputs.selected_surfaces != '' &&
        (
          needs.prepare.outputs.dry_run == 'true' ||
          (
            (needs.prepare.outputs.runtime != 'true' || needs.release-runtime.result == 'success') &&
            (needs.prepare.outputs.server != 'true' || (needs.release-server.result == 'success' && needs.deploy-server.result == 'success')) &&
            (needs.prepare.outputs.desktop != 'true' || needs.release-desktop.result == 'success') &&
            (needs.prepare.outputs.e2b != 'true' || needs.deploy-e2b.result == 'success') &&
            (needs.prepare.outputs.workers != 'true' || needs.deploy-workers.result == 'success') &&
            (needs.prepare.outputs.web != 'true' || needs.deploy-web.result == 'success') &&
            (needs.prepare.outputs.mobile != 'true' || needs.deploy-mobile.result == 'success')
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Publish product GitHub Release
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          node scripts/ci-cd/publish-product-release.mjs
          --kind nightly
          --release-tag "${{ needs.prepare.outputs.product_tag }}"
          --product-tag "${{ needs.prepare.outputs.product_tag }}"
          --release-id "${{ needs.prepare.outputs.release_id }}"
          --base "${{ needs.prepare.outputs.base_sha }}"
          --head "${{ needs.prepare.outputs.head_sha }}"
          --surfaces "${{ needs.prepare.outputs.selected_surfaces }}"
          --artifact-tags "${{ needs.prepare.outputs.artifact_tags }}"
          --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --repository "${{ github.repository }}"
          --body-out product-release.md
          --dry-run "${{ needs.prepare.outputs.dry_run }}"

      - name: Summarize product release page
        run: |
          {
            echo "### Product GitHub Release"
            echo "- Action: \`${{ steps.publish.outputs.release_action }}\`"
            echo "- Tag: \`${{ steps.publish.outputs.release_tag }}\`"
            echo "- URL: ${{ steps.publish.outputs.release_url }}"
            echo ""
            cat product-release.md
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs:
      - prepare
      - release-runtime
      - release-server
      - release-desktop
      - deploy-e2b
      - deploy-server
      - deploy-workers
      - deploy-web
      - deploy-mobile
      - deploy-e2b-prod
      - deploy-server-prod
      - deploy-workers-prod
      - deploy-web-prod
      - deploy-mobile-prod
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize results
        run: |
          {
            echo "### Nightly release train result"
            echo "- Product: \`${{ needs.prepare.outputs.product_tag || 'no release' }}\`"
            echo "- Train: \`${{ needs.prepare.outputs.release_id }}\`"
            echo "- Head: \`${{ needs.prepare.outputs.head_sha }}\`"
            echo "- Surfaces: \`${{ needs.prepare.outputs.selected_surfaces }}\`"
            echo "- Runtime release: \`${{ needs.release-runtime.result }}\`"
            echo "- Server release: \`${{ needs.release-server.result }}\`"
            echo "- Desktop release: \`${{ needs.release-desktop.result }}\`"
            echo "- E2B staging: \`${{ needs.deploy-e2b.result }}\`"
            echo "- Server staging: \`${{ needs.deploy-server.result }}\`"
            echo "- Workers staging: \`${{ needs.deploy-workers.result }}\`"
            echo "- Web staging: \`${{ needs.deploy-web.result }}\`"
            echo "- Mobile staging: \`${{ needs.deploy-mobile.result }}\`"
            echo "- E2B prod: \`${{ needs.deploy-e2b-prod.result }}\`"
            echo "- Server prod: \`${{ needs.deploy-server-prod.result }}\`"
            echo "- Workers prod: \`${{ needs.deploy-workers-prod.result }}\`"
            echo "- Web prod: \`${{ needs.deploy-web-prod.result }}\`"
            echo "- Mobile prod: \`${{ needs.deploy-mobile-prod.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
