name: Server CI

on:
  push:
    branches: [main]
    tags: ["server-v*"]
    paths: ["server/**", "pnpm-lock.yaml", "pnpm-workspace.yaml", ".github/workflows/server-ci.yml"]
  pull_request:
    paths: ["server/**", "pnpm-lock.yaml", "pnpm-workspace.yaml", ".github/workflows/server-ci.yml"]

defaults:
  run:
    working-directory: server

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build artifact runtime
        run: pnpm -C server/artifact-runtime build
        working-directory: .

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check proliferate/ tests/

      - name: Ruff format check
        run: ruff format --check proliferate/ tests/

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://proliferate:localdev@127.0.0.1:5432/proliferate
      JWT_SECRET: test-jwt-secret
      CLOUD_SECRET_KEY: test-cloud-secret
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build artifact runtime
        run: pnpm -C server/artifact-runtime build
        working-directory: .

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -xvs

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        if: github.ref == 'refs/heads/main'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/proliferate-server"
          TAGS=()

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            ECR_IMAGE="${{ steps.ecr.outputs.registry }}/proliferate-server"
            TAGS+=(
              "${ECR_IMAGE}:${GITHUB_SHA}"
              "${ECR_IMAGE}:latest"
              "${GHCR_IMAGE}:${GITHUB_SHA}"
              "${GHCR_IMAGE}:stable"
            )
          elif [[ "${GITHUB_REF}" == refs/tags/server-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/server-v}"
            TAGS+=("${GHCR_IMAGE}:${VERSION}")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  self-hosted-release-assets:
    runs-on: ubuntu-latest
    needs: [lint, test, docker]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/server-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
        working-directory: .

      - name: Install cross for aarch64
        run: cargo install cross --git https://github.com/cross-rs/cross
        working-directory: .

      - name: Build self-hosted Linux runtime (x86_64)
        run: cargo build --release --target x86_64-unknown-linux-musl -p anyharness
        working-directory: .

      - name: Build self-hosted Linux runtime (aarch64)
        run: cross build --release --target aarch64-unknown-linux-musl -p anyharness
        working-directory: .

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar czf artifacts/anyharness-x86_64-unknown-linux-musl.tar.gz \
            -C target/x86_64-unknown-linux-musl/release anyharness
          tar czf artifacts/anyharness-aarch64-unknown-linux-musl.tar.gz \
            -C target/aarch64-unknown-linux-musl/release anyharness
          cp server/infra/self-hosted-aws/template.yaml \
            artifacts/proliferate-self-hosted-aws-template.yaml
          sha256sum artifacts/anyharness-x86_64-unknown-linux-musl.tar.gz \
            artifacts/anyharness-aarch64-unknown-linux-musl.tar.gz \
            artifacts/proliferate-self-hosted-aws-template.yaml \
            > artifacts/self-hosted-assets.SHA256SUMS
        working-directory: .

      - name: Publish self-hosted release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/anyharness-x86_64-unknown-linux-musl.tar.gz
            artifacts/anyharness-aarch64-unknown-linux-musl.tar.gz
            artifacts/proliferate-self-hosted-aws-template.yaml
            artifacts/self-hosted-assets.SHA256SUMS
