name: Promote Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Staging-tested commit SHA or ref to promote.
        required: true
        type: string
      force_surfaces:
        description: Comma-separated surfaces to force, or all.
        required: false
        type: string
      require_staging_success:
        description: Require a successful Deploy Staging run for this exact SHA.
        default: true
        required: false
        type: boolean
      dry_run:
        description: Plan only; do not deploy.
        default: false
        required: false
        type: boolean

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: promote-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      base_sha: ${{ steps.detect.outputs.base_sha }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      server: ${{ steps.detect.outputs.server }}
      workers: ${{ steps.detect.outputs.workers }}
      e2b: ${{ steps.detect.outputs.e2b }}
      web: ${{ steps.detect.outputs.web }}
      mobile: ${{ steps.detect.outputs.mobile }}
      desktop: ${{ steps.detect.outputs.desktop }}
      runtime: ${{ steps.detect.outputs.runtime }}
      changed_files_count: ${{ steps.detect.outputs.changed_files_count }}
      summary_json: ${{ steps.detect.outputs.summary_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}

      - name: Resolve promote metadata
        id: meta
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          fallback="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-list --max-parents=0 "$head_sha" | tail -n1)"
          {
            echo "head_sha=$head_sha"
            echo "fallback_sha=$fallback"
            echo "dry_run=$DRY_RUN"
          } >> "$GITHUB_OUTPUT"
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Verify staging success
        if: ${{ github.event.inputs.require_staging_success == 'true' }}
        run: |
          set -euo pipefail
          count="$(
            gh run list \
              --workflow deploy-staging.yml \
              --commit "${{ steps.meta.outputs.head_sha }}" \
              --status success \
              --json databaseId \
              --jq 'length'
          )"
          if [[ "$count" == "0" ]]; then
            echo "No successful Deploy Staging run found for ${{ steps.meta.outputs.head_sha }}." >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve previous successful production deploy
        id: base
        run: >
          node scripts/ci-cd/resolve-deploy-base.mjs
          --workflow promote-production.yml
          --branch main
          --head "${{ steps.meta.outputs.head_sha }}"
          --fallback "${{ steps.meta.outputs.fallback_sha }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect deploy surfaces
        id: detect
        run: >
          node scripts/ci-cd/detect-deploy-surfaces.mjs
          --base "${{ steps.base.outputs.base_sha }}"
          --head "${{ steps.meta.outputs.head_sha }}"
          --force "$FORCE_SURFACES"
        env:
          FORCE_SURFACES: ${{ github.event.inputs.force_surfaces || '' }}

      - name: Summarize plan
        run: |
          {
            echo "### Production promote plan"
            echo "- Base: \`${{ steps.detect.outputs.base_sha }}\`"
            echo "- Head: \`${{ steps.detect.outputs.head_sha }}\`"
            echo "- Changed files: \`${{ steps.detect.outputs.changed_files_count }}\`"
            echo "- Dry run: \`${{ steps.meta.outputs.dry_run }}\`"
            echo ""
            echo "| Surface | Deploy |"
            echo "| --- | --- |"
            echo "| server | \`${{ steps.detect.outputs.server }}\` |"
            echo "| workers | \`${{ steps.detect.outputs.workers }}\` |"
            echo "| e2b | \`${{ steps.detect.outputs.e2b }}\` |"
            echo "| web | \`${{ steps.detect.outputs.web }}\` |"
            echo "| mobile | \`${{ steps.detect.outputs.mobile }}\` |"
            echo "| desktop | \`${{ steps.detect.outputs.desktop }}\` |"
            echo "| runtime | \`${{ steps.detect.outputs.runtime }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  promote-e2b:
    needs: [plan]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-e2b.yml
    with:
      environment: production
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.e2b == 'true' }}
      rolling_tag: production
      mode: ${{ github.event.inputs.require_staging_success == 'true' && 'promote_only' || 'build_and_promote' }}
    secrets: inherit

  deploy-server:
    needs: [plan, promote-e2b]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-server.yml
    with:
      environment: production
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.server == 'true' }}
    secrets: inherit

  deploy-workers:
    needs: [plan, deploy-server]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-workers.yml
    with:
      environment: production
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.workers == 'true' }}
    secrets: inherit

  deploy-web:
    needs: [plan, deploy-server]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-web.yml
    with:
      environment: production
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.web == 'true' }}
    secrets: inherit

  deploy-mobile:
    needs: [plan]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-mobile.yml
    with:
      environment: production
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.mobile == 'true' }}
    secrets: inherit

  deploy-desktop:
    needs: [plan]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_deploy-desktop.yml
    with:
      environment: production
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.desktop == 'true' }}
      dry_run: false
      publish_updater: true
    secrets: inherit

  summary:
    needs:
      - plan
      - promote-e2b
      - deploy-server
      - deploy-workers
      - deploy-web
      - deploy-mobile
      - deploy-desktop
    if: ${{ always() && needs.plan.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write promote summary artifact
        run: |
          set -euo pipefail
          mkdir -p deploy-summary
          cat > deploy-summary/production.json <<'JSON'
          ${{ needs.plan.outputs.summary_json }}
          JSON
          {
            echo "### Production promote result"
            echo "- Head: \`${{ needs.plan.outputs.head_sha }}\`"
            echo "- E2B: \`${{ needs.promote-e2b.result }}\`"
            echo "- Server: \`${{ needs.deploy-server.result }}\`"
            echo "- Workers: \`${{ needs.deploy-workers.result }}\`"
            echo "- Web: \`${{ needs.deploy-web.result }}\`"
            echo "- Mobile: \`${{ needs.deploy-mobile.result }}\`"
            echo "- Desktop: \`${{ needs.deploy-desktop.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-summary-production
          path: deploy-summary/production.json
