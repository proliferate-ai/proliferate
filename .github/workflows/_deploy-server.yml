name: Deploy Server

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      enabled:
        default: true
        type: boolean
    outputs:
      image_uri:
        value: ${{ jobs.deploy.outputs.image_uri }}
      task_definition_arn:
        value: ${{ jobs.deploy.outputs.task_definition_arn }}

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: ${{ inputs.enabled }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      task_definition_arn: ${{ steps.task.outputs.task_definition_arn }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      ECR_SERVER_REPOSITORY: ${{ vars.ECR_SERVER_REPOSITORY || 'proliferate-server' }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVER_SERVICE: ${{ vars.ECS_SERVER_SERVICE }}
      ECS_SERVER_CONTAINER_NAME: ${{ vars.ECS_SERVER_CONTAINER_NAME || 'server' }}
      # Background plane (optional): worker + Beat run the SAME image/SHA as the
      # API. When these service names are unset the background steps are skipped,
      # so environments without the plane still deploy the API unchanged.
      ECS_WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
      ECS_BEAT_SERVICE: ${{ vars.ECS_BEAT_SERVICE }}
      ECS_WORKER_CONTAINER_NAME: ${{ vars.ECS_WORKER_CONTAINER_NAME || 'worker' }}
      ECS_BEAT_CONTAINER_NAME: ${{ vars.ECS_BEAT_CONTAINER_NAME || 'beat' }}
      BACKGROUND_MQ_BROKER_ID: ${{ vars.BACKGROUND_MQ_BROKER_ID }}
      BACKGROUND_STORE_NAME: ${{ vars.BACKGROUND_STORE_NAME }}
      API_URL: ${{ vars.API_URL }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      WEB_URL: ${{ vars.WEB_URL }}
      API_HEALTH_PATH: ${{ vars.API_HEALTH_PATH || '/api/health' }}
      E2B_TEMPLATE_REF: ${{ vars.E2B_TEMPLATE_REF }}
      SUPPORT_REPORT_S3_BUCKET: ${{ vars.SUPPORT_REPORT_S3_BUCKET }}
      SUPPORT_REPORT_S3_PREFIX: ${{ vars.SUPPORT_REPORT_S3_PREFIX || 'support/reports' }}
      SUPPORT_REPORT_S3_REGION: ${{ vars.SUPPORT_REPORT_S3_REGION || vars.AWS_REGION || 'us-east-1' }}
      SUPPORT_REPORT_UPLOAD_URL_EXPIRES_SECONDS: ${{ vars.SUPPORT_REPORT_UPLOAD_URL_EXPIRES_SECONDS || '900' }}
      SUPPORT_REPORT_DIAGNOSTICS_MAX_BYTES: ${{ vars.SUPPORT_REPORT_DIAGNOSTICS_MAX_BYTES || '26214400' }}
      SUPPORT_REPORT_ATTACHMENT_MAX_BYTES: ${{ vars.SUPPORT_REPORT_ATTACHMENT_MAX_BYTES || '26214400' }}
      SUPPORT_REPORT_TOTAL_ATTACHMENT_MAX_BYTES: ${{ vars.SUPPORT_REPORT_TOTAL_ATTACHMENT_MAX_BYTES || '104857600' }}
      SUPPORT_REPORT_INTERNAL_BASE_URL: ${{ vars.SUPPORT_REPORT_INTERNAL_BASE_URL }}
      # Non-secret ARN of the environment's AWS Secrets Manager support-feed
      # record. ECS resolves its supportFeedToken field at runtime; the token
      # value is never read into this workflow.
      SUPPORT_FEED_SECRET_ARN: ${{ vars.SUPPORT_FEED_SECRET_ARN }}
      SUPPORT_TRACKER_ENABLED: ${{ vars.SUPPORT_TRACKER_ENABLED || 'false' }}
      SUPPORT_TRACKER_RECONCILER_INTERVAL_SECONDS: ${{ vars.SUPPORT_TRACKER_RECONCILER_INTERVAL_SECONDS || '30.0' }}
      SUPPORT_TRACKER_RECONCILER_BATCH_SIZE: ${{ vars.SUPPORT_TRACKER_RECONCILER_BATCH_SIZE || '10' }}
      SUPPORT_TRACKER_MAX_ATTEMPTS: ${{ vars.SUPPORT_TRACKER_MAX_ATTEMPTS || '8' }}
      SUPPORT_TRACKER_RETRY_BASE_SECONDS: ${{ vars.SUPPORT_TRACKER_RETRY_BASE_SECONDS || '60.0' }}
      SUPPORT_GITHUB_APP_ID: ${{ vars.SUPPORT_GITHUB_APP_ID }}
      SUPPORT_GITHUB_APP_PRIVATE_KEY: ${{ secrets.SUPPORT_GITHUB_APP_PRIVATE_KEY }}
      SUPPORT_GITHUB_APP_PRIVATE_KEY_PARAMETER_NAME: ${{ vars.SUPPORT_GITHUB_APP_PRIVATE_KEY_PARAMETER_NAME }}
      SUPPORT_GITHUB_APP_INSTALLATION_ID: ${{ vars.SUPPORT_GITHUB_APP_INSTALLATION_ID }}
      SUPPORT_GITHUB_OWNER: ${{ vars.SUPPORT_GITHUB_OWNER }}
      SUPPORT_GITHUB_REPO: ${{ vars.SUPPORT_GITHUB_REPO }}
      SUPPORT_GITHUB_LABEL_SUPPORT: ${{ vars.SUPPORT_GITHUB_LABEL_SUPPORT || 'support' }}
      SUPPORT_GITHUB_LABEL_PRIVATE: ${{ vars.SUPPORT_GITHUB_LABEL_PRIVATE || 'private-details' }}
      SUPPORT_LINEAR_API_KEY: ${{ secrets.SUPPORT_LINEAR_API_KEY }}
      SUPPORT_LINEAR_API_KEY_PARAMETER_NAME: ${{ vars.SUPPORT_LINEAR_API_KEY_PARAMETER_NAME }}
      SUPPORT_LINEAR_TEAM_ID: ${{ vars.SUPPORT_LINEAR_TEAM_ID }}
      SUPPORT_LINEAR_PROJECT_ID: ${{ vars.SUPPORT_LINEAR_PROJECT_ID }}
      SUPPORT_LINEAR_LABEL_IDS: ${{ vars.SUPPORT_LINEAR_LABEL_IDS }}
      SUPPORT_LINEAR_PRIVATE_DETAILS_LABEL_ID: ${{ vars.SUPPORT_LINEAR_PRIVATE_DETAILS_LABEL_ID }}
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      GIT_SHA: ${{ inputs.git_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.git_sha }}

      - name: Validate server deploy config
        run: |
          set -euo pipefail
          : "${AWS_DEPLOY_ROLE_ARN:?Set AWS_DEPLOY_ROLE_ARN on the GitHub environment.}"
          : "${ECS_CLUSTER:?Set ECS_CLUSTER on the GitHub environment.}"
          : "${ECS_SERVER_SERVICE:?Set ECS_SERVER_SERVICE on the GitHub environment.}"
          : "${API_URL:?Set API_URL on the GitHub environment.}"
          : "${API_BASE_URL:?Set API_BASE_URL on the GitHub environment.}"
          : "${WEB_URL:?Set WEB_URL on the GitHub environment.}"
          : "${E2B_TEMPLATE_REF:?Set E2B_TEMPLATE_REF on the GitHub environment.}"
          : "${SUPPORT_FEED_SECRET_ARN:?Set SUPPORT_FEED_SECRET_ARN on the GitHub environment.}"
          if [ "$SUPPORT_TRACKER_ENABLED" = "true" ]; then
            : "${SUPPORT_GITHUB_APP_ID:?Set SUPPORT_GITHUB_APP_ID when support tracker is enabled.}"
            : "${SUPPORT_GITHUB_APP_INSTALLATION_ID:?Set SUPPORT_GITHUB_APP_INSTALLATION_ID when support tracker is enabled.}"
            : "${SUPPORT_GITHUB_OWNER:?Set SUPPORT_GITHUB_OWNER when support tracker is enabled.}"
            : "${SUPPORT_GITHUB_REPO:?Set SUPPORT_GITHUB_REPO when support tracker is enabled.}"
          fi
          # Background plane fails CLOSED: it is either fully configured or fully
          # absent. Worker service, Beat service, and both container names must be
          # set together, otherwise a partial configuration would silently skip
          # the worker/Beat rollout while still rolling an API that can enqueue a
          # task no running worker imports. A missing container name defaults to a
          # non-empty literal above, so only the service names are the switch;
          # both must agree.
          background_config="${ECS_WORKER_SERVICE:+w}${ECS_BEAT_SERVICE:+b}"
          if [ -n "$background_config" ] && [ "$background_config" != "wb" ]; then
            echo "Partial background-plane configuration: ECS_WORKER_SERVICE='${ECS_WORKER_SERVICE}' ECS_BEAT_SERVICE='${ECS_BEAT_SERVICE}'." >&2
            echo "Set BOTH worker and Beat services (with their container names) to deploy the background plane, or NEITHER to skip it. Refusing to roll the API with a half-configured background plane." >&2
            exit 1
          fi
          if [ -n "$background_config" ]; then
            : "${ECS_WORKER_CONTAINER_NAME:?Set ECS_WORKER_CONTAINER_NAME for the background plane.}"
            : "${ECS_BEAT_CONTAINER_NAME:?Set ECS_BEAT_CONTAINER_NAME for the background plane.}"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Prove the environment's support-feed secret is reachable and carries the
      # supportFeedToken field before any ECS mutation, without resolving the
      # token into a shell variable or printing its value. The secret payload is
      # piped straight into jq; only a boolean field-presence result is used.
      - name: Verify support feed secret reference
        run: |
          set -euo pipefail
          if ! aws secretsmanager get-secret-value \
              --secret-id "$SUPPORT_FEED_SECRET_ARN" \
              --query SecretString \
              --output text \
            | jq -e 'type == "object" and (has("supportFeedToken"))
                     and (.supportFeedToken | type == "string")
                     and (.supportFeedToken | length > 0)' \
              >/dev/null; then
            echo "Support feed secret ${SUPPORT_FEED_SECRET_ARN} is missing, inaccessible, or has no supportFeedToken field." >&2
            exit 1
          fi
          echo "Support feed secret reference verified (field present; value not read)."

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image URI
        id: image
        run: |
          set -euo pipefail
          short_sha="${GIT_SHA:0:12}"
          image_uri="${{ steps.ecr.outputs.registry }}/${ECR_SERVER_REPOSITORY}:${short_sha}"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      # Version pins stamped into the image and reported by /health and /meta.
      # The canonical hosted release version is the root VERSION file, which must
      # agree with anyharness/sdk/package.json. Server, runtime, and worker pins
      # all use that canonical value: the worker/supervisor Cargo package version
      # is a stale `0.1.0` and must never become a hosted `/meta` pin. Desktop
      # keeps its own tracked package version.
      - name: Resolve version pins
        id: pins
        run: |
          set -euo pipefail
          server_version="$(cat VERSION)"
          runtime_version="$(jq -r '.version' anyharness/sdk/package.json)"
          if [ "$server_version" != "$runtime_version" ]; then
            echo "Canonical version mismatch: VERSION=${server_version} but anyharness/sdk/package.json=${runtime_version}. They must agree for hosted release pins." >&2
            exit 1
          fi
          canonical_version="$server_version"
          desktop_version="$(jq -r '.version' apps/desktop/package.json)"
          {
            echo "server_version=${canonical_version}"
            echo "desktop_version=${desktop_version}"
            echo "runtime_version=${canonical_version}"
            echo "worker_version=${canonical_version}"
            echo "min_desktop_version=${desktop_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_SERVER_REPOSITORY }}:${{ inputs.environment }}-latest
          build-args: |
            SERVER_VERSION=${{ steps.pins.outputs.server_version }}
            DESKTOP_VERSION=${{ steps.pins.outputs.desktop_version }}
            RUNTIME_VERSION=${{ steps.pins.outputs.runtime_version }}
            WORKER_VERSION=${{ steps.pins.outputs.worker_version }}
            MIN_DESKTOP_VERSION=${{ steps.pins.outputs.min_desktop_version }}

      # Resolve the IMMUTABLE digest reference for the image just pushed. The
      # mutable `repo:shortsha` tag can be re-pointed at a different image after
      # this deploy resolves it; pinning every task definition (API, worker, Beat)
      # to `repo@sha256:...` guarantees all three planes run the byte-identical
      # image this run built and that a later tag move cannot silently change what
      # a rolled service runs. The digest comes from the build/push output.
      - name: Resolve immutable image digest
        id: digest
        run: |
          set -euo pipefail
          digest="${{ steps.build.outputs.digest }}"
          case "$digest" in
            sha256:*) ;;
            *)
              echo "Build did not produce a sha256 image digest (got '${digest}'); refusing to pin a mutable tag." >&2
              exit 1
              ;;
          esac
          registry="${{ steps.ecr.outputs.registry }}"
          image_ref="${registry}/${ECR_SERVER_REPOSITORY}@${digest}"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"
          echo "Pinning task definitions to immutable ${image_ref}"

      - name: Render ECS task definition
        id: task
        run: |
          set -euo pipefail
          task_definition_arn="$(
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVER_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text
          )"
          test "$task_definition_arn" != "None"

          aws ecs describe-task-definition \
            --task-definition "$task_definition_arn" \
            --query taskDefinition \
            > task-definition.raw.json

          support_github_private_key_parameter="$SUPPORT_GITHUB_APP_PRIVATE_KEY_PARAMETER_NAME"
          if [ -z "$support_github_private_key_parameter" ] && [ "$SUPPORT_TRACKER_ENABLED" = "true" ]; then
            support_github_private_key_parameter="/proliferate/${DEPLOY_ENVIRONMENT}/support/github-app-private-key"
          fi
          support_linear_api_key_parameter="$SUPPORT_LINEAR_API_KEY_PARAMETER_NAME"
          if [ -z "$support_linear_api_key_parameter" ] && [ -n "$SUPPORT_LINEAR_TEAM_ID" ]; then
            support_linear_api_key_parameter="/proliferate/${DEPLOY_ENVIRONMENT}/support/linear-api-key"
          fi
          if [ -n "$SUPPORT_GITHUB_APP_PRIVATE_KEY" ] && [ -z "$support_github_private_key_parameter" ]; then
            echo "SUPPORT_GITHUB_APP_PRIVATE_KEY_PARAMETER_NAME is required when a GitHub private key is provided." >&2
            exit 1
          fi
          if [ -n "$SUPPORT_LINEAR_API_KEY" ] && [ -z "$support_linear_api_key_parameter" ]; then
            echo "SUPPORT_LINEAR_API_KEY_PARAMETER_NAME is required when a Linear API key is provided." >&2
            exit 1
          fi
          if [ -n "$SUPPORT_GITHUB_APP_PRIVATE_KEY" ]; then
            aws ssm put-parameter \
              --name "$support_github_private_key_parameter" \
              --type SecureString \
              --value "$SUPPORT_GITHUB_APP_PRIVATE_KEY" \
              --overwrite \
              >/dev/null
          fi
          if [ -n "$SUPPORT_LINEAR_API_KEY" ]; then
            aws ssm put-parameter \
              --name "$support_linear_api_key_parameter" \
              --type SecureString \
              --value "$SUPPORT_LINEAR_API_KEY" \
              --overwrite \
              >/dev/null
          fi

          server_version="$(cat VERSION)"
          short_sha="${GIT_SHA:0:12}"

          jq -n \
            --arg api_url "$API_URL" \
            --arg api_base "$API_BASE_URL" \
            --arg frontend "$WEB_URL" \
            --arg environment "$DEPLOY_ENVIRONMENT" \
            --arg e2b "$E2B_TEMPLATE_REF" \
            --arg git "$GIT_SHA" \
            --arg release "proliferate-server@${server_version}+${short_sha}" \
            --arg support_report_bucket "$SUPPORT_REPORT_S3_BUCKET" \
            --arg support_report_prefix "$SUPPORT_REPORT_S3_PREFIX" \
            --arg support_report_region "$SUPPORT_REPORT_S3_REGION" \
            --arg support_report_expires "$SUPPORT_REPORT_UPLOAD_URL_EXPIRES_SECONDS" \
            --arg support_report_diagnostics_max "$SUPPORT_REPORT_DIAGNOSTICS_MAX_BYTES" \
            --arg support_report_attachment_max "$SUPPORT_REPORT_ATTACHMENT_MAX_BYTES" \
            --arg support_report_total_attachment_max "$SUPPORT_REPORT_TOTAL_ATTACHMENT_MAX_BYTES" \
            --arg support_report_internal_base_url "$SUPPORT_REPORT_INTERNAL_BASE_URL" \
            --arg support_tracker_enabled "$SUPPORT_TRACKER_ENABLED" \
            --arg support_tracker_interval "$SUPPORT_TRACKER_RECONCILER_INTERVAL_SECONDS" \
            --arg support_tracker_batch_size "$SUPPORT_TRACKER_RECONCILER_BATCH_SIZE" \
            --arg support_tracker_max_attempts "$SUPPORT_TRACKER_MAX_ATTEMPTS" \
            --arg support_tracker_retry_base "$SUPPORT_TRACKER_RETRY_BASE_SECONDS" \
            --arg support_github_app_id "$SUPPORT_GITHUB_APP_ID" \
            --arg support_github_app_installation_id "$SUPPORT_GITHUB_APP_INSTALLATION_ID" \
            --arg support_github_owner "$SUPPORT_GITHUB_OWNER" \
            --arg support_github_repo "$SUPPORT_GITHUB_REPO" \
            --arg support_github_label_support "$SUPPORT_GITHUB_LABEL_SUPPORT" \
            --arg support_github_label_private "$SUPPORT_GITHUB_LABEL_PRIVATE" \
            --arg support_linear_team_id "$SUPPORT_LINEAR_TEAM_ID" \
            --arg support_linear_project_id "$SUPPORT_LINEAR_PROJECT_ID" \
            --arg support_linear_label_ids "$SUPPORT_LINEAR_LABEL_IDS" \
            --arg support_linear_private_details_label_id "$SUPPORT_LINEAR_PRIVATE_DETAILS_LABEL_ID" \
            '[
              {"name":"API_URL","value":$api_url},
              {"name":"API_BASE_URL","value":$api_base},
              {"name":"FRONTEND_BASE_URL","value":$frontend},
              {"name":"API_PATH_PREFIX","value":"/api"},
              {"name":"SANDBOX_PROVIDER","value":"e2b"},
              {"name":"E2B_TEMPLATE_NAME","value":$e2b},
              {"name":"SERVER_GIT_SHA","value":$git},
              {"name":"PROLIFERATE_TELEMETRY_MODE","value":"hosted_product"},
              {"name":"PROLIFERATE_REQUIRE_RELEASE_IDENTITY","value":"1"},
              {"name":"SENTRY_ENVIRONMENT","value":$environment},
              {"name":"SENTRY_RELEASE","value":$release},
              {"name":"CLOUD_RUNTIME_SENTRY_ENVIRONMENT","value":$environment},
              {"name":"CLOUD_TARGET_SENTRY_ENVIRONMENT","value":$environment},
              {"name":"SUPPORT_REPORT_S3_BUCKET","value":$support_report_bucket},
              {"name":"SUPPORT_REPORT_S3_PREFIX","value":$support_report_prefix},
              {"name":"SUPPORT_REPORT_S3_REGION","value":$support_report_region},
              {"name":"SUPPORT_REPORT_UPLOAD_URL_EXPIRES_SECONDS","value":$support_report_expires},
              {"name":"SUPPORT_REPORT_DIAGNOSTICS_MAX_BYTES","value":$support_report_diagnostics_max},
              {"name":"SUPPORT_REPORT_ATTACHMENT_MAX_BYTES","value":$support_report_attachment_max},
              {"name":"SUPPORT_REPORT_TOTAL_ATTACHMENT_MAX_BYTES","value":$support_report_total_attachment_max},
              {"name":"SUPPORT_REPORT_INTERNAL_BASE_URL","value":$support_report_internal_base_url},
              {"name":"SUPPORT_TRACKER_ENABLED","value":$support_tracker_enabled},
              {"name":"SUPPORT_TRACKER_RECONCILER_INTERVAL_SECONDS","value":$support_tracker_interval},
              {"name":"SUPPORT_TRACKER_RECONCILER_BATCH_SIZE","value":$support_tracker_batch_size},
              {"name":"SUPPORT_TRACKER_MAX_ATTEMPTS","value":$support_tracker_max_attempts},
              {"name":"SUPPORT_TRACKER_RETRY_BASE_SECONDS","value":$support_tracker_retry_base},
              {"name":"SUPPORT_GITHUB_APP_ID","value":$support_github_app_id},
              {"name":"SUPPORT_GITHUB_APP_INSTALLATION_ID","value":$support_github_app_installation_id},
              {"name":"SUPPORT_GITHUB_OWNER","value":$support_github_owner},
              {"name":"SUPPORT_GITHUB_REPO","value":$support_github_repo},
              {"name":"SUPPORT_GITHUB_LABEL_SUPPORT","value":$support_github_label_support},
              {"name":"SUPPORT_GITHUB_LABEL_PRIVATE","value":$support_github_label_private},
              {"name":"SUPPORT_LINEAR_TEAM_ID","value":$support_linear_team_id},
              {"name":"SUPPORT_LINEAR_PROJECT_ID","value":$support_linear_project_id},
              {"name":"SUPPORT_LINEAR_LABEL_IDS","value":$support_linear_label_ids},
              {"name":"SUPPORT_LINEAR_PRIVATE_DETAILS_LABEL_ID","value":$support_linear_private_details_label_id}
            ]' > env-updates.json

          # The support-feed bearer token is always projected as exactly one ECS
          # secret referencing the environment's supportFeedToken field. It is
          # listed first and unconditionally; the render/assert jq below strips
          # any inherited plaintext duplicate and rejects a missing/duplicated
          # reference before registration.
          jq -n \
            --arg support_feed_secret_arn "$SUPPORT_FEED_SECRET_ARN" \
            --arg support_github_private_key_parameter "$support_github_private_key_parameter" \
            --arg support_linear_api_key_parameter "$support_linear_api_key_parameter" \
            '[
              {
                "name":"SUPPORT_FEED_BEARER_TOKEN",
                "valueFrom":($support_feed_secret_arn + ":supportFeedToken::")
              },
              (
                if $support_github_private_key_parameter == "" then empty else
                {
                  "name":"SUPPORT_GITHUB_APP_PRIVATE_KEY",
                  "valueFrom":$support_github_private_key_parameter
                }
                end
              ),
              (
                if $support_linear_api_key_parameter == "" then empty else
                {
                  "name":"SUPPORT_LINEAR_API_KEY",
                  "valueFrom":$support_linear_api_key_parameter
                }
                end
              )
            ]' > secret-updates.json

          # The render (MERGE_JQ) and fail-closed check (ASSERT_JQ) are pure
          # JSON->JSON programs with no AWS dependency. They are written to files
          # verbatim so server/tests/integration/test_support_feed.py can extract
          # and exercise the exact logic that runs here. Keep the heredoc
          # sentinels (MERGE_JQ / ASSERT_JQ) stable; the test greps for them.
          cat > merge-task.jq <<'MERGE_JQ'
          def merge_environment($updates):
            (.environment // []) as $current
            | ($updates[0] | map(.name)) as $updated_names
            | ["SUPPORT_GITHUB_APP_PRIVATE_KEY", "SUPPORT_LINEAR_API_KEY", "SUPPORT_FEED_BEARER_TOKEN"] as $secret_names
            # Stale runtime-identity overrides the server never re-authors. The
            # task definition is merged from the previous revision, so dropping
            # our own assignments is not enough: any inherited copy must be
            # stripped here or it survives forever. Kept in lockstep with the
            # ASSERT_JQ forbidden-name check below.
            | ["SERVER_VERSION", "ANYHARNESS_VERSION", "ANYHARNESS_GIT_SHA", "E2B_TEMPLATE_VERSION", "CLOUD_RUNTIME_SENTRY_RELEASE", "CLOUD_TARGET_SENTRY_RELEASE", "E2B_RUNTIME_SENTRY_RELEASE"] as $forbidden_names
            | ($current | map(select(
                .name as $name
                | ($updated_names | index($name) | not)
                and ($secret_names | index($name) | not)
                and ($forbidden_names | index($name) | not)
              ))) + $updates[0];

          def merge_secrets($updates):
            (.secrets // []) as $current
            | ($updates[0] | map(.name)) as $updated_names
            | ($current | map(select(.name as $name | ($updated_names | index($name) | not)))) + $updates[0];

          del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )
          | .containerDefinitions |= map(
              if .name == $container then
                .image = $image
                | .environment = merge_environment($updates)
                | .secrets = merge_secrets($secret_updates)
              else
                .
              end
            )
          MERGE_JQ

          cat > assert-task.jq <<'ASSERT_JQ'
          def feed_secrets($c): [ $c.secrets[]? | select(.name == "SUPPORT_FEED_BEARER_TOKEN") ];
          def feed_plain($c): [ $c.environment[]? | select(.name == "SUPPORT_FEED_BEARER_TOKEN") ];
          def forbidden_names: ["SERVER_VERSION", "ANYHARNESS_VERSION", "ANYHARNESS_GIT_SHA", "E2B_TEMPLATE_VERSION", "CLOUD_RUNTIME_SENTRY_RELEASE", "CLOUD_TARGET_SENTRY_RELEASE", "E2B_RUNTIME_SENTRY_RELEASE"];
          def stale_vars($c): [ $c.environment[]? | select(.name as $n | forbidden_names | index($n)) ];
          def strict_identity($c): [ $c.environment[]? | select(.name == "PROLIFERATE_REQUIRE_RELEASE_IDENTITY" and .value == "1") ];
          ([ .containerDefinitions[] | select(.name == $container) ]) as $matches
          | if ($matches | length) != 1 then
              error("expected exactly one \($container) container, found \($matches | length)")
            else . end
          | $matches[0] as $c
          | (feed_secrets($c)) as $secrets
          | (feed_plain($c)) as $plain
          | (stale_vars($c)) as $stale
          | (strict_identity($c)) as $strict
          | if ($secrets | length) != 1 then
              error("expected exactly one SUPPORT_FEED_BEARER_TOKEN ECS secret, found \($secrets | length)")
            elif ($plain | length) != 0 then
              error("SUPPORT_FEED_BEARER_TOKEN must not be present as a plaintext environment entry")
            elif (($secrets[0].valueFrom // "") | startswith("arn:aws:secretsmanager:") | not) then
              error("SUPPORT_FEED_BEARER_TOKEN must reference a Secrets Manager secret ARN")
            elif (($secrets[0].valueFrom // "") | endswith(":supportFeedToken::") | not) then
              error("SUPPORT_FEED_BEARER_TOKEN must project the supportFeedToken field")
            elif ($stale | length) != 0 then
              error("stale runtime-identity variables must not remain: \($stale | map(.name) | join(", "))")
            elif ($strict | length) != 1 then
              error("PROLIFERATE_REQUIRE_RELEASE_IDENTITY=1 must be set for strict hosted release identity")
            else empty end
          ASSERT_JQ

          jq \
            --arg container "$ECS_SERVER_CONTAINER_NAME" \
            --arg image "${{ steps.digest.outputs.image_ref }}" \
            --slurpfile updates env-updates.json \
            --slurpfile secret_updates secret-updates.json \
            -f merge-task.jq \
            task-definition.raw.json > task-definition.json

          # Fail closed before register-task-definition: exactly one secret-backed
          # SUPPORT_FEED_BEARER_TOKEN, no plaintext duplicate, correct field ref.
          jq \
            --arg container "$ECS_SERVER_CONTAINER_NAME" \
            -f assert-task.jq \
            task-definition.json > /dev/null

          # Fail closed unless the server container is pinned to an IMMUTABLE
          # digest (`repo@sha256:...`), never a mutable tag. A mutable tag could be
          # re-pointed after this deploy resolves it, so a rolled service would run
          # a different image than this run built.
          server_image="$(
            jq -r --arg container "$ECS_SERVER_CONTAINER_NAME" \
              'first(.containerDefinitions[] | select(.name == $container) | .image)' \
              task-definition.json
          )"
          case "$server_image" in
            *@sha256:*) ;;
            *)
              echo "Server container image '${server_image}' is not an immutable @sha256: digest reference; refusing to register a mutable tag." >&2
              exit 1
              ;;
          esac

          new_task_definition_arn="$(
            aws ecs register-task-definition \
              --cli-input-json file://task-definition.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          echo "task_definition_arn=$new_task_definition_arn" >> "$GITHUB_OUTPUT"

      - name: Run Alembic migrations
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVER_SERVICE" \
            > service.json
          network_configuration="$(
            jq -c '{
              awsvpcConfiguration: {
                subnets: .services[0].networkConfiguration.awsvpcConfiguration.subnets,
                securityGroups: (.services[0].networkConfiguration.awsvpcConfiguration.securityGroups // []),
                assignPublicIp: (.services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp // "DISABLED")
              }
            }' service.json
          )"
          overrides="$(
            jq -n --arg container "$ECS_SERVER_CONTAINER_NAME" '{
              containerOverrides: [
                {
                  name: $container,
                  command: ["alembic", "upgrade", "head"]
                }
              ]
            }'
          )"
          migration_task="$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --launch-type FARGATE \
              --task-definition "${{ steps.task.outputs.task_definition_arn }}" \
              --network-configuration "$network_configuration" \
              --overrides "$overrides" \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          test "$migration_task" != "None"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$migration_task"
          exit_code="$(
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$migration_task" \
              --query "tasks[0].containers[?name=='${ECS_SERVER_CONTAINER_NAME}'].exitCode | [0]" \
              --output text
          )"
          if [[ "$exit_code" != "0" ]]; then
            aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$migration_task"
            exit 1
          fi

      # ── Background plane deploy order ──
      # Contract: migrations (above) -> verify broker/store -> deploy worker+Beat
      # from the candidate image -> verify worker/Beat health -> deploy API from
      # the same image (below). This prevents rolling an API that enqueues a task
      # name no running worker can import.

      - name: Verify broker and scheduler store
        if: ${{ env.ECS_WORKER_SERVICE != '' && env.ECS_BEAT_SERVICE != '' }}
        run: |
          set -euo pipefail
          if [ -n "$BACKGROUND_MQ_BROKER_ID" ]; then
            broker_state="$(
              aws mq describe-broker --broker-id "$BACKGROUND_MQ_BROKER_ID" \
                --query 'BrokerState' --output text
            )"
            if [ "$broker_state" != "RUNNING" ]; then
              echo "Amazon MQ broker ${BACKGROUND_MQ_BROKER_ID} is ${broker_state}, expected RUNNING." >&2
              exit 1
            fi
            echo "Broker ${BACKGROUND_MQ_BROKER_ID} is RUNNING."
          else
            echo "BACKGROUND_MQ_BROKER_ID unset; skipping broker state check."
          fi
          if [ -n "$BACKGROUND_STORE_NAME" ]; then
            store_status="$(
              aws elasticache describe-serverless-caches \
                --serverless-cache-name "$BACKGROUND_STORE_NAME" \
                --query 'ServerlessCaches[0].Status' --output text
            )"
            if [ "$store_status" != "available" ]; then
              echo "Scheduler store ${BACKGROUND_STORE_NAME} is ${store_status}, expected available." >&2
              exit 1
            fi
            echo "Scheduler store ${BACKGROUND_STORE_NAME} is available."
          else
            echo "BACKGROUND_STORE_NAME unset; skipping store status check."
          fi

      - name: Deploy worker and Beat from candidate image
        id: background
        if: ${{ env.ECS_WORKER_SERVICE != '' && env.ECS_BEAT_SERVICE != '' }}
        run: |
          set -euo pipefail
          # Re-image a celery service in place: take its current task definition,
          # swap only the container image to the candidate, register, and roll.
          # Environment/secrets are Terraform-owned and left intact. The candidate
          # is the IMMUTABLE digest reference (same `repo@sha256:...` the API roll
          # pins), so worker/Beat run the byte-identical image as the API and a
          # later tag move cannot change what they run.
          candidate_image="${{ steps.digest.outputs.image_ref }}"
          case "$candidate_image" in
            *@sha256:*) ;;
            *)
              echo "Candidate image '${candidate_image}' is not an immutable @sha256: digest reference; refusing to roll a mutable tag." >&2
              exit 1
              ;;
          esac
          roll_service() {
            service="$1"; container="$2"
            current_arn="$(
              aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$service" \
                --query 'services[0].taskDefinition' --output text
            )"
            test "$current_arn" != "None"
            aws ecs describe-task-definition --task-definition "$current_arn" \
              --query taskDefinition > "td-${container}.raw.json"
            # Fail closed if the named container does not match exactly one
            # definition: a wrong ECS_*_CONTAINER_NAME would otherwise rewrite
            # nothing, register the OLD image, and still report success.
            match_count="$(
              jq --arg container "$container" \
                '[.containerDefinitions[] | select(.name == $container)] | length' \
                "td-${container}.raw.json"
            )"
            if [ "$match_count" != "1" ]; then
              echo "Expected exactly one '${container}' container in ${service}'s task definition, found ${match_count}." >&2
              exit 1
            fi
            jq \
              --arg container "$container" \
              --arg image "$candidate_image" '
              del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
              | .containerDefinitions |= map(
                  if .name == $container then .image = $image else . end
                )
            ' "td-${container}.raw.json" > "td-${container}.json"
            # Assert the rewritten definition carries the candidate image on the
            # named container before registration.
            rewritten_image="$(
              jq -r --arg container "$container" \
                'first(.containerDefinitions[] | select(.name == $container) | .image)' \
                "td-${container}.json"
            )"
            if [ "$rewritten_image" != "$candidate_image" ]; then
              echo "Container '${container}' image is '${rewritten_image}', expected candidate '${candidate_image}'." >&2
              exit 1
            fi
            new_arn="$(
              aws ecs register-task-definition --cli-input-json "file://td-${container}.json" \
                --query 'taskDefinition.taskDefinitionArn' --output text
            )"
            # Confirm the REGISTERED revision (not just the local file) carries the
            # candidate image on exactly the named container.
            registered_image="$(
              aws ecs describe-task-definition --task-definition "$new_arn" \
                --query "taskDefinition.containerDefinitions[?name=='${container}'].image | [0]" \
                --output text
            )"
            if [ "$registered_image" != "$candidate_image" ]; then
              echo "Registered ${service} task def ${new_arn} carries image '${registered_image}', expected '${candidate_image}'." >&2
              exit 1
            fi
            aws ecs update-service --cluster "$ECS_CLUSTER" --service "$service" \
              --task-definition "$new_arn" --force-new-deployment > /dev/null
            echo "$new_arn"
          }
          worker_arn="$(roll_service "$ECS_WORKER_SERVICE" "$ECS_WORKER_CONTAINER_NAME")"
          beat_arn="$(roll_service "$ECS_BEAT_SERVICE" "$ECS_BEAT_CONTAINER_NAME")"
          {
            echo "worker_task_definition_arn=$worker_arn"
            echo "beat_task_definition_arn=$beat_arn"
          } >> "$GITHUB_OUTPUT"

      - name: Verify worker and Beat health
        if: ${{ env.ECS_WORKER_SERVICE != '' && env.ECS_BEAT_SERVICE != '' }}
        run: |
          set -euo pipefail
          # The live service must run the SAME immutable digest the roll pinned.
          candidate_image="${{ steps.digest.outputs.image_ref }}"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_WORKER_SERVICE" "$ECS_BEAT_SERVICE"
          # (service, container) pairs so each running task def is checked against
          # its own container name.
          set -- \
            "$ECS_WORKER_SERVICE:$ECS_WORKER_CONTAINER_NAME" \
            "$ECS_BEAT_SERVICE:$ECS_BEAT_CONTAINER_NAME"
          for pair in "$@"; do
            service="${pair%%:*}"; container="${pair#*:}"
            running="$(
              aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$service" \
                --query 'services[0].runningCount' --output text
            )"
            if [ "$running" -lt 1 ]; then
              echo "Service $service has runningCount=$running after stabilizing." >&2
              exit 1
            fi
            # The API must not roll until the worker/Beat the service ACTUALLY
            # runs carry the candidate image. Read the service's live task
            # definition and assert the named container's image before proceeding.
            live_arn="$(
              aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$service" \
                --query 'services[0].taskDefinition' --output text
            )"
            live_image="$(
              aws ecs describe-task-definition --task-definition "$live_arn" \
                --query "taskDefinition.containerDefinitions[?name=='${container}'].image | [0]" \
                --output text
            )"
            if [ "$live_image" != "$candidate_image" ]; then
              echo "Service $service is running task def ${live_arn} with image '${live_image}', expected candidate '${candidate_image}' before the API roll." >&2
              exit 1
            fi
            echo "Service $service healthy (runningCount=$running) on candidate image."
          done

      # ── Candidate-plane execution proof (fails closed) ──
      # ECS resource health only proves containers are RUNNING. It does NOT prove
      # the candidate worker/Beat can actually EXECUTE newly enqueued work: broker
      # credentials, task routing, worker task-registry import, RedBeat scheduler
      # state, and relay publish/consume could all be broken while runningCount is
      # green. This step proves execution end-to-end before the API rolls:
      #   1. enqueue ONE deterministic committed health no-op via a one-off task
      #      on the candidate worker task definition; then
      #   2. observe, via the plane's own CloudWatch metrics, BOTH a fresh relay
      #      heartbeat advance (Beat dispatched background.relay -> a worker ran it
      #      -> RedBeat/store and broker are reachable) AND a fresh health-no-op
      #      task SUCCESS (the newly enqueued row was relayed, published, routed,
      #      consumed, and executed by the candidate worker).
      # Both signals are custom metrics lifted from the server log group
      # (namespace Proliferate/Background/<env>), so this gate references NO broker
      # or scheduler-store RESOURCE ID. The identical proof therefore covers both
      # the managed-AWS-IDs path and the external-endpoint / no-resource-ID rebind
      # path — it measures the app reaching whatever endpoints are configured, not
      # the presence of a managed resource. On timeout it FAILS CLOSED so the API
      # never rolls against a plane that cannot execute the tasks it will enqueue.
      # CANDIDATE_PROOF_TIMEOUT_SECONDS / CANDIDATE_PROOF_POLL_SECONDS are
      # overridable (the deploy-definition tests shrink them to drive the loop).
      - name: Prove candidate plane executes enqueued work
        if: ${{ env.ECS_WORKER_SERVICE != '' && env.ECS_BEAT_SERVICE != '' }}
        run: |
          set -euo pipefail
          namespace="Proliferate/Background/${DEPLOY_ENVIRONMENT}"
          # Server log group carries both the enqueue receipt line and the
          # worker's exact-ID execution receipt. Derived from the environment
          # name (no broker/store resource ID), overridable for tests.
          log_group="${CANDIDATE_PROOF_LOG_GROUP:-/ecs/proliferate-server-${DEPLOY_ENVIRONMENT}}"
          # GITHUB_RUN_ATTEMPT is part of the key so a workflow RERUN enqueues a
          # FRESH outbox row instead of colliding (by idempotency key) with the
          # previous attempt's already-published row and false-passing on a stale
          # receipt. Each attempt must prove ITS OWN newly enqueued row executed.
          proof_key="deploy-${GIT_SHA}-${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-1}"
          timeout_seconds="${CANDIDATE_PROOF_TIMEOUT_SECONDS:-300}"
          poll_seconds="${CANDIDATE_PROOF_POLL_SECONDS:-15}"

          iso_from_epoch() {
            # GNU (ubuntu CI) then BSD (local test) form.
            date -u -d "@$1" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
              || date -u -r "$1" +%Y-%m-%dT%H:%M:%SZ
          }
          # Latest per-period Sum for a metric since the proof boundary, printed
          # as a plain number (0 when CloudWatch has no datapoint yet / "None").
          metric_latest_sum() {
            metric_name="$1"; shift
            start_iso="$(iso_from_epoch "$proof_start_epoch")"
            end_iso="$(iso_from_epoch "$(date -u +%s)")"
            raw="$(
              aws cloudwatch get-metric-statistics \
                --namespace "$namespace" \
                --metric-name "$metric_name" \
                --start-time "$start_iso" \
                --end-time "$end_iso" \
                --period 60 \
                --statistics Sum \
                "$@" \
                --query 'sort_by(Datapoints, &Timestamp)[-1].Sum' \
                --output text 2>/dev/null || echo None
            )"
            if [ -z "$raw" ] || [ "$raw" = "None" ]; then
              echo 0
            else
              echo "$raw"
            fi
          }
          ge_one() { awk -v v="$1" 'BEGIN { exit !(v + 0 >= 1) }'; }

          # Recover THIS deploy's exact outbox id from the enqueue receipt line
          # (`enqueued_health_noop outbox_id=<uuid> idempotency_key=<proof_key>`).
          # The one-off enqueue task runs on ECS, so its stdout lands in the
          # server log group; filtering on the deterministic proof_key isolates
          # this deploy's row even if a concurrent deploy enqueued its own.
          recover_outbox_id() {
            start_ms="$(( proof_start_epoch * 1000 ))"
            aws logs filter-log-events \
              --log-group-name "$log_group" \
              --start-time "$start_ms" \
              --filter-pattern "\"enqueued_health_noop\" \"idempotency_key=${proof_key}\"" \
              --query 'events[].message' \
              --output text 2>/dev/null \
              | grep -oE 'outbox_id=[0-9a-fA-F-]+' \
              | head -n1 \
              | cut -d= -f2
          }
          # Count fresh EXACT-ID execution receipts for a given task id. The relay
          # sets the celery task_id equal to the outbox id, so the worker's
          # `background_health_receipt` line carries that same UUID. Matching on it
          # correlates success to THIS row, not to any concurrent health no-op that
          # would satisfy an aggregate success metric. The UUID is not a secret.
          receipt_count_for_id() {
            task_id="$1"
            start_ms="$(( proof_start_epoch * 1000 ))"
            raw="$(
              aws logs filter-log-events \
                --log-group-name "$log_group" \
                --start-time "$start_ms" \
                --filter-pattern "{ \$.background_health_receipt.task_id = \"${task_id}\" && \$.background_health_receipt.status = \"ok\" }" \
                --query 'length(events)' \
                --output text 2>/dev/null || echo 0
            )"
            if [ -z "$raw" ] || [ "$raw" = "None" ]; then
              echo 0
            else
              echo "$raw"
            fi
          }

          # Network config for the one-off enqueue task (mirror the migration run).
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_WORKER_SERVICE" \
            > proof-service.json
          network_configuration="$(
            jq -c '{
              awsvpcConfiguration: {
                subnets: .services[0].networkConfiguration.awsvpcConfiguration.subnets,
                securityGroups: (.services[0].networkConfiguration.awsvpcConfiguration.securityGroups // []),
                assignPublicIp: (.services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp // "DISABLED")
              }
            }' proof-service.json
          )"
          worker_td="$(
            jq -r '.services[0].taskDefinition' proof-service.json
          )"

          # Boundary BEFORE enqueue so only fresh datapoints count.
          proof_start_epoch="$(date -u +%s)"

          overrides="$(
            jq -n --arg c "$ECS_WORKER_CONTAINER_NAME" --arg key "$proof_key" '{
              containerOverrides: [
                {
                  name: $c,
                  command: ["python", "-m", "proliferate.background.enqueue_health", "--idempotency-key", $key]
                }
              ]
            }'
          )"
          enqueue_task="$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --launch-type FARGATE \
              --task-definition "$worker_td" \
              --network-configuration "$network_configuration" \
              --overrides "$overrides" \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          test "$enqueue_task" != "None"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$enqueue_task"
          enqueue_exit="$(
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$enqueue_task" \
              --query "tasks[0].containers[?name=='${ECS_WORKER_CONTAINER_NAME}'].exitCode | [0]" \
              --output text
          )"
          if [ "$enqueue_exit" != "0" ]; then
            echo "Candidate-plane proof: health no-op enqueue task exited ${enqueue_exit}, expected 0." >&2
            exit 1
          fi
          echo "Enqueued deterministic health no-op (key=${proof_key}); observing candidate execution..."

          # Poll two signals until BOTH hold, or fail closed:
          #   (a) a fresh RelayHeartbeat advance  -> Beat+RedBeat+broker+worker
          #       liveness (an aggregate signal, correctly aggregate here); and
          #   (b) an EXACT-ID execution receipt   -> the candidate worker consumed
          #       and ran THIS deploy's exact enqueued row, not any concurrent or
          #       replayed health no-op. Recovering the outbox id is itself part of
          #       the gate: no receivable id => nothing to match => fail closed.
          outbox_id=""
          deadline="$(( $(date -u +%s) + timeout_seconds ))"
          while :; do
            if [ -z "$outbox_id" ]; then
              outbox_id="$(recover_outbox_id || true)"
            fi
            heartbeat="$(metric_latest_sum RelayHeartbeat)"
            if [ -n "$outbox_id" ]; then
              receipt_count="$(receipt_count_for_id "$outbox_id")"
            else
              receipt_count=0
            fi
            if ge_one "$heartbeat" && ge_one "$receipt_count"; then
              echo "Candidate plane proven: relay heartbeat advanced (Sum=${heartbeat}) and the EXACT enqueued health no-op executed (outbox_id=${outbox_id}, receipts=${receipt_count})."
              break
            fi
            if [ "$(date -u +%s)" -ge "$deadline" ]; then
              echo "Candidate-plane proof FAILED CLOSED after ${timeout_seconds}s: relay_heartbeat=${heartbeat}, outbox_id='${outbox_id}', exact_id_receipts=${receipt_count}. The candidate worker/Beat plane did not execute THIS deploy's newly enqueued row; refusing to roll the API." >&2
              exit 1
            fi
            sleep "$poll_seconds"
          done

      - name: Roll ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVER_SERVICE" \
            --task-definition "${{ steps.task.outputs.task_definition_arn }}" \
            --force-new-deployment \
            > /tmp/service-update.json
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVER_SERVICE"

      - name: Smoke API health
        run: |
          set -euo pipefail
          base="${API_URL%/}"
          path="$API_HEALTH_PATH"
          if [[ "$path" != /* ]]; then
            path="/$path"
          fi
          health_url="${base}${path}"
          for _ in {1..30}; do
            if curl --fail --silent --show-error "$health_url"; then
              echo
              echo "Health check passed: $health_url"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed: $health_url" >&2
          exit 1

      - name: Summarize server deploy
        run: |
          {
            echo "### Server"
            echo "- Environment: $DEPLOY_ENVIRONMENT"
            echo "- Image: \`${{ steps.image.outputs.image_uri }}\`"
            echo "- Image digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- API task definition: \`${{ steps.task.outputs.task_definition_arn }}\`"
            echo "- API service: \`$ECS_CLUSTER/$ECS_SERVER_SERVICE\`"
            if [ -n "$ECS_WORKER_SERVICE" ]; then
              echo "### Background plane (same image digest as API)"
              echo "- Worker task definition: \`${{ steps.background.outputs.worker_task_definition_arn }}\`"
              echo "- Worker service: \`$ECS_CLUSTER/$ECS_WORKER_SERVICE\`"
              echo "- Beat task definition: \`${{ steps.background.outputs.beat_task_definition_arn }}\`"
              echo "- Beat service: \`$ECS_CLUSTER/$ECS_BEAT_SERVICE\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
