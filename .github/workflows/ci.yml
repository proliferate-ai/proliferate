name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  repo-shape:
    name: Repo shape checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check max source file length
        run: python3 scripts/check_max_lines.py

      - name: Check alembic migration heads
        run: python3 scripts/check_migration_heads.py

      - name: Check AnyHarness old flat paths
        run: python3 scripts/check_anyharness_old_paths.py

      - name: Check Proliferate Worker structure
        run: python3 scripts/check_proliferate_worker_structure.py

      - name: Check frontend layer boundaries
        run: python3 scripts/check_frontend_boundaries.py

      - name: Check frontend structure drift
        run: python3 scripts/report_frontend_structure.py --strict --summary-only

      - name: Check server layer boundaries
        run: python3 scripts/check_server_boundaries.py

      - name: Check AnyHarness layer boundaries
        run: python3 scripts/check_anyharness_boundaries.py

  ci-cd-config:
    name: CI/CD config checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check CI/CD scripts parse
        run: |
          node --check scripts/ci-cd/create-release-tags.mjs
          node --check scripts/ci-cd/detect-deploy-surfaces.mjs
          node --check scripts/ci-cd/prepare-artifact-release.mjs
          node --check scripts/ci-cd/publish-product-release.mjs
          node --check scripts/ci-cd/pr-metadata.mjs
          node --check scripts/ci-cd/resolve-deploy-base.mjs
          node --check scripts/ci-cd/validate-pr-metadata.mjs
          node --check scripts/agent-catalog/build-catalog.mjs
          node --check scripts/agent-catalog/check-version-discipline.mjs
          node --check scripts/agent-catalog/resolve-pins.mjs

      - name: Test CI/CD scripts
        run: node --test scripts/ci-cd/*.test.mjs

      - name: Validate agent catalog generation discipline
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          node scripts/validate-agent-catalog.mjs
          node --test scripts/agent-catalog/*.test.mjs
          node scripts/agent-catalog/check-version-discipline.mjs --base "$BASE_SHA"

      - name: Check workflow YAML parses
        run: ruby -e 'require "yaml"; ARGV.each { |file| YAML.load_file(file); puts file }' .github/workflows/*.yml

      - name: Smoke deploy surface detector
        run: node scripts/ci-cd/detect-deploy-surfaces.mjs --base HEAD --head HEAD

  cargo-check:
    name: Cargo check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace

  sdk-build:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Regenerate SDK artifacts
        working-directory: anyharness/sdk
        run: pnpm run generate

      - name: Verify generated SDK artifacts are committed
        run: git diff --exit-code -- anyharness/sdk/generated/openapi.json anyharness/sdk/src/generated/openapi.ts

      - name: Typecheck SDK
        working-directory: anyharness/sdk
        run: pnpm run typecheck

      - name: Build SDK
        working-directory: anyharness/sdk
        run: pnpm run build

      - name: Build sdk-react
        working-directory: anyharness/sdk-react
        run: pnpm run build

  desktop-frontend:
    name: Desktop frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Generate and build SDK
        run: |
          pnpm install
          cd anyharness/sdk && pnpm run generate && pnpm run build
          cd ../sdk-react && pnpm run build

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: pnpm run build

  mobile-typecheck:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck mobile
        run: pnpm --filter @proliferate/mobile typecheck

  web-frontend:
    name: Web frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck web
        run: pnpm web:typecheck

      - name: Build web
        run: pnpm web:build

  shared-frontend-packages:
    name: Shared frontend packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck shared packages
        run: pnpm shared:typecheck

      - name: Build shared packages
        run: pnpm shared:build

      - name: Test product domain
        run: pnpm --filter @proliferate/product-domain test

      - name: Test product UI
        run: pnpm --filter @proliferate/product-ui test

      # Focused Tier-1 gate for the workflow definition surface: passive
      # refetch draft preservation, revision-conflict handling, failed-reload
      # retry, and create-state reset (specs/codebase/features/workflows.md
      # assigns UI conflict behavior to Tier 1). Runs this exact file - the
      # package-wide product-surfaces suite has known-noisy unrelated tests
      # and is not gated yet.
      - name: Test workflow definition surface
        run: pnpm --filter @proliferate/product-surfaces exec vitest run src/workflows/WorkflowDefinitionsSurface.test.tsx

  # Fail-closed Tier-2 gate for the workflow-definition lifecycle (T2-WFDEF-1)
  # only. No continue-on-error: a red result fails the CI workflow on PRs and
  # main, which also blocks the Deploy Staging workflow_run spine. This check
  # is eligible for a future repository required-status rule (none exists
  # today). The broad tier-2 lanes stay provisional in intent-tests.yml; do
  # not fold them into this job.
  workflow-definition-lifecycle:
    name: Workflow definition lifecycle (tier-2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server (venv, matches local layout)
        run: cd server && uv venv .venv --python 3.12 && uv pip install -e ".[dev]"

      - name: Install Playwright chromium
        run: pnpm -C tests/intent exec playwright install --with-deps chromium

      - name: Run workflow-definition lifecycle spec
        env:
          USE_EXISTING_POSTGRES: "1"
          USE_EXISTING_REDIS: "1"
          LOCAL_PGHOST: 127.0.0.1
          TIER2_INTENT_SKIP_RUNTIME: "1"
          CI: "true"
        run: pnpm -C tests/intent exec playwright test specs/workflow-definitions.spec.ts

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: workflow-definition-lifecycle-traces
          path: tests/intent/test-results/
          retention-days: 7
