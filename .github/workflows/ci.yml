name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  repo-shape:
    name: Repo shape checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check max source file length
        run: python3 scripts/check_max_lines.py

      - name: Check AnyHarness old flat paths
        run: python3 scripts/check_anyharness_old_paths.py

      - name: Check frontend layer boundaries
        run: python3 scripts/check_frontend_boundaries.py

      - name: Check server layer boundaries
        run: python3 scripts/check_server_boundaries.py

      - name: Check AnyHarness layer boundaries
        run: python3 scripts/check_anyharness_boundaries.py

  cargo-check:
    name: Cargo check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace

  sdk-build:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Regenerate SDK artifacts
        working-directory: anyharness/sdk
        run: pnpm run generate

      - name: Verify generated SDK artifacts are committed
        run: git diff --exit-code -- anyharness/sdk/generated/openapi.json anyharness/sdk/src/generated/openapi.ts

      - name: Typecheck SDK
        working-directory: anyharness/sdk
        run: pnpm run typecheck

      - name: Build SDK
        working-directory: anyharness/sdk
        run: pnpm run build

      - name: Build sdk-react
        working-directory: anyharness/sdk-react
        run: pnpm run build

  desktop-frontend:
    name: Desktop frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Generate and build SDK
        run: |
          pnpm install
          cd anyharness/sdk && pnpm run generate && pnpm run build
          cd ../sdk-react && pnpm run build

      - name: Build desktop frontend
        working-directory: desktop
        run: pnpm run build

  mobile-typecheck:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck mobile
        run: pnpm --filter @proliferate/mobile typecheck

  web-frontend:
    name: Web frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck web
        run: pnpm web:typecheck

      - name: Build web
        run: pnpm web:build

  shared-frontend-packages:
    name: Shared frontend packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck shared packages
        run: pnpm shared:typecheck

      - name: Build shared packages
        run: pnpm shared:build

      - name: Test product model
        run: pnpm --filter @proliferate/product-model test

      - name: Test product UI
        run: pnpm --filter @proliferate/product-ui test
