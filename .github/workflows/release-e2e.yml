name: Release E2E (tier 3)

# Tier-3 live end-to-end runner (specs/developing/testing/README.md "Tier 3 —
# live end-to-end"). Drives real agents on cheap models through real flows:
# provision/pause/resume/connect, chat per cataloged agent, config apply,
# secrets materialization, billing metering, repo settings.
#
# Cadence: release-train, NOT per-PR. It burns real money/time (E2B sandboxes,
# gateway LLM calls) so it runs on a schedule and on demand, never on
# `pull_request`. It never gates merges. Signal mode reports the provisional
# blocked/expected-fail inventory, but a genuine scenario failure still fails
# the workflow. Release mode additionally requires every provisional manifest
# row to be present exactly once and every emitted registered result to be
# unique and green.
#
# Honest scoping (the runner self-reports blocked/expected-fail per scenario
# for anything it lacks credentials for; preflight only inventories gaps):
#   - The local lane needs a way to drive real agents. In CI there is no native
#     agent CLI login, so it routes through the LLM gateway with
#     RELEASE_E2E_GATEWAY_TEST_KEY. With no key, only scenarios that require it
#     report blocked; independent billing/configuration/runtime scenarios still
#     run. Release policy rejects any blocked required row.
#   - The sandbox lane additionally needs an E2B team (E2B_API_KEY repo secret,
#     mapped to RELEASE_E2E_E2B_API_KEY) AND a publicly reachable server URL for
#     E2B to deliver webhooks to — a locally booted server on 127.0.0.1 needs a
#     tunnel, so sandbox scenarios self-report blocked without one.
#   - The staging lane (against the real staging deployment + its gateway) is a
#     dispatch-only target. Any absent staging identity, gateway, E2B, or
#     integration credential becomes a per-scenario blocked result.

on:
  workflow_dispatch:
    inputs:
      lane:
        description: Runtime target lane the runner points at.
        default: local
        required: false
        type: choice
        options:
          - local
          - staging
      scenarios:
        description: Comma-separated scenario ids, or "all".
        default: all
        required: false
        type: string
      agents:
        description: Comma-separated harness kinds, or "all".
        default: all
        required: false
        type: string
      policy:
        description: Signal is diagnostic; release is the fail-closed required-scenario gate.
        default: release
        required: false
        type: choice
        options:
          - signal
          - release
  schedule:
    # Provisional nightly signal run. It boots a source-built local server and
    # AnyHarness runtime from this ref; it does not target staging or boot a
    # Desktop/Web product shell. Staging remains dispatch-only below. This is
    # therefore coverage inventory, not the complete nightly contract in the
    # testing standard. Scheduled events have no inputs, so policy expressions
    # resolve to signal; manual dispatch defaults to release.
    - cron: "0 11 * * *"

permissions:
  contents: read

concurrency:
  group: release-e2e-tier3
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-e2e-local:
    name: tier-3 local lane (${{ github.event.inputs.policy || 'signal' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # A `lane=staging` dispatch belongs to the staging job below, not here —
    # this job boots a fresh local stack and ignores --lane, so routing a
    # staging dispatch into it produced a local run mislabelled "staging". Run
    # on the nightly schedule and on any dispatch EXCEPT lane=staging.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.lane != 'staging'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      # Inventory credentials before the stack boot. Missing credentials never
      # skip the whole suite: the runner records only affected scenario/lanes as
      # blocked, so independent flows (especially billing) still execute.
      - name: Preflight — required credentials
        env:
          POLICY: ${{ github.event.inputs.policy || 'signal' }}
          GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          DURABLE_USER_EMAIL: ${{ secrets.RELEASE_E2E_DURABLE_USER_EMAIL }}
          DURABLE_USER_PASSWORD: ${{ secrets.RELEASE_E2E_DURABLE_USER_PASSWORD }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          if [ -z "$GATEWAY_TEST_KEY" ]; then
            if [ "$POLICY" = "release" ]; then
              echo "::error title=Tier-3 release credential missing::RELEASE_E2E_GATEWAY_TEST_KEY is not set. The strict runner will record the affected required rows as blocked and fail closed."
            else
              echo "::notice title=Tier-3 gateway scenarios blocked::RELEASE_E2E_GATEWAY_TEST_KEY is not set. Gateway-dependent scenarios will report blocked; all independent scenarios still run. Provision a gateway virtual key for an e2e-tests subject with a cheap-model allowlist."
            fi
          fi
          if [ -z "$DURABLE_USER_EMAIL" ] || [ -z "$DURABLE_USER_PASSWORD" ]; then
            echo "::notice title=Tier-3 durable identity self-seeded::RELEASE_E2E_DURABLE_USER_EMAIL / _PASSWORD not set — the runner seeds a per-run durable user through the real /setup claim (the stack is ephemeral), so local-lane server-mediated scenarios still run. Sandbox-lane scenarios that need the real persistent identity report blocked."
          fi
          if [ -z "$E2B_API_KEY" ]; then
            echo "::notice title=Tier-3 sandbox lane absent::E2B_API_KEY not set — sandbox-lane scenarios will report blocked. (Note: even with the key, the sandbox lane needs a publicly reachable server URL / tunnel for E2B webhooks.)"
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target/runtime-local"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server (venv, matches local layout)
        run: cd server && uv venv .venv --python 3.12 && uv pip install -e ".[dev]"

      - name: Install system deps (Tauri crates in the workspace build)
        # `make build-rust` compiles the whole workspace, including the Tauri
        # desktop crate — same package set ci.yml installs for it.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build the AnyHarness runtime binary
        # Same target dir the Makefile's dev-artifacts check reads
        # (DEV_ANYHARNESS_TARGET_DIR), so `make release-e2e`'s downstream tooling
        # and a laptop run resolve the same binary.
        run: make build-rust

      - name: Boot the server + AnyHarness runtime, then run the tier-3 runner
        env:
          # Local stack wiring — the runner points at these (env-manifest.ts).
          SINGLE_ORG_MODE: "true"
          # CI-only server secrets (same throwaway values server-ci.yml uses;
          # settings validation requires them when debug=False).
          JWT_SECRET: release-e2e-ci-jwt-secret
          CLOUD_SECRET_KEY: release-e2e-ci-cloud-secret
          SETUP_TOKEN_FILE: /tmp/proliferate-ci-setup-token
          DATABASE_URL: postgresql+asyncpg://proliferate:localdev@127.0.0.1:5432/proliferate
          # Same URL the DB-seam probes (billing_probe.py, integration_audit_probe.py)
          # read the local profile ledger/audit tables from.
          RELEASE_E2E_LOCAL_DATABASE_URL: postgresql+asyncpg://proliferate:localdev@127.0.0.1:5432/proliferate
          REDIS_URL: redis://127.0.0.1:6379/0
          PROLIFERATE_API_PORT: "8086"
          # The server's own base URL — worker enrollment mints the integration
          # gateway URL from it (runtime_workers/service.py worker_cloud_base_url);
          # without it, /worker/enroll 500s cloud_worker_misconfigured (T3-INT-1).
          API_BASE_URL: http://127.0.0.1:8086
          ANYHARNESS_PORT: "8542"
          ANYHARNESS_RUNTIME_HOME: ${{ github.workspace }}/.ci-runtime-home
          RELEASE_E2E_SERVER_URL: http://127.0.0.1:8086
          RELEASE_E2E_LOCAL_RUNTIME_URL: http://127.0.0.1:8542
          # Credentials — mapped from repo secrets to the manifest's env names.
          # Absent secrets expand to empty; the runner reports those scenarios
          # blocked rather than failing (env-resolution.ts).
          RELEASE_E2E_GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          # Public base URL of the gateway the test key was issued against
          # (staging's AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL). With both set the
          # runner pushes gateway agent-auth to the local runtime so harnesses
          # chat with no native CLI login (env-manifest.ts).
          RELEASE_E2E_GATEWAY_BASE_URL: ${{ secrets.RELEASE_E2E_GATEWAY_BASE_URL || 'https://staging-gateway.proliferate.com' }}
          # Durable-user secrets are OPTIONAL for this lane: when absent the
          # runner self-seeds a per-run durable user through the real /setup
          # claim (the stack is ephemeral), and sandbox-lane scenarios that
          # need the real persistent identity report blocked (#1069).
          RELEASE_E2E_DURABLE_USER_EMAIL: ${{ secrets.RELEASE_E2E_DURABLE_USER_EMAIL }}
          RELEASE_E2E_DURABLE_USER_PASSWORD: ${{ secrets.RELEASE_E2E_DURABLE_USER_PASSWORD }}
          # Non-secret fixture ids live in GitHub variables. Keep the legacy
          # secret lookup first so existing repository configuration continues
          # to work while the configured variable is the normal path.
          RELEASE_E2E_DURABLE_ORG_ID: ${{ secrets.RELEASE_E2E_DURABLE_ORG_ID || vars.RELEASE_E2E_DURABLE_ORG_ID }}
          RELEASE_E2E_INTEGRATION_API_KEY: ${{ secrets.RELEASE_E2E_INTEGRATION_API_KEY }}
          RELEASE_E2E_GITHUB_TEST_TOKEN: ${{ secrets.RELEASE_E2E_GITHUB_TEST_TOKEN }}
          # E2B repo secrets carry the runner's manifest names.
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          # Team ids are non-secret GitHub variables. The release-specific
          # name is accepted when present; the repository's configured
          # E2B_TEAM_ID is the fallback used by the local CI lane.
          RELEASE_E2E_E2B_TEAM_ID: ${{ secrets.RELEASE_E2E_E2B_TEAM_ID || vars.RELEASE_E2E_E2B_TEAM_ID || vars.E2B_TEAM_ID }}
          # The GitHub secret is named for test mode; the server setting it
          # populates is STRIPE_SECRET_KEY.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          RELEASE_POLICY: ${{ github.event.inputs.policy || 'signal' }}
          LANE: ${{ github.event.inputs.lane || 'local' }}
          SCENARIOS: ${{ github.event.inputs.scenarios || 'all' }}
          AGENTS: ${{ github.event.inputs.agents || 'all' }}
        run: |
          set -euo pipefail
          # Apply migrations then boot the API server (headless — not `make run`,
          # which also launches the Tauri desktop app).
          ( cd server && .venv/bin/alembic upgrade head )
          ( cd server && .venv/bin/uvicorn proliferate.main:app --host 127.0.0.1 --port 8086 ) &
          SERVER_PID=$!
          # Boot the AnyHarness runtime built above. ANTHROPIC_AUTH_TOKEN is
          # exported to the runtime process because its session-create
          # readiness gate reads only process env / native login files — it
          # does not consult the gateway agent-auth state the runner pushes
          # (PUT /v1/agent-auth/state), so a gateway-only environment would
          # report claude LoginRequired. At launch the gateway render overrides
          # ANTHROPIC_AUTH_TOKEN/_BASE_URL with the same key anyway, so this
          # only satisfies the readiness check, never routes traffic.
          ANTHROPIC_AUTH_TOKEN="$RELEASE_E2E_GATEWAY_TEST_KEY" \
            ./target/runtime-local/debug/anyharness serve --host 127.0.0.1 --port 8542 &
          RUNTIME_PID=$!
          trap 'kill $SERVER_PID $RUNTIME_PID 2>/dev/null || true' EXIT

          # Wait for both to report healthy.
          for url in http://127.0.0.1:8086/health http://127.0.0.1:8542/health; do
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then break; fi
              if [ "$i" = "60" ]; then echo "timed out waiting for $url"; exit 1; fi
              sleep 2
            done
          done

          make release-e2e LANE="$LANE" DESKTOP=web AGENTS="$AGENTS" SCENARIOS="$SCENARIOS"

      - name: Upload failure reports
        # Keep diagnostics and strict summary evidence even when the runner is
        # red. The step no-ops when the output directory is empty.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-reports
          path: tests/release/.output/
          include-hidden-files: true
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Staging lane — the README's documented tier-3 CI target: the real staging
  # deployment (https://staging-app.proliferate.com/api, publicly reachable).
  #
  # Dispatch-only (never on the nightly schedule) in this first pass, so the
  # SHARED durable staging user (proliferate-e2e-bot) is not exercised on an
  # unattended cadence until the lane is proven. Trigger with:
  #   gh workflow run release-e2e.yml -f lane=staging
  #
  # STAGING-LANE RUNBOOK (verified 2026-07-09, first honest staging run):
  #   - Identity: the durable user is GitHub-OAuth-only (no password), so on
  #     `--lane staging` scenarios authenticate via the rotating PRODUCT session
  #     (tests/release/src/fixtures/staging-session.ts loginDurableUserOnStaging),
  #     NOT RELEASE_E2E_DURABLE_USER_EMAIL/PASSWORD. env-resolution.ts drops those
  #     two from requiredEnv on staging and checks stagingSessionAvailable instead.
  #   - Server URL: staging runs API_PATH_PREFIX=/api, so RELEASE_E2E_SERVER_URL
  #     MUST be the /api-prefixed base (the runner posts the raw HTTP contract,
  #     e.g. /auth/mobile/session/refresh, under it). Confirmed: /api/health=200,
  #     /health=404, /api/auth/mobile/session/refresh=401 on a bad token.
  #   - ROTATION: staging refresh tokens rotate on EVERY use (the refresh route
  #     mints a new pair and revokes the old). A stateless job would burn the
  #     bootstrap token on run 1, so the rotated state file is persisted across
  #     runs via actions/cache with a per-run-id save key + a prefix restore-key
  #     (immutable cache entries; each run restores the most recent and saves a
  #     new one). The workflow-level concurrency group serialises runs, so no two
  #     rotations race. On the first-ever run (cache miss) the fixture falls back
  #     to the RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN bootstrap secret; from
  #     then on the cached state file carries the live token.
  #   - FAILURE MODE: a broken session chain (revoked/expired/never-persisted
  #     token) reports BLOCKED. Signal mode keeps that diagnostic non-fatal;
  #     release mode rejects it. loginDurableUserForTargetLane raises
  #     StagingSessionUnavailableError, which durable-user scenarios convert to
  #     ScenarioBlockedError. Re-bootstrap with staging_session_seed.py (in-VPC
  #     one-off ECS task on cluster proliferate-staging) and reseed the secret.
  #   - HONEST SCOPE (first signal pass): the `local` RUNTIME lane has no
  #     staging pairing (blocked); mutating/charging sandbox scenarios against the
  #     SHARED durable user (PROV-1 mint-user, PROV-2 wake, SEC-MAT-1 secret write,
  #     INT-1 integration connect) are DEFERRED (blocked) until a dedicated
  #     non-shared staging fixture org exists; BILL-1/2 block on the local-only
  #     RELEASE_E2E_LOCAL_DATABASE_URL (staging DB is VPC-only); CHAT/WT/UPDATE/
  #     REPO sandbox halves are expected-fail (test bodies unimplemented / seed
  #     unavailable). PROV-2 is the real end-to-end proof: it authenticates the
  #     durable user through the rotating session and reads GET /cloud-sandbox.
  release-e2e-staging:
    name: tier-3 staging lane (${{ github.event.inputs.policy || 'signal' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Dispatch-only, lane=staging. Keeps shared staging state off the schedule.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.lane == 'staging'
    # Read the `staging` GitHub environment's secrets (RELEASE_E2E_GATEWAY_TEST_KEY,
    # RELEASE_E2E_E2B_API_KEY, ...). Repo-level secrets of the same name are used
    # when an env-level one is absent, so the session bootstrap secret can live at
    # either scope.
    environment: staging
    env:
      # Staging API base — MUST include /api (API_PATH_PREFIX). Not a secret.
      RELEASE_E2E_SERVER_URL: https://staging-app.proliferate.com/api
      # Well-known state-file path, persisted across runs by the cache steps.
      RELEASE_E2E_STAGING_SESSION_STATE: ${{ github.workspace }}/.staging-session/state.json
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Prepare staging-session state dir
        run: mkdir -p "$(dirname "$RELEASE_E2E_STAGING_SESSION_STATE")"

      # Restore the most recent rotated staging-session state file. The save key
      # (below) is per-run-id (immutable), so restore-keys prefix-matches the
      # latest prior run's entry. Cache miss on the first-ever run -> the runner
      # falls back to the bootstrap refresh-token secret.
      - name: Restore rotated staging session
        id: session-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.staging-session
          key: release-e2e-staging-session-${{ github.run_id }}
          restore-keys: |
            release-e2e-staging-session-

      - name: Preflight — staging session bootstrap
        env:
          SESSION_REFRESH_TOKEN: ${{ secrets.RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN }}
        run: |
          if [ -f "$RELEASE_E2E_STAGING_SESSION_STATE" ]; then
            echo "::notice title=Staging session restored::Using the cached rotating session state file."
          elif [ -n "$SESSION_REFRESH_TOKEN" ]; then
            echo "::notice title=Staging session bootstrap::No cached state file; falling back to the RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN bootstrap secret (first run). It will rotate into the cached state file after this run."
          else
            echo "::notice title=Staging session absent::No cached state file AND no RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN secret. Durable-user scenarios will self-report blocked. Mint a token with tests/release/scripts/staging_session_seed.py (in-VPC ECS task) and add the secret."
          fi

      - name: Run tier-3 against staging
        env:
          # Durable identity on staging = the rotating product session (state
          # file above OR this bootstrap secret on the first run). NOT email/pw.
          RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN: ${{ secrets.RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN }}
          # Org id owning the durable user's account (non-secret). When set, the
          # deferred sandbox scenarios report their staging-deferral reason; when
          # absent they block on this var. Release policy rejects that result.
          RELEASE_E2E_DURABLE_ORG_ID: ${{ secrets.RELEASE_E2E_DURABLE_ORG_ID || vars.RELEASE_E2E_DURABLE_ORG_ID }}
          # Provisioned for when the deferred sandbox scenarios light up; unused
          # by the first honest pass (those scenarios block before reaching them).
          RELEASE_E2E_GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          RELEASE_E2E_GATEWAY_BASE_URL: ${{ secrets.RELEASE_E2E_GATEWAY_BASE_URL || 'https://staging-gateway.proliferate.com' }}
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.RELEASE_E2E_E2B_API_KEY || secrets.E2B_API_KEY }}
          RELEASE_E2E_E2B_TEAM_ID: ${{ secrets.RELEASE_E2E_E2B_TEAM_ID || vars.RELEASE_E2E_E2B_TEAM_ID || vars.E2B_TEAM_ID }}
          RELEASE_E2E_INTEGRATION_API_KEY: ${{ secrets.RELEASE_E2E_INTEGRATION_API_KEY }}
          RELEASE_E2E_GITHUB_TEST_TOKEN: ${{ secrets.RELEASE_E2E_GITHUB_TEST_TOKEN }}
          RELEASE_POLICY: ${{ github.event.inputs.policy || 'signal' }}
          SCENARIOS: ${{ github.event.inputs.scenarios || 'all' }}
          AGENTS: ${{ github.event.inputs.agents || 'all' }}
        run: make release-e2e LANE=staging DESKTOP=web AGENTS="$AGENTS" SCENARIOS="$SCENARIOS"

      # Persist the rotated state file under a fresh, immutable per-run-id key so
      # the next run restores it via the prefix restore-key above. Always save:
      # even a red run may have rotated the refresh token before it failed.
      - name: Save rotated staging session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.staging-session
          key: release-e2e-staging-session-${{ github.run_id }}

      - name: Upload failure reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-reports-staging
          path: tests/release/.output/
          include-hidden-files: true
          retention-days: 7
          if-no-files-found: ignore
