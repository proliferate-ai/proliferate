name: Release E2E (tier 3)

# Tier-3 live end-to-end runner (specs/developing/testing/README.md "Tier 3 —
# live end-to-end"). Drives real agents on cheap models through real flows:
# provision/pause/resume/connect, chat per cataloged agent, config apply,
# secrets materialization, billing metering, repo settings.
#
# Cadence: release-train, NOT per-PR. It burns real money/time (E2B sandboxes,
# gateway LLM calls) so it runs on a schedule and on demand, never on
# `pull_request`. Per the README CI mapping it is non-blocking: failures file
# issues and block the staging->production promotion, they never gate merges.
# Every job is `continue-on-error` while the runner earns a flake-free record.
#
# Honest scoping (the runner self-reports blocked/expected-fail per scenario
# for anything it lacks credentials for; the gates below just avoid booting a
# stack that could not produce signal):
#   - The local lane needs a way to drive real agents. In CI there is no native
#     agent CLI login, so it routes through the LLM gateway with
#     RELEASE_E2E_GATEWAY_TEST_KEY. With no key the job skips itself cleanly
#     (::notice::), the same pattern the tier-2 billing suite uses for
#     STRIPE_TEST_SECRET_KEY.
#   - The sandbox lane additionally needs an E2B team (E2B_API_KEY repo secret,
#     mapped to RELEASE_E2E_E2B_API_KEY) AND a publicly reachable server URL for
#     E2B to deliver webhooks to — a locally booted server on 127.0.0.1 needs a
#     tunnel, so sandbox scenarios self-report blocked without one.
#   - The staging lane (against the real staging deployment + its gateway) is
#     the README's documented CI target, but the staging gateway test key is not
#     provisioned yet (RELEASE_E2E_GATEWAY_TEST_KEY on staging). Its job is left
#     commented at the bottom until that key exists.

on:
  workflow_dispatch:
    inputs:
      lane:
        description: Runtime target lane the runner points at.
        default: local
        required: false
        type: choice
        options:
          - local
          - staging
      scenarios:
        description: Comma-separated scenario ids, or "all".
        default: all
        required: false
        type: string
      agents:
        description: Comma-separated harness kinds, or "all".
        default: all
        required: false
        type: string
      selfhost:
        description: run the self-host qualification world (provisions a run-scoped EC2 box).
        default: false
        required: false
        type: boolean
      local_functional_behavior:
        description: >-
          Behavior for the local-functional job below (LOCAL-1..7) only —
          every other job in this workflow reads its own fixed behavior.
        default: strict
        required: false
        type: choice
        options:
          - diagnostic
          - strict
      selfhost_scenarios:
        description: Comma-separated self-host scenario ids for the selfhost job (validated against the bounded set).
        default: SELFHOST-INSTALL-1
        required: false
        type: string
      selfhost_cells:
        description: Optional comma-separated matrix-cell filter for the selfhost job (e.g. SH-GATEWAY); validated against the known cell names.
        default: ""
        required: false
        type: string
      selfhost_candidate_platform:
        description: Candidate build platform for the selfhost job.
        default: linux/amd64
        required: false
        type: choice
        options:
          - linux/amd64
          - linux/arm64
      selfhost_api_base_url:
        description: Fixed serial-lane API base URL for the selfhost job (leave blank for a run-scoped subdomain).
        default: ""
        required: false
        type: string
  schedule:
    # Nightly, offset after the release train (which runs at 09:00 UTC) so it
    # exercises the freshly cut artifacts. README: "Nightly — Tier 3 lanes
    # against whatever is on staging; failures file issues, never block merges."
    - cron: "0 11 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-e2e-local:
    name: tier-3 local lane (provisional)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: release-e2e-local
      cancel-in-progress: false
    # Provisional posture, enforced twice: the job name says so, and the job
    # never fails the workflow while it is provisional (README CI mapping —
    # tier 3 is not yet a merge gate).
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      # Preflight gate (billing-suite pattern): a tier-3 local run needs the
      # gateway test key to drive real agents in CI. Absent -> skip cleanly.
      - name: Preflight — required credentials
        id: preflight
        env:
          GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          DURABLE_USER_EMAIL: ${{ secrets.RELEASE_E2E_DURABLE_USER_EMAIL }}
          DURABLE_USER_PASSWORD: ${{ secrets.RELEASE_E2E_DURABLE_USER_PASSWORD }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          enabled=true
          if [ -z "$GATEWAY_TEST_KEY" ]; then
            echo "::notice title=Tier-3 skipped::RELEASE_E2E_GATEWAY_TEST_KEY is not set. The local lane cannot drive real agents in CI without it (there is no native agent CLI login on the runner). Provision a LiteLLM virtual key for an e2e-tests team (cheap-model allowlist, see T3-CHAT-1) and add it as the RELEASE_E2E_GATEWAY_TEST_KEY secret. Skipping cleanly."
            enabled=false
          fi
          if [ -z "$DURABLE_USER_EMAIL" ] || [ -z "$DURABLE_USER_PASSWORD" ]; then
            echo "::notice title=Tier-3 durable identity self-seeded::RELEASE_E2E_DURABLE_USER_EMAIL / _PASSWORD not set — the runner seeds a per-run durable user through the real /setup claim (the stack is ephemeral), so local-lane server-mediated scenarios still run. Sandbox-lane scenarios that need the real persistent identity report blocked."
          fi
          if [ -z "$E2B_API_KEY" ]; then
            echo "::notice title=Tier-3 sandbox lane absent::E2B_API_KEY not set — sandbox-lane scenarios will report blocked. (Note: even with the key, the sandbox lane needs a publicly reachable server URL / tunnel for E2B webhooks.)"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.preflight.outputs.enabled == 'true'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.preflight.outputs.enabled == 'true'
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        if: steps.preflight.outputs.enabled == 'true'
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
        if: steps.preflight.outputs.enabled == 'true'
      - uses: actions/setup-python@v6
        if: steps.preflight.outputs.enabled == 'true'
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.preflight.outputs.enabled == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.preflight.outputs.enabled == 'true'
        with:
          workspaces: ". -> target/runtime-local"

      - name: Install workspace dependencies
        if: steps.preflight.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install server (venv, matches local layout)
        if: steps.preflight.outputs.enabled == 'true'
        run: cd server && uv venv .venv --python 3.12 && uv pip install -e ".[dev]"

      - name: Install system deps (Tauri crates in the workspace build)
        if: steps.preflight.outputs.enabled == 'true'
        # `make build-rust` compiles the whole workspace, including the Tauri
        # desktop crate — same package set ci.yml installs for it.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build the AnyHarness runtime binary
        if: steps.preflight.outputs.enabled == 'true'
        # Same target dir the Makefile's dev-artifacts check reads
        # (DEV_ANYHARNESS_TARGET_DIR), so `make release-e2e`'s downstream tooling
        # and a laptop run resolve the same binary.
        run: make build-rust

      - name: Boot the server + AnyHarness runtime, then run the tier-3 runner
        if: steps.preflight.outputs.enabled == 'true'
        env:
          # Local stack wiring — the runner points at these (env-manifest.ts).
          SINGLE_ORG_MODE: "true"
          # CI-only server secrets (same throwaway values server-ci.yml uses;
          # settings validation requires them when debug=False).
          JWT_SECRET: release-e2e-ci-jwt-secret
          CLOUD_SECRET_KEY: release-e2e-ci-cloud-secret
          SETUP_TOKEN_FILE: /tmp/proliferate-ci-setup-token
          DATABASE_URL: postgresql+asyncpg://proliferate:localdev@127.0.0.1:5432/proliferate
          # Same URL the DB-seam probes (billing_probe.py, integration_audit_probe.py)
          # read the local profile ledger/audit tables from.
          RELEASE_E2E_LOCAL_DATABASE_URL: postgresql+asyncpg://proliferate:localdev@127.0.0.1:5432/proliferate
          REDIS_URL: redis://127.0.0.1:6379/0
          PROLIFERATE_API_PORT: "8086"
          # The server's own base URL — worker enrollment mints the integration
          # gateway URL from it (runtime_workers/service.py worker_cloud_base_url);
          # without it, /worker/enroll 500s cloud_worker_misconfigured (T3-INT-1).
          API_BASE_URL: http://127.0.0.1:8086
          ANYHARNESS_PORT: "8542"
          ANYHARNESS_RUNTIME_HOME: ${{ github.workspace }}/.ci-runtime-home
          RELEASE_E2E_SERVER_URL: http://127.0.0.1:8086
          RELEASE_E2E_LOCAL_RUNTIME_URL: http://127.0.0.1:8542
          # Credentials — mapped from repo secrets to the manifest's env names.
          # Absent secrets expand to empty; the runner reports those scenarios
          # blocked rather than failing (env-resolution.ts).
          RELEASE_E2E_GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          # Public base URL of the gateway the test key was issued against
          # (staging's AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL). With both set the
          # runner pushes gateway agent-auth to the local runtime so harnesses
          # chat with no native CLI login (env-manifest.ts).
          RELEASE_E2E_GATEWAY_BASE_URL: ${{ secrets.RELEASE_E2E_GATEWAY_BASE_URL || 'https://staging-gateway.proliferate.com' }}
          # Durable-user secrets are OPTIONAL for this lane: when absent the
          # runner self-seeds a per-run durable user through the real /setup
          # claim (the stack is ephemeral), and sandbox-lane scenarios that
          # need the real persistent identity report blocked (#1069).
          RELEASE_E2E_DURABLE_USER_EMAIL: ${{ secrets.RELEASE_E2E_DURABLE_USER_EMAIL }}
          RELEASE_E2E_DURABLE_USER_PASSWORD: ${{ secrets.RELEASE_E2E_DURABLE_USER_PASSWORD }}
          RELEASE_E2E_DURABLE_ORG_ID: ${{ secrets.RELEASE_E2E_DURABLE_ORG_ID }}
          RELEASE_E2E_INTEGRATION_API_KEY: ${{ secrets.RELEASE_E2E_INTEGRATION_API_KEY }}
          # E2B repo secrets carry the runner's manifest names.
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          RELEASE_E2E_E2B_TEAM_ID: ${{ secrets.RELEASE_E2E_E2B_TEAM_ID }}
          # Stripe test mode for the billing scenarios' setup seam.
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          LANE: ${{ github.event.inputs.lane || 'local' }}
          SCENARIOS: ${{ github.event.inputs.scenarios || 'all' }}
          AGENTS: ${{ github.event.inputs.agents || 'all' }}
        run: |
          set -euo pipefail
          # Apply migrations then boot the API server (headless — not `make run`,
          # which also launches the Tauri desktop app).
          ( cd server && .venv/bin/alembic upgrade head )
          ( cd server && .venv/bin/uvicorn proliferate.main:app --host 127.0.0.1 --port 8086 ) &
          SERVER_PID=$!
          # Boot the AnyHarness runtime built above. ANTHROPIC_AUTH_TOKEN is
          # exported to the runtime process because its session-create
          # readiness gate reads only process env / native login files — it
          # does not consult the gateway agent-auth state the runner pushes
          # (PUT /v1/agent-auth/state), so a gateway-only environment would
          # report claude LoginRequired. At launch the gateway render overrides
          # ANTHROPIC_AUTH_TOKEN/_BASE_URL with the same key anyway, so this
          # only satisfies the readiness check, never routes traffic.
          ANTHROPIC_AUTH_TOKEN="$RELEASE_E2E_GATEWAY_TEST_KEY" \
            ./target/runtime-local/debug/anyharness serve --host 127.0.0.1 --port 8542 &
          RUNTIME_PID=$!
          trap 'kill $SERVER_PID $RUNTIME_PID 2>/dev/null || true' EXIT

          # Wait for both to report healthy.
          for url in http://127.0.0.1:8086/health http://127.0.0.1:8542/health; do
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then break; fi
              if [ "$i" = "60" ]; then echo "timed out waiting for $url"; exit 1; fi
              sleep 2
            done
          done

          make release-e2e LANE="$LANE" DESKTOP=web AGENTS="$AGENTS" SCENARIOS="$SCENARIOS"

      - name: Upload failure reports
        # always() (not failure()): the runner step is continue-on-error, so a
        # red runner never flips the job to "failed" and failure() would skip
        # this. Upload whenever the job ran the runner; the step no-ops when
        # there are no reports.
        if: always() && steps.preflight.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-e2e-reports
          path: tests/release/.output/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Staging lane — the README's documented tier-3 CI target (real deployment,
  # publicly reachable, real gateway with cheap models). Runs against the
  # `staging` GitHub environment (its vars/secrets: API_BASE_URL,
  # RELEASE_E2E_GATEWAY_TEST_KEY, RELEASE_E2E_DURABLE_ORG_ID, …). The staging
  # gateway + durable org id + gateway test key are now provisioned; the one
  # remaining gate is the browser-free durable-user session:
  # RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN (a `staging` environment secret).
  # Refresh tokens rotate on every use, so a durable-in-CI mechanism (a
  # non-rotating bootstrap, or persisting the rotated state between runs) is
  # still needed before this authenticates for real — until then the preflight
  # skips cleanly (::notice::), the same pattern the local lane uses.
  # The runner constrains this broad selector to Tier-3 sandbox-runtime cells;
  # it never runs Tier-2, controller-local, self-host, or Tier-4 bodies here.
  release-e2e-staging:
    name: tier-3 staging lane (provisional)
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.selfhost)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: release-e2e-staging
      cancel-in-progress: false
    continue-on-error: true
    environment: staging
    steps:
      - name: Preflight — staging credentials
        id: preflight
        env:
          GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          STAGING_SERVER_URL: ${{ vars.API_BASE_URL }}
          STAGING_SESSION_REFRESH_TOKEN: ${{ secrets.RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN }}
        run: |
          enabled=true
          if [ -z "$STAGING_SERVER_URL" ]; then
            echo "::notice title=Staging tier-3 skipped::staging API_BASE_URL variable is not set."
            enabled=false
          fi
          if [ -z "$STAGING_SESSION_REFRESH_TOKEN" ]; then
            echo "::notice title=Staging tier-3 skipped::RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN (staging env secret) is not set — the durable staging user (proliferate-e2e-bot, GitHub-OAuth-only, no password) authenticates via a rotating session refresh token. Bootstrap one per tests/release/src/fixtures/staging-session.ts and add it (plus a rotation-durable mechanism) before this lane runs. Skipping cleanly."
            enabled=false
          fi
          if [ -z "$GATEWAY_TEST_KEY" ]; then
            echo "::notice title=Staging gateway key absent::RELEASE_E2E_GATEWAY_TEST_KEY not set — gateway-dependent scenarios report blocked. Billing-surface scenarios (T3-BILL-4) still run."
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.preflight.outputs.enabled == 'true'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.preflight.outputs.enabled == 'true'
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        if: steps.preflight.outputs.enabled == 'true'
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
        if: steps.preflight.outputs.enabled == 'true'
      - uses: actions/setup-python@v6
        if: steps.preflight.outputs.enabled == 'true'
        with:
          python-version: "3.12"
      - name: Install workspace dependencies
        if: steps.preflight.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tier-3 against staging
        if: steps.preflight.outputs.enabled == 'true'
        env:
          # API_BASE_URL already includes the deployment's /api prefix, which is
          # exactly what RELEASE_E2E_SERVER_URL wants (env-manifest.ts).
          RELEASE_E2E_SERVER_URL: ${{ vars.API_BASE_URL }}
          RELEASE_E2E_GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
          RELEASE_E2E_GATEWAY_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL || 'https://staging-gateway.proliferate.com' }}
          RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN: ${{ secrets.RELEASE_E2E_STAGING_SESSION_REFRESH_TOKEN }}
          RELEASE_E2E_DURABLE_ORG_ID: ${{ vars.RELEASE_E2E_DURABLE_ORG_ID }}
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          RELEASE_E2E_E2B_TEAM_ID: ${{ vars.E2B_TEAM_ID }}
          LANE: staging
          SCENARIOS: ${{ github.event.inputs.scenarios || 'all' }}
          AGENTS: ${{ github.event.inputs.agents || 'all' }}
        run: make release-e2e LANE="$LANE" DESKTOP=web AGENTS="$AGENTS" SCENARIOS="$SCENARIOS"

      - name: Upload failure reports
        if: always() && steps.preflight.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-e2e-reports-staging
          path: tests/release/.output/
          retention-days: 7
          if-no-files-found: ignore

  # ── PR 4: Tier-2 strict billing/auth qualification ──────────────────────────
  # `workflow_dispatch` only while stability is established. NOT
  # `continue-on-error` — a red command stays red with its real exit code. Runs
  # `make qualification-tier2` (same entrypoint a laptop uses). Fail-closed on a
  # missing Stripe test key in trusted CI (the boot returns every financial cell
  # BLOCKED, which a strict verdict fails on — never skip-as-success). Runtime
  # shape (Postgres/Redis services, server venv, Stripe CLI) mirrors
  # `intent-tests.yml`'s `intent-billing` job, which boots the same shared
  # `BootedStack` machinery.
  qualification-tier2:
    name: tier-2 billing/auth (manual, strict)
    # A self-host-only dispatch must not start unrelated worlds. The self-host
    # job owns its own strict selector and provider lifecycle.
    if: github.event_name == 'workflow_dispatch' && !inputs.selfhost
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: release-e2e-tier2
      cancel-in-progress: false
    environment: Qualification
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install server (venv, matches local layout)
        run: cd server && uv venv .venv --python 3.12 && uv pip install -e ".[dev]"
      - name: Install Playwright chromium
        run: pnpm -C tests/intent exec playwright install --with-deps chromium

      - name: Install Stripe CLI
        run: |
          curl -fsSL https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public \
            | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" \
            | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update && sudo apt-get install -y stripe

      - name: Run T2-BILL (strict)
        env:
          # The boot fixture allocates the t2billing profile itself; on the
          # runner the Docker services above stand in for the local stack
          # (same wiring as intent-tests.yml's intent-billing job).
          USE_EXISTING_POSTGRES: "1"
          USE_EXISTING_REDIS: "1"
          LOCAL_PGHOST: 127.0.0.1
          CI: "true"
          # Stripe TEST key from the protected Qualification environment
          # (secret name STRIPE_TEST_SECRET_KEY). The harness generates its own
          # webhook secret and idempotently provisions test-mode price IDs, so
          # the key is the only external input. Missing in trusted CI = fail
          # (boot blocks every financial cell). Never live.
          TIER2_BILLING_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          TIER2_INTENT_SKIP_RUNTIME: "1"
        run: |
          set -euo pipefail
          make qualification-tier2 \
            PROFILE="ci-${{ github.run_id }}-${{ github.run_attempt }}" \
            BEHAVIOR=strict

      - name: Upload V4 report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tier2-billing-evidence
          path: |
            tests/release/.output/tier2/*/*/evidence/

  # ---------------------------------------------------------------------------
  # Local functional — "Complete Local Workspace Qualification (Functional)"
  # (~/Vault/Vault/Workspace/Testing/Complete Local Workspace Qualification
  # (Functional).md; specs/developing/testing/tier-3-scenario-contract.md
  # §"Local cases" LOCAL-1..7, billing carve-out excepted — see LOCAL-BILL-1..7,
  # out of scope until PR 4). This one job builds the three exact candidates,
  # runs LOCAL-WORLD-SMOKE-1, then materializes and re-hashes that exact map for
  # the functional cell set. Candidate bytes are built and published once per
  # workflow run; no second cargo/docker/pnpm build seam is entered.
  #
  # `workflow_dispatch` only, same posture as the smoke job: NOT
  # `continue-on-error`, `environment: Qualification` (protected — branch
  # policy gates which refs may run it; the BYOK/integration/LiteLLM secrets
  # below never see arbitrary pull-request code). Before dispatching this
  # manually, check the Actions tab for an in-progress/pending release-e2e.yml
  # run first — this world has its own non-cancelling concurrency group, so an
  # unrelated managed-cloud, self-host, Tier-2, or Tier-4 run cannot replace it.
  release-e2e-local-functional:
    name: local smoke + functional (manual, build once)
    if: github.event_name == 'workflow_dispatch' && !inputs.selfhost
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: release-e2e-local
      cancel-in-progress: false
    environment: Qualification
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Preflight local world before installs or candidate builds
        env:
          AGENT_GATEWAY_LITELLM_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_BASE_URL }}
          AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL }}
          AGENT_GATEWAY_LITELLM_MASTER_KEY: ${{ secrets.AGENT_GATEWAY_LITELLM_MASTER_KEY }}
          RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY }}
          RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY }}
          RELEASE_E2E_BYOK_OPENAI_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_OPENAI_API_KEY }}
          RELEASE_E2E_BYOK_XAI_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_XAI_API_KEY }}
          RELEASE_E2E_INTEGRATION_NAMESPACE: ${{ vars.RELEASE_E2E_INTEGRATION_NAMESPACE }}
          RELEASE_E2E_INTEGRATION_API_KEY: ${{ secrets.RELEASE_E2E_INTEGRATION_API_KEY }}
          SCENARIOS_INPUT: ${{ github.event.inputs.scenarios || 'all' }}
        run: |
          node scripts/ci-cd/qualification-preflight.mjs \
            --world local \
            --source-sha "${GITHUB_SHA}" \
            --run-id "qlf-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --shard-id 1 \
            --attempt "${GITHUB_RUN_ATTEMPT}" \
            --scenarios "${SCENARIOS_INPUT}" \
            --artifact-mode build \
            --output "tests/release/.output/preflight/local/qualification-preflight.json"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      # T3-INT-1's audit-readback probe (tests/release/scripts/integration_audit_probe.py)
      # runs via `uv run python …` to read the cloud_integration_tool_call_event
      # row back from the run's own Postgres — the same `spawn("uv", …)` idiom the
      # tier-2/tier-3/self-host jobs use. Without uv on PATH the probe dies
      # `spawn uv ENOENT` after a fully successful MCP tool call. Match the sibling
      # jobs (uv + python 3.12, the script's requires-python).
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build once, run the smoke, then reuse the exact candidates after clean success
        env:
          # Same LiteLLM mapping as local-world-smoke-1 above — one source of
          # truth, the protected `Qualification` environment.
          AGENT_GATEWAY_LITELLM_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_BASE_URL }}
          AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL }}
          AGENT_GATEWAY_LITELLM_MASTER_KEY: ${{ secrets.AGENT_GATEWAY_LITELLM_MASTER_KEY }}
          # CI-only server secrets (same throwaway values server-ci.yml + the
          # tier-3 job above use). T3-INT-1's audit-readback probe
          # (integration_audit_probe.py) imports `proliferate.config`, which
          # constructs Settings() at import time and requires both in non-debug
          # mode — absent, the probe exits 1 (proven: Actions run 29617987951).
          # Non-secret CI placeholders: the world's candidate Server builds its
          # own random secrets in buildServerEnv (world.ts), so nothing leaks.
          JWT_SECRET: release-e2e-ci-jwt-secret
          CLOUD_SECRET_KEY: release-e2e-ci-cloud-secret
          # BYOK provider keys for the LOCAL-3 user-key route + LOCAL-6 route
          # change (env-manifest.ts). In strict mode an absent required key
          # blocks its selected cells, cancels otherwise-runnable cells, and
          # makes the aggregate non-qualifying. Cursor has no BYOK var by
          # design — no account key here, per BRIEF §5.
          # Both the runner env names and the protected Qualification secret
          # names use the provisioned `_API_KEY` suffix. A mismatched right-hand
          # name expands to an empty value and strict preflight blocks the whole
          # local-functional matrix before a scenario can run.
          RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY }}
          RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY }}
          RELEASE_E2E_BYOK_OPENAI_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_OPENAI_API_KEY }}
          RELEASE_E2E_BYOK_XAI_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_XAI_API_KEY }}
          # LOCAL-7 MCP integration connect + audit-row assertion. The audit
          # probe reads back `cloud_integration_tool_call_event` from THIS run's
          # own ephemeral local-world Postgres, derived at runtime from the booted
          # world (`ReadyLocalWorld.db.databaseUrl`) — NOT a static
          # `RELEASE_E2E_LOCAL_DATABASE_URL` variable, which cannot name a
          # database created later inside this run.
          RELEASE_E2E_INTEGRATION_NAMESPACE: ${{ vars.RELEASE_E2E_INTEGRATION_NAMESPACE }}
          RELEASE_E2E_INTEGRATION_API_KEY: ${{ secrets.RELEASE_E2E_INTEGRATION_API_KEY }}
          # Same debug-log sibling-path convention as local-world-smoke-1
          # (outside the run dir the cleanup stack deletes on teardown).
          LOCAL_WORLD_SMOKE_DEBUG_DIR: ${{ github.workspace }}/tests/release/.output/local-world/qlf-ci-${{ github.run_id }}-${{ github.run_attempt }}/debug/logs
          SCENARIOS: ${{ github.event.inputs.scenarios || 'all' }}
          AGENTS: ${{ github.event.inputs.agents || 'all' }}
          BEHAVIOR: ${{ github.event.inputs.local_functional_behavior || 'strict' }}
        run: |
          set -euo pipefail
          profile="ci-${{ github.run_id }}-${{ github.run_attempt }}"
          smoke_rc=0
          functional_rc=0
          make qualification-local-workspace \
            PROFILE="$profile" \
            BEHAVIOR=strict || smoke_rc=$?
          candidate_dir="${GITHUB_WORKSPACE}/tests/release/.output/local-world/ql-${profile}/1"
          # A red smoke can include incomplete cleanup. Preserve its candidate
          # publication for the always-running evidence upload, but do not boot
          # a second world on the same baked ports unless smoke and cleanup both
          # completed successfully.
          if [ "$smoke_rc" -ne 0 ]; then exit "$smoke_rc"; fi
          make qualification-local-functional \
            PROFILE="$profile" \
            BEHAVIOR="$BEHAVIOR" \
            AGENTS="$AGENTS" \
            SCENARIOS="$SCENARIOS" \
            REUSE_CANDIDATES="$candidate_dir" || functional_rc=$?
          if [ "$functional_rc" -eq 2 ]; then exit 2; fi
          if [ "$functional_rc" -ne 0 ]; then exit 1; fi

      - name: Upload V4 report and bounded diagnostic logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-functional-evidence
          path: |
            tests/release/.output/local-world/*/*/evidence/
            tests/release/.output/local-world/*/*/logs/
            tests/release/.output/local-world/*/*/preflight/
            tests/release/.output/local-world/ql-*/*/candidate-build.json
            tests/release/.output/local-world/ql-*/*/local-world-ports.json
            tests/release/.output/local-world/ql-*/*/artifacts/
            tests/release/.output/local-world/**/*-cancellation-finalization.json
            tests/release/.output/preflight/local/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Self-host install — "Prove One Real Self-Hosted Installation": builds the
  # exact self-host candidate (Server image archive for the box arch +
  # release-shaped proliferate-deploy.tar.gz + controller AnyHarness +
  # renderer), provisions a run-scoped EC2 box behind a Route53 A record +
  # Caddy with the reusable public qualification wildcard certificate, runs the
  # SHIPPED install.sh on the candidate bytes,
  # and drives the four SELFHOST-INSTALL-1 cells (install/claim, desktop owner,
  # BYOK base turn, invitee). Like the local-world-smoke job it is
  # `workflow_dispatch` only and — deliberately — NOT `continue-on-error`: a red
  # command stays red with its real exit code (no skip-as-success in the strict
  # lane). It runs `make qualification-selfhost`, the exact same entrypoint a
  # laptop uses; only the AWS/SSH/BYOK input source differs (the protected
  # `Qualification` GitHub environment's vars/secrets + configured AWS creds,
  # never the ignored local secret profile).
  release-e2e-selfhost-install:
    name: selfhost-install-1 (manual, strict)
    # Gated behind an explicit self-host selection: a bare workflow_dispatch of
    # this workflow (e.g. the local-world smoke) must NOT provision EC2. Only a
    # dispatch that ticks `selfhost` fires this job.
    if: github.event_name == 'workflow_dispatch' && inputs.selfhost
    runs-on: ubuntu-latest
    # 120 (was 90): the SELFHOST-CFN-1 arm64 candidate builds under QEMU
    # emulation on the amd64 runner, which is materially slower than a native
    # build; the bound stays hard (a hung run still dies).
    timeout-minutes: 120
    concurrency:
      group: release-e2e-self-host
      cancel-in-progress: false
    environment: Qualification
    permissions:
      contents: read
      # OIDC federation to assume the run-scoped AWS role (EC2 + Route53).
      id-token: write
      # SELFHOST-CFN-1 (SH-CFN-WRAPPER) pushes the run-scoped candidate server
      # image to GHCR and deletes that run-scoped package version in cleanup.
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Preflight self-host world before installs, builds, or AWS mutation
        env:
          RELEASE_E2E_SELFHOST_REGION: ${{ vars.RELEASE_E2E_SELFHOST_REGION }}
          RELEASE_E2E_SELFHOST_HOSTED_ZONE_ID: ${{ vars.RELEASE_E2E_SELFHOST_HOSTED_ZONE_ID }}
          RELEASE_E2E_SELFHOST_INSTANCE_TYPE: ${{ vars.RELEASE_E2E_SELFHOST_INSTANCE_TYPE }}
          RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY }}
          RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY }}
          RELEASE_E2E_SELFHOST_GITHUB_OAUTH_CLIENT_ID: ${{ vars.RELEASE_E2E_SELFHOST_GITHUB_OAUTH_CLIENT_ID }}
          RELEASE_E2E_SELFHOST_GITHUB_OAUTH_SECRET: ${{ secrets.RELEASE_E2E_SELFHOST_GITHUB_OAUTH_SECRET }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_STATE: ${{ secrets.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_STATE }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_STATE: ${{ secrets.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_STATE }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_EMAIL: ${{ vars.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_EMAIL }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_EMAIL: ${{ vars.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_EMAIL }}
          RELEASE_E2E_SELFHOST_LITELLM_IMAGE_TAG: ${{ vars.RELEASE_E2E_SELFHOST_LITELLM_IMAGE_TAG }}
          RELEASE_E2E_SELFHOST_CLOUD_E2B_API_KEY: ${{ secrets.RELEASE_E2E_SELFHOST_CLOUD_E2B_API_KEY }}
          RELEASE_E2E_SELFHOST_CLOUD_E2B_TEMPLATE_NAME: ${{ vars.RELEASE_E2E_SELFHOST_CLOUD_E2B_TEMPLATE_NAME }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_ID: ${{ vars.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_ID }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_ID: ${{ vars.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_ID }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_SECRET: ${{ secrets.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_SECRET }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_PRIVATE_KEY: ${{ secrets.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_PRIVATE_KEY }}
          RELEASE_E2E_SELFHOST_CFN_BUCKET: ${{ vars.RELEASE_E2E_SELFHOST_CFN_BUCKET }}
          RELEASE_E2E_SELFHOST_CFN_IMAGE_REPO: ${{ vars.RELEASE_E2E_SELFHOST_CFN_IMAGE_REPO }}
          RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64 }}
          RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64 }}
          RELEASE_E2E_AWS_ROLE_ARN: ${{ vars.RELEASE_E2E_SELFHOST_AWS_ROLE_ARN }}
          SELFHOST_SCENARIOS_INPUT: ${{ inputs.selfhost_scenarios }}
          SELFHOST_CELLS_INPUT: ${{ inputs.selfhost_cells }}
        run: |
          node scripts/ci-cd/qualification-preflight.mjs \
            --world self-host \
            --source-sha "${GITHUB_SHA}" \
            --run-id "qs-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --shard-id 1 \
            --attempt "${GITHUB_RUN_ATTEMPT}" \
            --scenarios "${SELFHOST_SCENARIOS_INPUT:-SELFHOST-INSTALL-1}" \
            --cells "${SELFHOST_CELLS_INPUT:-all}" \
            --artifact-mode build \
            --output "tests/release/.output/preflight/self-host/qualification-preflight.json"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      # docker + buildx ship on ubuntu-latest; ensure a builder exists for the
      # single-platform `buildx build --load` the server-image candidate uses.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # SELFHOST-CFN-1 builds a linux/arm64 candidate on this amd64 runner
      # (the shipped CloudFormation wrapper only offers Graviton t4g instance
      # types); QEMU binfmt makes that cross-platform buildx build possible.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      # GHCR auth for the SELFHOST-CFN-1 candidate-image push/cleanup. The
      # repo-scoped GITHUB_TOKEN (packages: write above) is the credential; no
      # PAT is introduced.
      - name: Log in to GHCR (SELFHOST-CFN-1 candidate image push)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (run-scoped EC2 + Route53 role)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.RELEASE_E2E_SELFHOST_AWS_ROLE_ARN }}
          aws-region: ${{ vars.RELEASE_E2E_SELFHOST_REGION }}
          # Request the role's full 2h MaxSessionDuration. The default assumed
          # session is only 1h, but the SELFHOST-CFN-1 arm64 candidate build runs
          # under QEMU emulation and can take ~70min *before* the CFN world makes
          # its first AWS call — with the 1h default the token had already expired
          # by validate-template (observed: ExpiredToken on run 29598841582). 2h
          # comfortably covers build + full CREATE/verify/DELETE stack lifecycle.
          role-duration-seconds: 7200

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the self-host candidate and run the selected self-host scenarios (strict)
        env:
          # CFN cleanup resolves and deletes the exact run-scoped GHCR package
          # version through `gh api`. Docker login authenticates only Docker;
          # keep the repository token step-scoped and inherited by the cleanup
          # subprocess rather than placing it on argv or in evidence.
          GH_TOKEN: ${{ github.token }}
          # Mapped directly from the protected `Qualification` environment.
          # Arbitrary PR code never runs this job or sees these.
          RELEASE_E2E_SELFHOST_REGION: ${{ vars.RELEASE_E2E_SELFHOST_REGION }}
          RELEASE_E2E_SELFHOST_HOSTED_ZONE_ID: ${{ vars.RELEASE_E2E_SELFHOST_HOSTED_ZONE_ID }}
          RELEASE_E2E_SELFHOST_INSTANCE_TYPE: ${{ vars.RELEASE_E2E_SELFHOST_INSTANCE_TYPE }}
          RELEASE_E2E_SELFHOST_SSH_USER: ${{ vars.RELEASE_E2E_SELFHOST_SSH_USER }}
          # Bounded BYOK provider keys — secrets, never printed, never stored in
          # evidence (only safe id hashes leave the fixtures).
          RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_A_API_KEY }}
          RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY: ${{ secrets.RELEASE_E2E_BYOK_ANTHROPIC_B_API_KEY }}
          # SH-GITHUB-AUTH (SELFHOST-QUAL-1): the fixed-origin OAuth app + the two
          # GitHub identities' rotating browser-session seeds + verified emails.
          RELEASE_E2E_SELFHOST_GITHUB_OAUTH_CLIENT_ID: ${{ vars.RELEASE_E2E_SELFHOST_GITHUB_OAUTH_CLIENT_ID }}
          RELEASE_E2E_SELFHOST_GITHUB_OAUTH_SECRET: ${{ secrets.RELEASE_E2E_SELFHOST_GITHUB_OAUTH_SECRET }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_STATE: ${{ secrets.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_STATE }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_STATE: ${{ secrets.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_STATE }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_EMAIL: ${{ vars.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_A_EMAIL }}
          RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_EMAIL: ${{ vars.RELEASE_E2E_SELFHOST_GITHUB_IDENTITY_B_EMAIL }}
          # SH-GATEWAY (SELFHOST-QUAL-1): the immutable LiteLLM image tag to pin.
          RELEASE_E2E_SELFHOST_LITELLM_IMAGE_TAG: ${{ vars.RELEASE_E2E_SELFHOST_LITELLM_IMAGE_TAG }}
          # SH-CLOUD-ADDON (SELFHOST-QUAL-1): the instance's own E2B account +
          # self-built template + cloud add-on GitHub App (distinct from the
          # managed-cloud RELEASE_E2E_CLOUD_GITHUB_APP_* set).
          RELEASE_E2E_SELFHOST_CLOUD_E2B_API_KEY: ${{ secrets.RELEASE_E2E_SELFHOST_CLOUD_E2B_API_KEY }}
          RELEASE_E2E_SELFHOST_CLOUD_E2B_TEMPLATE_NAME: ${{ vars.RELEASE_E2E_SELFHOST_CLOUD_E2B_TEMPLATE_NAME }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_ID: ${{ vars.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_ID }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_ID: ${{ vars.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_ID }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_SECRET: ${{ secrets.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_CLIENT_SECRET }}
          RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_PRIVATE_KEY: ${{ secrets.RELEASE_E2E_SELFHOST_CLOUD_GITHUB_APP_PRIVATE_KEY }}
          # SH-CFN-WRAPPER (SELFHOST-CFN-1): run-scoped bundle bucket + candidate
          # image repo.
          RELEASE_E2E_SELFHOST_CFN_BUCKET: ${{ vars.RELEASE_E2E_SELFHOST_CFN_BUCKET }}
          RELEASE_E2E_SELFHOST_CFN_IMAGE_REPO: ${{ vars.RELEASE_E2E_SELFHOST_CFN_IMAGE_REPO }}
          # Reused public wildcard certificate capacity: avoids one production
          # ACME issuance for every disposable qualification box.
          RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64 }}
          RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64 }}
          # The requested scenario list + optional matrix-cell filter + candidate
          # platform, mapped through env (NOT interpolated into the script) so a
          # crafted workflow_dispatch value cannot inject shell into this
          # secret-bearing job (PR7-CONTROL-002).
          SELFHOST_SCENARIOS_INPUT: ${{ inputs.selfhost_scenarios }}
          SELFHOST_CELLS_INPUT: ${{ inputs.selfhost_cells }}
          SELFHOST_CANDIDATE_PLATFORM_INPUT: ${{ inputs.selfhost_candidate_platform }}
          SELFHOST_API_BASE_URL_INPUT: ${{ inputs.selfhost_api_base_url }}
        run: |
          set -euo pipefail
          # Validate the requested scenarios against the bounded self-host set
          # BEFORE they reach Make. The value arrives via env (never interpolated),
          # is split on commas, and every entry must be a known self-host scenario
          # id — otherwise fail closed. This makes shell metacharacters inert
          # (they simply fail the allowlist) and rejects unknown ids.
          allowed="SELFHOST-INSTALL-1 SELFHOST-QUAL-1 SELFHOST-ISOLATION-1 SELFHOST-CFN-1"
          requested="${SELFHOST_SCENARIOS_INPUT:-SELFHOST-INSTALL-1}"
          IFS=',' read -ra parts <<< "$requested"
          clean=""
          for raw in "${parts[@]}"; do
            id="$(printf '%s' "$raw" | tr -d '[:space:]')"
            [ -z "$id" ] && continue
            case " $allowed " in
              *" $id "*) clean="${clean:+$clean,}$id" ;;
              *) echo "::error title=Invalid self-host scenario::'$id' is not in the bounded set: $allowed"; exit 2 ;;
            esac
          done
          [ -n "$clean" ] || { echo "::error::no valid self-host scenario requested"; exit 2; }
          # --cells is optional and, if present, must be one of the known cell
          # names; validate the same way so it too cannot inject.
          allowed_cells="SH-INSTALL-CLAIM SH-DESKTOP-OWNER SH-BASE-TURN SH-INVITEE SH-GITHUB-AUTH SH-GATEWAY SH-CLOUD-ADDON SH-SWITCH-ISOLATION SH-CFN-WRAPPER"
          cells_arg=""
          # Literal "all" means "no cell filter" — the runner/preflight contract
          # (qualification-preflight.mjs parseSelector) treats "all" as select-
          # everything, and the preflight step above already defaults to it. It
          # must therefore pass this allowlist too, not fail closed (observed:
          # run 29630600180 died on `selfhost_cells=all` in 49s).
          cells_normalized="$(printf '%s' "${SELFHOST_CELLS_INPUT:-}" | tr -d '[:space:]')"
          if [ "$cells_normalized" = "all" ]; then
            SELFHOST_CELLS_INPUT=""
          fi
          if [ -n "${SELFHOST_CELLS_INPUT:-}" ]; then
            IFS=',' read -ra cparts <<< "$SELFHOST_CELLS_INPUT"
            cclean=""
            for raw in "${cparts[@]}"; do
              c="$(printf '%s' "$raw" | tr -d '[:space:]')"
              [ -z "$c" ] && continue
              case " $allowed_cells " in
                *" $c "*) cclean="${cclean:+$cclean,}$c" ;;
                *) echo "::error title=Invalid self-host cell::'$c' is not a known cell"; exit 2 ;;
              esac
            done
            # An EXPLICITLY nonempty cell selector that normalizes to empty (only
            # commas/whitespace) must FAIL CLOSED (PR7-CONTROL-005), not silently
            # fall through to "no filter" (which would run every cell).
            [ -n "$cclean" ] || { echo "::error title=Empty self-host cell selector::selfhost_cells was provided but normalized to empty"; exit 2; }
            cells_arg="$cclean"
          fi
          # Candidate platform: only the two supported docker platforms.
          platform="${SELFHOST_CANDIDATE_PLATFORM_INPUT:-linux/amd64}"
          case "$platform" in
            linux/amd64|linux/arm64) ;;
            *) echo "::error title=Invalid platform::'$platform' must be linux/amd64 or linux/arm64"; exit 2 ;;
          esac
          # API base URL: optional, but when present it must be EXACTLY the fixed
          # serial-lane origin (the only origin the SH-GITHUB-AUTH OAuth callback
          # is registered against). Validate to that literal so a crafted value
          # cannot reach Make (PR7-CONTROL-002); an unexpected value fails closed.
          api_base_url="${SELFHOST_API_BASE_URL_INPUT:-}"
          if [ -n "$api_base_url" ] && \
             [ "$api_base_url" != "https://selfhost-fixed.qualification.proliferate.com" ]; then
            echo "::error title=Invalid API base URL::selfhost_api_base_url, when set, must be exactly https://selfhost-fixed.qualification.proliferate.com"
            exit 2
          fi
          # SELFHOST_SCENARIOS / SELFHOST_CELLS / SELFHOST_CANDIDATE_PLATFORM are
          # passed to Make as quoted, already-validated values. SELFHOST_API_BASE_URL
          # is exported into Make's environment (the recipe reads it as a shell env
          # var, never a Make expansion) so the value stays inert data.
          export SELFHOST_API_BASE_URL="$api_base_url"
          make qualification-selfhost \
            PROFILE="ci-${{ github.run_id }}-${{ github.run_attempt }}" \
            BEHAVIOR=strict \
            SELFHOST_SCENARIOS="$clean" \
            SELFHOST_CELLS="$cells_arg" \
            SELFHOST_CANDIDATE_PLATFORM="$platform"

      - name: Upload V4 report and bounded diagnostic logs
        # Actions-durable (SHR-006): `if: always()` already runs this step on an
        # interrupted/failed job, not just a green one; the ledger glob below is
        # what makes the run's cleanup-ledger.json land in that upload — without
        # it the ledger (written directly under the run dir, one level above
        # `evidence/`/`logs/`) never reached CI artifacts even though the step
        # itself always ran. See `cleanup-ledger-artifact-upload.test.ts` for the
        # unit proof that the ledger's on-disk path matches this glob.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: selfhost-evidence
          # SHR-006 / PR7-CONTROL-008: upload EVERY run's cleanup ledger, not just
          # the top-level install one. The nested worlds write their ledgers one
          # level deeper — SELFHOST-CFN-1 under `.../cfn/`, and SELFHOST-ISOLATION-1's
          # two boxes under `.../server-a/` and `.../server-b/` — so the two-level
          # glob missed them. The `**` globs make every ledger (and its evidence +
          # logs) Actions-durable on an interrupted/failed run.
          path: |
            tests/release/.output/selfhost-world/**/evidence/
            tests/release/.output/selfhost-world/**/logs/
            tests/release/.output/selfhost-world/**/cleanup-ledger.json
            tests/release/.output/selfhost-world/**/*-cancellation-finalization.json
            tests/release/.output/preflight/self-host/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Managed-cloud smoke — "Prove One Real Managed-Cloud Workspace": builds the
  # six exact managed-cloud candidates (Server linux/amd64, the three musl
  # runtime binaries, the git-credential-helper, the Desktop renderer targeted
  # at the run's public candidate-API origin), provisions the run-scoped
  # EC2+Route53 ingress and the immutable E2B template, and drives one real
  # cheap managed-gateway turn inside a genuine E2B sandbox through the actual
  # product UI (the CLOUD-PROVISION-1 cell). One new job per world (extension
  # contract) — the local-world-smoke job above is untouched.
  #
  # `workflow_dispatch` only, same posture as local-world-smoke-1: NOT
  # `continue-on-error` (a red command stays red with its real exit code), the
  # `Qualification` environment supplies every secret/var (never routed to
  # arbitrary pull-request code), and the evidence/log upload runs `if:
  # always()`. Until the D2 bot-login seed exists, the GitHub OAuth serial
  # step inside the scenario reports blocked honestly (never skip-as-success)
  # — this job is still expected to run and upload evidence for every other
  # step.
  release-e2e-managed-cloud:
    name: cloud-provision-1 (manual, strict)
    if: github.event_name == 'workflow_dispatch' && !inputs.selfhost
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: release-e2e-managed-cloud
      cancel-in-progress: false
    environment: Qualification
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch the trusted default-branch cleanup authorization
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .qualification-trusted-default
          fetch-depth: 1
          sparse-checkout: tests/release/fixtures/managed-cloud-litellm-attribution-attestations.v1.json
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Preflight managed cloud before installs, builds, or provider mutation
        env:
          AGENT_GATEWAY_LITELLM_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_BASE_URL }}
          AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL }}
          AGENT_GATEWAY_LITELLM_MASTER_KEY: ${{ secrets.AGENT_GATEWAY_LITELLM_MASTER_KEY }}
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.RELEASE_E2E_E2B_API_KEY }}
          RELEASE_E2E_E2B_TEAM_ID: ${{ vars.RELEASE_E2E_E2B_TEAM_ID }}
          RELEASE_E2E_CLOUD_AWS_REGION: ${{ vars.RELEASE_E2E_CLOUD_AWS_REGION }}
          RELEASE_E2E_CLOUD_ROUTE53_ZONE_ID: ${{ vars.RELEASE_E2E_CLOUD_ROUTE53_ZONE_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_ID: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_APP_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_ID: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_INSTALLATION_ID: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_APP_INSTALLATION_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_PRIVATE_KEY: ${{ secrets.RELEASE_E2E_CLOUD_GITHUB_APP_PRIVATE_KEY }}
          RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_SECRET: ${{ secrets.RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASE_E2E_CLOUD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASE_E2E_CLOUD_AWS_SECRET_ACCESS_KEY }}
          RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64 }}
          RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64 }}
        run: |
          node scripts/ci-cd/qualification-preflight.mjs \
            --world managed-cloud \
            --source-sha "${GITHUB_SHA}" \
            --run-id "qlc-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --shard-id 1 \
            --attempt "${GITHUB_RUN_ATTEMPT}" \
            --scenarios CLOUD-PROVISION-1 \
            --artifact-mode build \
            --cleanup-attestation-repository "${GITHUB_WORKSPACE}/.qualification-trusted-default" \
            --cleanup-attestation-default-branch "${{ github.event.repository.default_branch }}" \
            --cleanup-attestations "${GITHUB_WORKSPACE}/.qualification-trusted-default/tests/release/fixtures/managed-cloud-litellm-attribution-attestations.v1.json" \
            --output "tests/release/.output/preflight/managed-cloud/qualification-preflight.json"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      # The scenario's E2B provider probe and cleanup kill-registration shell
      # out to `uv run python scripts/e2b_sandbox_probe.py` (e2b-verify.ts) —
      # without uv the probe dies `spawn uv ENOENT`, which ALSO strands the
      # provider-sandbox kill (the releaser registers kills from probe
      # results), leaving the run-scoped template undeletable. Same setup the
      # tier-3 lanes use.
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install MUSL target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Install E2B CLI
        # Only used by the world's `e2b_template` cleanup releaser
        # (`template.ts`'s `E2bTemplateBuilder.deleteTemplate`); the build
        # itself goes through the `e2b` SDK dependency already in the
        # workspace lockfile.
        run: npm install -g @e2b/cli

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the six exact candidates and run CLOUD-PROVISION-1 (strict)
        env:
          # Mapped directly from the protected `Qualification` environment,
          # same LiteLLM inputs as local-world-smoke-1 plus the cloud-only
          # inputs (tests/release/src/config/env-manifest.ts). Arbitrary PR
          # code never runs this job or sees these.
          AGENT_GATEWAY_LITELLM_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_BASE_URL }}
          AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL }}
          AGENT_GATEWAY_LITELLM_MASTER_KEY: ${{ secrets.AGENT_GATEWAY_LITELLM_MASTER_KEY }}
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.RELEASE_E2E_E2B_API_KEY }}
          RELEASE_E2E_E2B_TEAM_ID: ${{ vars.RELEASE_E2E_E2B_TEAM_ID }}
          RELEASE_E2E_CLOUD_AWS_REGION: ${{ vars.RELEASE_E2E_CLOUD_AWS_REGION }}
          RELEASE_E2E_CLOUD_ROUTE53_ZONE_ID: ${{ vars.RELEASE_E2E_CLOUD_ROUTE53_ZONE_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_ID: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_APP_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_ID: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_INSTALLATION_ID: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_APP_INSTALLATION_ID }}
          RELEASE_E2E_CLOUD_GITHUB_APP_PRIVATE_KEY: ${{ secrets.RELEASE_E2E_CLOUD_GITHUB_APP_PRIVATE_KEY }}
          RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_SECRET: ${{ secrets.RELEASE_E2E_CLOUD_GITHUB_APP_CLIENT_SECRET }}
          # MCW-004: optional override of the SSM parameter NAME holding the
          # durable D2 bot refresh-token seed (not a credential itself — the
          # value is read/written via the ambient AWS creds below). Empty is
          # fine; the resolver falls back to DEFAULT_BOT_SEED_SSM_PARAMETER.
          RELEASE_E2E_CLOUD_GITHUB_BOT_SEED_SSM_PARAMETER: ${{ vars.RELEASE_E2E_CLOUD_GITHUB_BOT_SEED_SSM_PARAMETER }}
          # AWS credentials stay ambient (the `aws` CLI reads them directly),
          # never a manifest var — matching the self-host precedent. The same
          # credentials this job already uses for EC2/Route53 are what the
          # SSM bot-seed fallback (box-seeds.ts) shells out with.
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASE_E2E_CLOUD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASE_E2E_CLOUD_AWS_SECRET_ACCESS_KEY }}
          # Reused public wildcard certificate capacity: browsers still verify
          # a publicly trusted chain, while disposable boxes never call ACME.
          RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_CERTIFICATE_B64 }}
          RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64: ${{ secrets.RELEASE_E2E_QUALIFICATION_TLS_PRIVATE_KEY_B64 }}
          # Same bounded, secret-free diagnostics convention as local-world-smoke-1.
          MANAGED_CLOUD_SMOKE_DEBUG_DIR: ${{ github.workspace }}/tests/release/.output/managed-cloud-world/qlc-ci-${{ github.run_id }}-${{ github.run_attempt }}/debug/logs
        run: |
          set -euo pipefail
          make qualification-managed-cloud \
            PROFILE="ci-${{ github.run_id }}-${{ github.run_attempt }}" \
            BEHAVIOR=strict \
            QUALIFICATION_TRUSTED_CLEANUP_REPOSITORY="${GITHUB_WORKSPACE}/.qualification-trusted-default" \
            QUALIFICATION_TRUSTED_CLEANUP_DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

      - name: Upload V4 report and bounded diagnostic logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloud-provision-1-evidence
          path: |
            tests/release/.output/managed-cloud-world/*/*/evidence/
            tests/release/.output/managed-cloud-world/*/*/logs/
            tests/release/.output/managed-cloud-world/**/*-cancellation-finalization.json
            tests/release/.output/preflight/managed-cloud/
          retention-days: 7
          if-no-files-found: ignore
