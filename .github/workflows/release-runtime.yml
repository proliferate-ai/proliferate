name: Release Runtime

on:
  push:
    tags:
      - "runtime-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the full pipeline without publishing or creating a release"
        type: boolean
        default: false
  workflow_call:
    inputs:
      git_sha:
        description: "Commit SHA to package. Defaults to the caller ref."
        required: false
        type: string
      version:
        description: "Runtime version to release. Required for reusable releases."
        required: false
        type: string
      dry_run:
        description: "Run the full pipeline without publishing or creating a release"
        type: boolean
        default: false
      publish:
        description: "Publish npm package and GitHub Release"
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha || github.ref }}

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Stamp the release semver into the binaries so `anyharness --version`
      # and the runtime `/health` version report the pinned version instead
      # of the crate's hardcoded Cargo.toml version. build.rs in the anyharness,
      # anyharness-lib, and proliferate-worker crates reads this env; the
      # self-update preflight and health-gate require an exact match to the pin.
      # workflow_call passes the bare semver (inputs.version); a direct
      # `runtime-v<semver>` tag push derives it by stripping the tag prefix.
      # Anything else (e.g. a workflow_dispatch dry run) leaves it unset so the
      # build falls back to the Cargo.toml version.
      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "PROLIFERATE_BUILD_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF_NAME:-}" == runtime-v* ]]; then
            echo "PROLIFERATE_BUILD_VERSION=${GITHUB_REF_NAME#runtime-v}" >> "$GITHUB_ENV"
          fi

      - name: Install musl-tools (x86_64 linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} -p anyharness -p proliferate-worker -p proliferate-supervisor

      - name: Build (cross — aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }} -p anyharness -p proliferate-worker -p proliferate-supervisor

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar czf anyharness-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            anyharness \
            proliferate-worker \
            proliferate-supervisor

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path `
              "target/${{ matrix.target }}/release/anyharness.exe", `
              "target/${{ matrix.target }}/release/proliferate-worker.exe", `
              "target/${{ matrix.target }}/release/proliferate-supervisor.exe" `
            -DestinationPath "anyharness-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: anyharness-${{ matrix.target }}
          path: anyharness-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish-sdk:
    name: Publish SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Generate and build SDK
        working-directory: anyharness/sdk
        run: |
          mkdir -p generated src/generated
          pnpm run generate
          pnpm run build

      - name: Publish to npm
        if: (github.event_name == 'push' || inputs.publish) && !inputs.dry_run
        working-directory: anyharness/sdk
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::warning::NPM_TOKEN is not configured; skipping @anyharness/sdk npm publish."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish
        if: (github.event_name != 'push' && !inputs.publish) || inputs.dry_run
        working-directory: anyharness/sdk
        run: npm publish --access public --dry-run

  create-release:
    name: Release summary
    needs: [build-binaries, publish-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha || github.ref }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS + per-asset checksums
        run: |
          cd artifacts
          sha256sum anyharness-* > SHA256SUMS
          cat SHA256SUMS
          # Also emit a per-asset `<asset>.sha256` next to each artifact. The
          # sandbox worker's runtime self-update derives the checksum URL from
          # the binary's resolved CDN location (`<binary>.sha256`) rather than
          # parsing SHA256SUMS, matching the worker binary path — so the CDN
          # mirror needs a sibling checksum per asset.
          for asset in anyharness-*; do
            case "$asset" in
              *.sha256) continue ;;
            esac
            sha256sum "$asset" | cut -d' ' -f1 > "${asset}.sha256"
          done

      - name: Ensure runtime release tag exists
        if: github.event_name == 'workflow_call' && inputs.publish && !inputs.dry_run
        env:
          RELEASE_TAG: ${{ format('runtime-v{0}', inputs.version) }}
          RELEASE_TARGET: ${{ inputs.git_sha }}
        run: |
          set -euo pipefail
          : "${RELEASE_TAG:?Missing runtime release tag.}"
          : "${RELEASE_TARGET:?Missing runtime release target.}"
          existing_target="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | awk '{ print $1 }' | head -n 1)"
          if [[ -n "$existing_target" && "$existing_target" != "$RELEASE_TARGET" ]]; then
            echo "::error::Runtime tag $RELEASE_TAG already exists at $existing_target, not $RELEASE_TARGET."
            exit 1
          fi
          if [[ -z "$existing_target" ]]; then
            git tag "$RELEASE_TAG" "$RELEASE_TARGET"
            git push origin "refs/tags/$RELEASE_TAG"
          fi

      - name: Create GitHub Release
        if: (github.event_name == 'push' || inputs.publish) && !inputs.dry_run
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          target_commitish: ${{ inputs.git_sha || github.sha }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('runtime-v{0}', inputs.version) }}
          files: |
            artifacts/anyharness-*
            artifacts/SHA256SUMS

  publish-cdn:
    name: Publish runtime + worker CDN trees
    needs: [create-release]
    if: (github.event_name == 'push' || inputs.publish) && !inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha || github.ref }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          # Same role/bucket the desktop release uses for the desktop/ tree; the
          # runtime/ and worker/ trees live in the same downloads bucket.
          role-to-assume: ${{ vars.AWS_DESKTOP_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          version="$INPUT_VERSION"
          if [[ "${GITHUB_REF_NAME:-}" == runtime-v* ]]; then
            version="${GITHUB_REF_NAME#runtime-v}"
          fi
          : "${version:?Missing runtime release version.}"
          echo "RUNTIME_RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Publish bare binaries to the downloads CDN
        # Nothing published the worker/ or runtime/ bare-binary trees before this
        # step: release-runtime.yml only attached them to the GitHub Release, but
        # the sandbox self-update path (server runtime/worker redirects) reads the
        # CDN, not GitHub. Publish both trees, version-pinned and as the unpinned
        # stable "latest" the redirect falls back to.
        run: |
          bash scripts/ci-cd/publish-runtime-cdn.sh \
            --artifacts-dir artifacts \
            --version "$RUNTIME_RELEASE_VERSION" \
            --bucket "${{ vars.DESKTOP_DOWNLOADS_S3_BUCKET }}" \
            --publish-latest

      - name: Invalidate CloudFront cache for the stable latest pointers
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DESKTOP_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/runtime/stable/*" "/worker/stable/*"
