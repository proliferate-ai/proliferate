name: Release E2E — managed-cloud hard-cancel cleanup

# `if: always()` steps in Release E2E cannot run after a job timeout or whole
# workflow cancellation. This independent workflow runs from the exact trusted
# default-branch revision that received the workflow_run event; it never checks
# out or executes the source run's branch. AWS's exact Purpose/RunId/ShardId
# tags are the durable custody record that survives loss of the original runner
# disk.
on:
  workflow_run:
    workflows: ["Release E2E (tier 3)"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: >-
    release-e2e-managed-cloud-cleanup-${{
      github.event.workflow_run.id
    }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: false

jobs:
  classify-source:
    name: Classify the exact Release E2E managed-cloud job
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
      TARGET_WORKFLOW_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      TARGET_SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
    outputs:
      cleanup_sha: ${{ steps.policy.outputs.cleanup_sha }}
      source_sha: ${{ steps.policy.outputs.source_sha }}
      cleanup_required: ${{ steps.classify.outputs.cleanup_required || steps.policy.outputs.cleanup_required }}
      managed_cloud_started: ${{ steps.classify.outputs.managed_cloud_started }}
      job_conclusion: ${{ steps.classify.outputs.job_conclusion }}
    steps:
      - name: Initialize bounded failed source-classification receipt
        id: policy
        shell: bash
        env:
          CLEANUP_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "${CLEANUP_SHA}" =~ ^[0-9a-f]{40}$ ]] || [[ ! "${TARGET_SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Workflow source custody is malformed." >&2
            exit 2
          fi
          # Conservative default: only an exhaustive absent/skipped classification
          # may override this to false. API/setup/upload failure still reaps.
          echo "cleanup_sha=${CLEANUP_SHA}" >> "${GITHUB_OUTPUT}"
          echo "source_sha=${TARGET_SOURCE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "cleanup_required=true" >> "${GITHUB_OUTPUT}"
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const receipt = path.join(process.env.RUNNER_TEMP, "managed-cloud-source-classification.json");
          fs.writeFileSync(receipt, `${JSON.stringify({
            kind: "release_e2e_managed_cloud_source_classification",
            schema_version: 1,
            workflow_run_id: process.env.TARGET_WORKFLOW_RUN_ID,
            workflow_run_attempt: Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT),
            cleanup_sha: process.env.CLEANUP_SHA,
            source_sha: process.env.TARGET_SOURCE_SHA,
            status: "failed",
            reason: "Source classification did not complete.",
          })}\n`, { mode: 0o600 });
          NODE

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify exact trusted cleanup revision
        id: custody
        shell: bash
        env:
          CLEANUP_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "${CLEANUP_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Trusted cleanup revision is malformed." >&2
            exit 2
          fi
          actual_sha="$(git rev-parse HEAD)"
          if [ "${actual_sha}" != "${CLEANUP_SHA}" ]; then
            echo "Checked-out cleanup revision does not match the trusted workflow revision." >&2
            exit 2
          fi
          echo "cleanup_sha=${actual_sha}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Inspect the exact attempt's exhaustive job inventory
        id: classify
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CLEANUP_SHA: ${{ steps.custody.outputs.cleanup_sha }}
        run: |
          set -euo pipefail
          receipt="${RUNNER_TEMP}/managed-cloud-source-classification.json"
          timeout --kill-after=30s 5m node scripts/ci-cd/classify-release-e2e-managed-cloud.mjs \
            --workflow-run-id "${TARGET_WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${TARGET_WORKFLOW_RUN_ATTEMPT}" \
            --cleanup-sha "${CLEANUP_SHA}" \
            | tee "${receipt}"
          node - "${receipt}" <<'NODE'
          const fs = require("node:fs");
          const row = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (
            row.kind !== "release_e2e_managed_cloud_source_classification" ||
            row.schema_version !== 1 ||
            row.workflow_run_id !== process.env.TARGET_WORKFLOW_RUN_ID ||
            row.workflow_run_attempt !== Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT) ||
            row.cleanup_sha !== process.env.CLEANUP_SHA ||
            row.status !== "classified" ||
            row.source_sha !== process.env.TARGET_SOURCE_SHA ||
            typeof row.managed_cloud_started !== "boolean" ||
            typeof row.job_conclusion !== "string"
          ) {
            throw new Error("Managed-cloud source classification receipt is malformed.");
          }
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `source_sha=${row.source_sha}\nmanaged_cloud_started=${row.managed_cloud_started}\n` +
              `cleanup_required=${row.managed_cloud_started}\njob_conclusion=${row.job_conclusion}\n`,
          );
          NODE

      - name: Finalize bounded source-classification receipt
        if: always()
        shell: bash
        env:
          CLEANUP_SHA: ${{ github.sha }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const receipt = path.join(process.env.RUNNER_TEMP, "managed-cloud-source-classification.json");
          const failed = (reason) => ({
            kind: "release_e2e_managed_cloud_source_classification",
            schema_version: 1,
            workflow_run_id: process.env.TARGET_WORKFLOW_RUN_ID,
            workflow_run_attempt: Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT),
            cleanup_sha: process.env.CLEANUP_SHA,
            source_sha: process.env.TARGET_SOURCE_SHA,
            status: "failed",
            reason,
          });
          let row;
          try {
            row = JSON.parse(fs.readFileSync(receipt, "utf8"));
          } catch {
            row = failed("Source-classification receipt was missing or malformed.");
          }
          const common =
            row?.kind === "release_e2e_managed_cloud_source_classification" &&
            row?.schema_version === 1 &&
            row?.workflow_run_id === process.env.TARGET_WORKFLOW_RUN_ID &&
            row?.workflow_run_attempt === Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT) &&
            row?.cleanup_sha === process.env.CLEANUP_SHA &&
            row?.source_sha === process.env.TARGET_SOURCE_SHA;
          const success =
            common &&
            row.status === "classified" &&
            typeof row.managed_cloud_started === "boolean" &&
            typeof row.job_conclusion === "string" &&
            row.job_conclusion.length > 0 &&
            row.job_conclusion.length <= 100;
          const failure =
            common &&
            row.status === "failed" &&
            typeof row.reason === "string" &&
            row.reason.length > 0 &&
            row.reason.length <= 400;
          if (!success && !failure) {
            row = failed("Source-classification receipt was missing or malformed.");
          }
          fs.writeFileSync(receipt, `${JSON.stringify(row)}\n`, { mode: 0o600 });
          if (!success) process.exitCode = 2;
          NODE

      - name: Upload bounded source classification receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: managed-cloud-hard-cancel-source-${{ env.TARGET_WORKFLOW_RUN_ID }}-${{ env.TARGET_WORKFLOW_RUN_ATTEMPT }}
          path: ${{ runner.temp }}/managed-cloud-source-classification.json
          retention-days: 14
          if-no-files-found: error

  managed-cloud-aws:
    name: Reconcile exact run-owned managed-cloud AWS resources
    needs: classify-source
    if: >-
      always() &&
      (needs.classify-source.result != 'success' ||
      needs.classify-source.outputs.cleanup_required == 'true') &&
      needs.classify-source.outputs.cleanup_sha != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Qualification
    env:
      TARGET_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
      TARGET_WORKFLOW_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
    steps:
      - name: Initialize bounded failed AWS cleanup receipt
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/managed-cloud-cleanup"
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const receipt = path.join(process.env.RUNNER_TEMP, "managed-cloud-cleanup", "report.json");
          fs.writeFileSync(receipt, `${JSON.stringify({
            kind: "managed_cloud_aws_hard_cancel_cleanup",
            schema_version: 1,
            workflow_run_id: process.env.TARGET_WORKFLOW_RUN_ID,
            workflow_run_attempt: Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT),
            cleanup_sha: process.env.CLEANUP_SHA,
            status: "failed",
            reason: "AWS cleanup process did not emit a terminal receipt (timeout, crash, or runner interruption).",
          })}\n`, { mode: 0o600 });
          NODE

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.classify-source.outputs.cleanup_sha }}
          persist-credentials: false

      - name: Verify exact cleanup revision
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          if [[ ! "${CLEANUP_SHA}" =~ ^[0-9a-f]{40}$ ]] || [ "${actual_sha}" != "${CLEANUP_SHA}" ]; then
            echo "AWS cleanup checkout does not match the classified cleanup revision." >&2
            exit 2
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Reconcile exact run-owned AWS resources
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
          RELEASE_E2E_CLOUD_AWS_REGION: ${{ vars.RELEASE_E2E_CLOUD_AWS_REGION }}
          RELEASE_E2E_CLOUD_ROUTE53_ZONE_ID: ${{ vars.RELEASE_E2E_CLOUD_ROUTE53_ZONE_ID }}
          RELEASE_E2E_CLOUD_AWS_RECEIPT_PATH: ${{ runner.temp }}/managed-cloud-cleanup/report.json
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASE_E2E_CLOUD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASE_E2E_CLOUD_AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          timeout --kill-after=30s 15m node scripts/ci-cd/reap-managed-cloud-aws.mjs \
            --workflow-run-id "${TARGET_WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${TARGET_WORKFLOW_RUN_ATTEMPT}" \
            --cleanup-sha "${CLEANUP_SHA}"

      - name: Finalize bounded AWS cleanup receipt
        if: always()
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
          RELEASE_E2E_CLOUD_AWS_RECEIPT_PATH: ${{ runner.temp }}/managed-cloud-cleanup/report.json
        run: |
          bash scripts/ci-cd/finalize-managed-cloud-aws-receipt.sh

      - name: Upload bounded cleanup receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: managed-cloud-hard-cancel-cleanup-${{ env.TARGET_WORKFLOW_RUN_ID }}-${{ env.TARGET_WORKFLOW_RUN_ATTEMPT }}
          path: ${{ runner.temp }}/managed-cloud-cleanup/report.json
          retention-days: 14
          if-no-files-found: error

  managed-cloud-providers:
    name: Reconcile exact run-owned E2B, Stripe, and LiteLLM resources
    needs: classify-source
    if: >-
      always() &&
      (needs.classify-source.result != 'success' ||
      needs.classify-source.outputs.cleanup_required == 'true') &&
      needs.classify-source.outputs.cleanup_sha != '' &&
      needs.classify-source.outputs.source_sha != ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Qualification
    env:
      TARGET_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
      TARGET_WORKFLOW_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
    steps:
      - name: Initialize bounded failed provider cleanup receipt
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/managed-cloud-provider-cleanup"
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const receipt = path.join(process.env.RUNNER_TEMP, "managed-cloud-provider-cleanup", "report.json");
          fs.writeFileSync(receipt, `${JSON.stringify({
            kind: "managed_cloud_provider_hard_cancel_cleanup",
            schema_version: 1,
            workflow_run_id: process.env.TARGET_WORKFLOW_RUN_ID,
            workflow_run_attempt: Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT),
            cleanup_sha: process.env.CLEANUP_SHA,
            status: "failed",
            reason: "Provider cleanup did not complete.",
          })}\n`, { mode: 0o600 });
          NODE

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.classify-source.outputs.cleanup_sha }}
          persist-credentials: false

      - name: Verify exact cleanup revision
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          if [[ ! "${CLEANUP_SHA}" =~ ^[0-9a-f]{40}$ ]] || [ "${actual_sha}" != "${CLEANUP_SHA}" ]; then
            echo "Provider cleanup checkout does not match the classified cleanup revision." >&2
            exit 2
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 10

      - name: Read the trusted source-attribution attestation
        id: attribution
        shell: bash
        run: |
          set -euo pipefail
          attribution="$(node scripts/ci-cd/detect-managed-cloud-litellm-attribution.mjs \
            --source-sha "${{ needs.classify-source.outputs.source_sha }}")"
          if [ "${attribution}" != "true" ] && [ "${attribution}" != "false" ]; then
            echo "Source attribution detector returned an invalid value." >&2
            exit 2
          fi
          echo "litellm_attribution=${attribution}" >> "${GITHUB_OUTPUT}"

      - name: Install provider cleanup dependencies
        run: |
          set -euo pipefail
          timeout --kill-after=30s 5m pnpm install --frozen-lockfile
          timeout --kill-after=30s 2m npm install -g @e2b/cli@2.13.3

      - name: Reconcile exact run-owned provider resources
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
          RELEASE_E2E_E2B_API_KEY: ${{ secrets.RELEASE_E2E_E2B_API_KEY }}
          RELEASE_E2E_E2B_TEAM_ID: ${{ vars.RELEASE_E2E_E2B_TEAM_ID }}
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          AGENT_GATEWAY_LITELLM_BASE_URL: ${{ vars.AGENT_GATEWAY_LITELLM_BASE_URL }}
          AGENT_GATEWAY_LITELLM_MASTER_KEY: ${{ secrets.AGENT_GATEWAY_LITELLM_MASTER_KEY }}
        run: |
          set -euo pipefail
          cd tests/release
          timeout --kill-after=30s 20m pnpm exec tsx src/cli/reap-managed-cloud-providers.ts \
            --workflow-run-id "${TARGET_WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${TARGET_WORKFLOW_RUN_ATTEMPT}" \
            --cleanup-sha "${CLEANUP_SHA}" \
            --source-supports-litellm-attribution "${{ steps.attribution.outputs.litellm_attribution }}" \
            | tee "${RUNNER_TEMP}/managed-cloud-provider-cleanup/report.json"

      - name: Finalize bounded provider cleanup receipt
        if: always()
        shell: bash
        env:
          CLEANUP_SHA: ${{ needs.classify-source.outputs.cleanup_sha }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const receipt = path.join(process.env.RUNNER_TEMP, "managed-cloud-provider-cleanup", "report.json");
          const failed = (reason) => ({
            kind: "managed_cloud_provider_hard_cancel_cleanup",
            schema_version: 1,
            workflow_run_id: process.env.TARGET_WORKFLOW_RUN_ID,
            workflow_run_attempt: Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT),
            cleanup_sha: process.env.CLEANUP_SHA,
            status: "failed",
            reason,
          });
          let row;
          try {
            row = JSON.parse(fs.readFileSync(receipt, "utf8"));
          } catch {
            row = failed("Provider cleanup receipt was missing or malformed.");
          }
          const common =
            row?.kind === "managed_cloud_provider_hard_cancel_cleanup" &&
            row?.schema_version === 1 &&
            row?.workflow_run_id === process.env.TARGET_WORKFLOW_RUN_ID &&
            row?.workflow_run_attempt === Number(process.env.TARGET_WORKFLOW_RUN_ATTEMPT) &&
            row?.cleanup_sha === process.env.CLEANUP_SHA &&
            ["reconciled", "not_needed", "failed"].includes(row?.status);
          const structured = common && Array.isArray(row.runs);
          const success = structured && row.status !== "failed";
          const failure =
            common &&
            row.status === "failed" &&
            (structured || (
              typeof row.reason === "string" &&
              row.reason.length > 0 &&
              row.reason.length <= 400
            ));
          if (!success && !failure) {
            row = failed("Provider cleanup receipt was missing or malformed.");
          }
          fs.mkdirSync(path.dirname(receipt), { recursive: true, mode: 0o700 });
          fs.writeFileSync(receipt, `${JSON.stringify(row)}\n`, { mode: 0o600 });
          if (!success) process.exitCode = 2;
          NODE

      - name: Upload bounded provider cleanup receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: managed-cloud-provider-hard-cancel-cleanup-${{ env.TARGET_WORKFLOW_RUN_ID }}-${{ env.TARGET_WORKFLOW_RUN_ATTEMPT }}
          path: ${{ runner.temp }}/managed-cloud-provider-cleanup/report.json
          retention-days: 14
          if-no-files-found: error
