name: Deploy Mobile

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      enabled:
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: ${{ inputs.enabled }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: apps/mobile
    env:
      MOBILE_DEPLOY_ENABLED: ${{ vars.MOBILE_DEPLOY_ENABLED || 'false' }}
      APP_VARIANT: ${{ vars.APP_VARIANT || (inputs.environment == 'staging' && 'staging' || '') }}
      EAS_BUILD_PROFILE: ${{ vars.EAS_BUILD_PROFILE || inputs.environment }}
      EAS_SUBMIT_PROFILE: ${{ vars.EAS_SUBMIT_PROFILE || inputs.environment }}
      EAS_SUBMIT_ENABLED: ${{ vars.EAS_SUBMIT_ENABLED || 'false' }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Check mobile deploy switch
        id: switch
        run: |
          set -euo pipefail
          if [[ "$MOBILE_DEPLOY_ENABLED" != "true" ]]; then
            echo "Mobile deploy is intentionally disabled for this environment."
            echo "Set MOBILE_DEPLOY_ENABLED=true after the Apple/TestFlight app and EAS profile are ready."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Validate mobile deploy config
        if: ${{ steps.switch.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          : "${EXPO_TOKEN:?Set EXPO_TOKEN on the GitHub environment.}"
          : "${EAS_BUILD_PROFILE:?Set EAS_BUILD_PROFILE on the GitHub environment.}"

      - name: Install dependencies
        if: ${{ steps.switch.outputs.enabled == 'true' }}
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build iOS app
        id: build
        if: ${{ steps.switch.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          pnpm dlx eas-cli@18.13.0 build \
            --platform ios \
            --profile "$EAS_BUILD_PROFILE" \
            --non-interactive \
            --wait \
            --json \
            | tee /tmp/eas-build.json
          build_id="$(
            node <<'NODE'
          const fs = require("node:fs");
          const raw = fs.readFileSync("/tmp/eas-build.json", "utf8").trim();
          const builds = JSON.parse(raw);
          const build = Array.isArray(builds)
            ? builds.find((candidate) => candidate?.platform === "IOS") ?? builds[0]
            : builds;
          if (!build?.id) {
            throw new Error("EAS build output did not include an iOS build id.");
          }
          console.log(build.id);
          NODE
          )"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Submit iOS build
        if: ${{ steps.switch.outputs.enabled == 'true' && env.EAS_SUBMIT_ENABLED == 'true' }}
        run: |
          set -euo pipefail
          : "${BUILD_ID:?Build iOS app did not produce a build id.}"
          pnpm dlx eas-cli@18.13.0 submit \
            --platform ios \
            --profile "$EAS_SUBMIT_PROFILE" \
            --id "$BUILD_ID" \
            --verbose \
            --non-interactive
        env:
          BUILD_ID: ${{ steps.build.outputs.build_id }}

      - name: Summarize mobile deploy
        run: |
          {
            echo "### Mobile"
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Enabled: \`$MOBILE_DEPLOY_ENABLED\`"
            echo "- EAS build profile: \`$EAS_BUILD_PROFILE\`"
            echo "- EAS build id: \`${{ steps.build.outputs.build_id }}\`"
            echo "- Submitted: \`$EAS_SUBMIT_ENABLED\`"
          } >> "$GITHUB_STEP_SUMMARY"
