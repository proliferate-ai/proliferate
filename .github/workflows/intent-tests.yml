name: Intent Tests

# Tier-2 "mocked intent" suite (specs/developing/testing/README.md §Tier 2):
# real server + real desktop web frontend + real Postgres, Playwright driving
# a browser. The public-dependency job runs on every event. The secret-bearing
# billing job runs only for trusted same-repository PRs and trusted integration
# events; fork and Dependabot PRs receive an explicit non-qualifying skip, then
# the complete collected Tier-2 suite reruns fail-closed in the merge queue.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  intent-tests:
    name: intent-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target/runtime-local"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server (venv, matches local layout)
        run: cd server && uv venv .venv --python 3.12 && uv pip install -e ".[dev]"

      - name: Install Playwright chromium
        run: pnpm -C tests/intent exec playwright install --with-deps chromium

      - name: Build required AnyHarness HTTP seam
        env:
          CARGO_TARGET_DIR: target/runtime-local
        run: cargo build -p anyharness --bin anyharness

      - name: Typecheck tier-2 suite
        run: pnpm -C tests/intent exec tsc --noEmit

      - name: Test fail-closed tier-2 reporter
        run: pnpm -C tests/intent run test:reporter

      - name: Run tier-2 intent suite
        env:
          # The boot fixture allocates the t2intent profile itself; on the
          # runner the Docker services above stand in for the local stack.
          USE_EXISTING_POSTGRES: "1"
          USE_EXISTING_REDIS: "1"
          LOCAL_PGHOST: 127.0.0.1
          ANYHARNESS_DEV_RUNTIME_BIN: ${{ github.workspace }}/target/runtime-local/debug/anyharness
          TIER2_INTENT_REQUIRE_RUNTIME: "1"
          CI: "true"
        run: pnpm -C tests/intent test

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: intent-tests-traces
          path: tests/intent/test-results/
          retention-days: 7

  # Tier-2 BILLING suite (scenarios.md T2-BILL-1..9). Split into its own job
  # because it boots the stack with Stripe test mode + enforcement on, needs
  # the Stripe CLI, and self-signs webhook deliveries. Requires a Stripe TEST
  # secret key in the STRIPE_TEST_SECRET_KEY repo secret. Missing or non-test
  # credentials fail global setup on a trusted run; billing can never qualify
  # by skipping its collected scenarios.
  intent-billing:
    name: intent-billing
    # Pull-request code does not receive the Stripe secret when it comes from a
    # fork or Dependabot. Skip those untrusted PR events explicitly instead of
    # manufacturing a deterministic red job. merge_group, main, manual, and
    # trusted same-repository PR runs execute the real fail-closed suite.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proliferate
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: proliferate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proliferate -d proliferate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install server (venv, matches local layout)
        run: cd server && uv venv .venv --python 3.12 && uv pip install -e ".[dev]"
      - name: Install Playwright chromium
        run: pnpm -C tests/intent exec playwright install --with-deps chromium

      - name: Install Stripe CLI
        run: |
          curl -fsSL https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public \
            | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" \
            | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update && sudo apt-get install -y stripe

      - name: Run tier-2 billing suite
        env:
          USE_EXISTING_POSTGRES: "1"
          USE_EXISTING_REDIS: "1"
          LOCAL_PGHOST: 127.0.0.1
          TIER2_INTENT_SKIP_RUNTIME: "1"
          CI: "true"
          # Stripe TEST key (sk_test_...). Absent or invalid → setup fails.
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
        run: pnpm -C tests/intent run test:billing

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: intent-billing-traces
          path: tests/intent/test-results/
          retention-days: 7
