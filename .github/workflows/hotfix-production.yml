name: Hotfix Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Main commit SHA or ref to hotfix from.
        required: true
        type: string
      only_surfaces:
        description: Exact comma-separated surfaces to hotfix, or all.
        required: true
        type: string
      reason:
        description: Short operator-facing reason for the hotfix.
        required: true
        type: string
      version_bump:
        description: Public Proliferate version bump for this hotfix. Use none only for SHA-based surfaces.
        default: patch
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
          - none
      dry_run:
        description: Plan only; do not push commits, tags, releases, or deploys.
        default: false
        required: false
        type: boolean

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write
  pull-requests: read

concurrency:
  group: hotfix-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.meta.outputs.release_id }}
      base_sha: ${{ steps.meta.outputs.base_sha }}
      head_sha: ${{ steps.commit.outputs.head_sha }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      product_version: ${{ steps.artifacts.outputs.product_version }}
      product_tag: ${{ steps.artifacts.outputs.product_tag }}
      selected_surfaces: ${{ steps.detect.outputs.selected_surfaces }}
      server: ${{ steps.detect.outputs.server }}
      workers: ${{ steps.detect.outputs.workers }}
      e2b: ${{ steps.detect.outputs.e2b }}
      web: ${{ steps.detect.outputs.web }}
      mobile: ${{ steps.detect.outputs.mobile }}
      desktop: ${{ steps.detect.outputs.desktop }}
      runtime: ${{ steps.detect.outputs.runtime }}
      desktop_version: ${{ steps.artifacts.outputs.desktop_version }}
      runtime_version: ${{ steps.artifacts.outputs.runtime_version }}
      server_version: ${{ steps.artifacts.outputs.server_version }}
      desktop_tag: ${{ steps.artifacts.outputs.desktop_tag }}
      runtime_tag: ${{ steps.artifacts.outputs.runtime_tag }}
      server_tag: ${{ steps.artifacts.outputs.server_tag }}
      artifact_tags: ${{ steps.artifacts.outputs.artifact_tags }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve hotfix metadata
        id: meta
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          git fetch origin main --tags --prune
          head_sha="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$head_sha" refs/remotes/origin/main
          previous_product="$(git tag --list 'proliferate-v*' --sort=-creatordate | head -n 1 || true)"
          if [[ -n "$previous_product" ]]; then
            base_sha="$(git rev-parse "$previous_product")"
          else
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-list --max-parents=0 "$head_sha" | tail -n1)"
          fi
          release_id="hotfix-$(date -u +%F)-${GITHUB_RUN_NUMBER}"
          {
            echo "release_id=$release_id"
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
            echo "dry_run=$DRY_RUN"
          } >> "$GITHUB_OUTPUT"

      - name: Select exact hotfix surfaces
        id: detect
        run: |
          set -euo pipefail
          if [[ -z "${ONLY_SURFACES// }" ]]; then
            echo "::error::only_surfaces is required for production hotfixes."
            exit 1
          fi
          node scripts/ci-cd/detect-deploy-surfaces.mjs \
            --base "${{ steps.meta.outputs.head_sha }}" \
            --head "${{ steps.meta.outputs.head_sha }}" \
            --only "$ONLY_SURFACES"
        env:
          ONLY_SURFACES: ${{ github.event.inputs.only_surfaces }}

      - name: Prepare product and artifact versions
        id: artifacts
        run: >
          node scripts/ci-cd/prepare-artifact-release.mjs
          --surfaces "${{ steps.detect.outputs.selected_surfaces }}"
          --release-id "${{ steps.meta.outputs.release_id }}"
          --version-bump "${{ github.event.inputs.version_bump || 'patch' }}"
          --dry-run "${{ steps.meta.outputs.dry_run }}"

      - name: Verify version tags are free
        # Same ordering fix as the nightly train: catch a real version
        # collision (e.g. a race with another release) before the
        # version-bump commit is pushed to main, not after.
        if: steps.meta.outputs.dry_run != 'true'
        env:
          ARTIFACT_TAGS: ${{ steps.artifacts.outputs.artifact_tags }}
          PRODUCT_TAG: ${{ steps.artifacts.outputs.product_tag }}
        run: |
          set -euo pipefail
          tags="$PRODUCT_TAG"
          if [[ -n "$ARTIFACT_TAGS" ]]; then
            tags="$tags,$ARTIFACT_TAGS"
          fi
          if [[ -z "${tags// }" ]]; then
            exit 0
          fi
          node scripts/ci-cd/create-release-tags.mjs \
            --target pending \
            --tags "$tags" \
            --check-only true

      - name: Commit version bumps
        id: commit
        env:
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
          DRY_RUN: ${{ steps.meta.outputs.dry_run }}
          REASON: ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet; then
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION apps/desktop/package.json apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml anyharness/sdk/package.json
          git commit -m "release: prepare $RELEASE_ID" -m "$REASON"
          git push origin HEAD:main
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create hotfix tags
        if: steps.meta.outputs.dry_run != 'true'
        env:
          ARTIFACT_TAGS: ${{ steps.artifacts.outputs.artifact_tags }}
          PRODUCT_TAG: ${{ steps.artifacts.outputs.product_tag }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          set -euo pipefail
          tags="$RELEASE_ID"
          if [[ -n "$PRODUCT_TAG" ]]; then
            tags="$PRODUCT_TAG,$tags"
          fi
          if [[ -n "$ARTIFACT_TAGS" ]]; then
            tags="$tags,$ARTIFACT_TAGS"
          fi
          # RELEASE_ID here (hotfix-YYYY-MM-DD-<run number>) is already unique
          # per run, so it does not need --movable-tags the way the nightly
          # train's release-YYYY-MM-DD does.
          node scripts/ci-cd/create-release-tags.mjs \
            --target "${{ steps.commit.outputs.head_sha }}" \
            --tags "$tags" \
            --dry-run false

      - name: Summarize hotfix
        run: |
          {
            echo "### Production hotfix"
            echo "- Product: \`${{ steps.artifacts.outputs.product_tag || 'unchanged' }}\`"
            echo "- Hotfix: \`${{ steps.meta.outputs.release_id }}\`"
            echo "- Reason: ${{ github.event.inputs.reason }}"
            echo "- Head: \`${{ steps.commit.outputs.head_sha }}\`"
            echo "- Dry run: \`${{ steps.meta.outputs.dry_run }}\`"
            echo "- Selected surfaces: \`${{ steps.detect.outputs.selected_surfaces }}\`"
            echo "- Desktop: \`${{ steps.artifacts.outputs.desktop_tag }}\`"
            echo "- Runtime: \`${{ steps.artifacts.outputs.runtime_tag }}\`"
            echo "- Server: \`${{ steps.artifacts.outputs.server_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release-runtime:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.runtime == 'true' }}
    uses: ./.github/workflows/release-runtime.yml
    with:
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      version: ${{ needs.prepare.outputs.runtime_version }}
      dry_run: false
      publish: true
    secrets: inherit

  release-server:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.server == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/server-ci.yml
    with:
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      version: ${{ needs.prepare.outputs.server_version }}
      dry_run: false
      publish: true
    secrets: inherit

  promote-e2b:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-e2b.yml
    with:
      environment: production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.e2b == 'true' }}
      rolling_tag: production
      mode: build_and_promote
    secrets: inherit

  deploy-server:
    needs: [prepare, promote-e2b]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-server.yml
    with:
      environment: production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.server == 'true' }}
    secrets: inherit

  deploy-workers:
    needs: [prepare, deploy-server]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-workers.yml
    with:
      environment: production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.workers == 'true' }}
    secrets: inherit

  deploy-web:
    needs: [prepare, deploy-server]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-web.yml
    with:
      environment: production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.web == 'true' }}
    secrets: inherit

  deploy-mobile:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-mobile.yml
    with:
      environment: production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.mobile == 'true' }}
    secrets: inherit

  deploy-desktop:
    needs: [prepare]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.dry_run != 'true' }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_deploy-desktop.yml
    with:
      environment: production
      git_sha: ${{ needs.prepare.outputs.head_sha }}
      enabled: ${{ needs.prepare.outputs.desktop == 'true' }}
      dry_run: false
      publish_updater: true
    secrets: inherit

  publish-product-release:
    needs:
      - prepare
      - release-runtime
      - release-server
      - promote-e2b
      - deploy-server
      - deploy-workers
      - deploy-web
      - deploy-mobile
      - deploy-desktop
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        needs.prepare.outputs.selected_surfaces != '' &&
        (
          needs.prepare.outputs.dry_run == 'true' ||
          (
            (needs.prepare.outputs.runtime != 'true' || needs.release-runtime.result == 'success') &&
            (needs.prepare.outputs.server != 'true' || (needs.release-server.result == 'success' && needs.deploy-server.result == 'success')) &&
            (needs.prepare.outputs.desktop != 'true' || needs.deploy-desktop.result == 'success') &&
            (needs.prepare.outputs.e2b != 'true' || needs.promote-e2b.result == 'success') &&
            (needs.prepare.outputs.workers != 'true' || needs.deploy-workers.result == 'success') &&
            (needs.prepare.outputs.web != 'true' || needs.deploy-web.result == 'success') &&
            (needs.prepare.outputs.mobile != 'true' || needs.deploy-mobile.result == 'success')
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Publish product GitHub Release
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.product_tag || needs.prepare.outputs.release_id }}
        run: >
          node scripts/ci-cd/publish-product-release.mjs
          --kind hotfix
          --release-tag "$RELEASE_TAG"
          --product-tag "${{ needs.prepare.outputs.product_tag }}"
          --release-id "${{ needs.prepare.outputs.release_id }}"
          --base "${{ needs.prepare.outputs.base_sha }}"
          --head "${{ needs.prepare.outputs.head_sha }}"
          --surfaces "${{ needs.prepare.outputs.selected_surfaces }}"
          --artifact-tags "${{ needs.prepare.outputs.artifact_tags }}"
          --reason "${{ github.event.inputs.reason }}"
          --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --repository "${{ github.repository }}"
          --body-out product-release.md
          --dry-run "${{ needs.prepare.outputs.dry_run }}"

      - name: Summarize product release page
        run: |
          {
            echo "### Product GitHub Release"
            echo "- Action: \`${{ steps.publish.outputs.release_action }}\`"
            echo "- Tag: \`${{ steps.publish.outputs.release_tag }}\`"
            echo "- URL: ${{ steps.publish.outputs.release_url }}"
            echo ""
            cat product-release.md
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs:
      - prepare
      - release-runtime
      - release-server
      - promote-e2b
      - deploy-server
      - deploy-workers
      - deploy-web
      - deploy-mobile
      - deploy-desktop
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize results
        run: |
          {
            echo "### Production hotfix result"
            echo "- Product: \`${{ needs.prepare.outputs.product_tag || 'unchanged' }}\`"
            echo "- Hotfix: \`${{ needs.prepare.outputs.release_id }}\`"
            echo "- Head: \`${{ needs.prepare.outputs.head_sha }}\`"
            echo "- Surfaces: \`${{ needs.prepare.outputs.selected_surfaces }}\`"
            echo "- Runtime release: \`${{ needs.release-runtime.result }}\`"
            echo "- Server release: \`${{ needs.release-server.result }}\`"
            echo "- E2B production: \`${{ needs.promote-e2b.result }}\`"
            echo "- Server production: \`${{ needs.deploy-server.result }}\`"
            echo "- Workers production: \`${{ needs.deploy-workers.result }}\`"
            echo "- Web production: \`${{ needs.deploy-web.result }}\`"
            echo "- Mobile production: \`${{ needs.deploy-mobile.result }}\`"
            echo "- Desktop production: \`${{ needs.deploy-desktop.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
