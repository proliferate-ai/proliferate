  # only to reserve the job shape/name; `if: false` keeps them permanently
  # skipped in every trigger. Enable one only after its own workstream has a
  # real, locally-green `pnpm run foundation -- --world <id> ...`
  # invocation to point it at — never flip continue-on-error on and call
  # that "enabling" a world.
