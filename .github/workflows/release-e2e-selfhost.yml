name: Release E2E — Self-hosting (T3-SH / T4-SH)

# The self-hosting battery from the tier-3 release runner
# (specs/developing/testing/self-hosting.md). Two lanes:
#
#   artifact-chain (T4-SH-2): a post-publish diagnostic for the 2026-07-09
#     incident class. Pure HTTP + git against the published stable desktop — no
#     box or credentials — so it goes red when that public chain is broken. It
#     runs nightly and manually. It is deliberately not reusable as a release
#     gate: pre-publish qualification must validate the immutable candidate
#     manifest before moving the stable pointer, and no such caller exists yet.
#
#   provisioning (T3-SH-1 cold boot, T4-SH-1 update motion): stand up a throwaway
#     EC2 self-hosted control plane (production compose bundle, sslip.io + real
#     TLS) and tear it down. Costs real infra, so it is gated behind the
#     RELEASE_E2E_SELFHOST_PROVISION opt-in and AWS credentials; without either
#     the runner reports those scenarios blocked in signal mode. A genuine
#     scenario failure remains red; this workflow never gates a merge. T3-SH-2
#     (native desktop) reports blocked until its driver exists; T3-SH-3 (gateway
#     add-on) reports blocked until standing-box + gateway secrets are provisioned.

on:
  workflow_dispatch:
    inputs:
      release_desktop_version:
        description: Published desktop version to inspect (blank resolves the CDN stable manifest).
        default: ""
        required: false
        type: string
      release_date:
        description: Expected UTC release day, YYYY-MM-DD (blank resolves the desktop tag commit day).
        default: ""
        required: false
        type: string
      provision:
        description: Provision throwaway EC2 boxes for T3-SH-1 / T4-SH-1 (costs a few cents).
        default: "false"
        required: false
        type: choice
        options: ["false", "true"]
  schedule:
    # Nightly, after the release train + the main tier-3 runner.
    - cron: "30 11 * * *"

permissions:
  contents: read

concurrency:
  group: release-e2e-selfhost
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  artifact-chain:
    name: T4-SH-2 published desktop artifact diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # fetch-depth 0 + tags: T4-SH-2 verifies the published desktop tag shares
      # lineage with this mainline diagnostic checkout. This is not candidate
      # qualification or promotion evidence.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Resolve published desktop metadata
        id: release
        env:
          INPUT_RELEASE_DATE: ${{ inputs.release_date || '' }}
          INPUT_VERSION: ${{ inputs.release_desktop_version || '' }}
          STABLE_MANIFEST_URL: https://downloads.proliferate.com/desktop/stable/latest.json
        run: |
          set -euo pipefail
          manifest="$(mktemp)"
          curl --fail --location --silent --show-error "$STABLE_MANIFEST_URL" --output "$manifest"
          stable_version="$(node -e '
            const manifest = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
            if (typeof manifest.version !== "string" || manifest.version.length === 0) process.exit(2);
            process.stdout.write(manifest.version);
          ' "$manifest")"
          version="${INPUT_VERSION:-$stable_version}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid desktop version '$version'."
            exit 1
          fi

          tag="desktop-v$version"
          git fetch --force --no-tags --quiet origin "refs/tags/$tag:refs/tags/$tag"
          # Annotated release tags may be created after their target commit.
          # `creatordate` uses the tagger date for annotated tags and the commit
          # date for lightweight tags, matching the publish event in both cases.
          tag_created_at="$(git for-each-ref --format='%(creatordate:iso-strict)' "refs/tags/$tag")"
          : "${tag_created_at:?Unable to resolve creation date for $tag.}"
          tag_date="${tag_created_at%%T*}"
          release_date="${INPUT_RELEASE_DATE:-$tag_date}"
          if [[ ! "$release_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid release date '$release_date'; expected YYYY-MM-DD."
            exit 1
          fi
          {
            echo "version=$version"
            echo "release_date=$release_date"
          } >> "$GITHUB_OUTPUT"
      - name: Run T4-SH-2
        env:
          RELEASE_E2E_RELEASE_DATE: ${{ steps.release.outputs.release_date }}
          RELEASE_E2E_RELEASE_DESKTOP_VERSION: ${{ steps.release.outputs.version }}
        run: make release-e2e LANE=local DESKTOP=web AGENTS=all SCENARIOS=T4-SH-2

  provisioning:
    name: T3-SH-1 / T4-SH-1 / T3-SH-2 / T3-SH-3 (provisional)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Preflight — provisioning opt-in + AWS credentials
        id: preflight
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # 'true' on manual dispatch; nightly leaves it off so scheduled runs
          # never spend on infra unattended.
          PROVISION_INPUT: ${{ github.event.inputs.provision }}
        run: |
          provision=0
          if [ "$PROVISION_INPUT" = "true" ] && [ -n "$AWS_ACCESS_KEY_ID" ]; then
            provision=1
          elif [ "$PROVISION_INPUT" = "true" ] && [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::notice title=Self-host provisioning skipped::provision=true but no AWS credentials are configured. T3-SH-1 / T4-SH-1 will report blocked (never red)."
          else
            echo "::notice title=Self-host provisioning off::Set the provision input to true (with AWS creds) to run T3-SH-1 / T4-SH-1 for real. Reporting blocked for this run."
          fi
          echo "provision=$provision" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Configure AWS credentials
        if: steps.preflight.outputs.provision == '1'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Run the self-hosting scenarios
        env:
          # '1' only when provisioning is authorized; otherwise the box scenarios
          # report blocked (env-resolution.ts + the scenarios' own opt-in check).
          RELEASE_E2E_SELFHOST_PROVISION: ${{ steps.preflight.outputs.provision == '1' && '1' || '' }}
          # Standing-box + gateway secrets for T3-SH-3 (blocked when absent).
          RELEASE_E2E_SELFHOST_URL: ${{ secrets.RELEASE_E2E_SELFHOST_URL }}
          RELEASE_E2E_SELFHOST_SSH: ${{ secrets.RELEASE_E2E_SELFHOST_SSH }}
          RELEASE_E2E_GATEWAY_TEST_KEY: ${{ secrets.RELEASE_E2E_GATEWAY_TEST_KEY }}
        run: make release-e2e LANE=local DESKTOP=web AGENTS=all SCENARIOS=T3-SH-1,T3-SH-2,T3-SH-3,T4-SH-1

      - name: Upload failure reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-selfhost-reports
          path: tests/release/.output/
          retention-days: 7
          if-no-files-found: ignore
