name: Model Catalog Update

on:
  push:
    branches:
      - main
    paths:
      - "server/model-catalog/v1/catalog.json"
  schedule:
    - cron: "23 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  validate:
    name: Validate runtime model catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate catalog shape and promotion rules
        run: node scripts/validate-model-catalog.mjs

      - name: Open catalog update PR
        if: github.event_name != 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/runtime-model-catalog
          commit-message: "chore: update runtime model catalog"
          title: "chore: update runtime model catalog"
          body: |
            Automated runtime model catalog update.

            Promotion requirements before merge:
            - Any new model ID starts as `candidate`.
            - Promoting a model to `active` or `default` requires live smoke evidence through the actual AnyHarness launch path.
            - If a model needs a newer CLI/runtime, set `minRuntimeVersion` and ship that runtime first.
            - If a model needs new controls or protocol behavior, merge the code PR before catalog promotion.
          delete-branch: true

  publish:
    name: Publish runtime model catalog
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DESKTOP_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload catalog to S3
        run: |
          aws s3 cp server/model-catalog/v1/catalog.json \
            "s3://${{ vars.DESKTOP_DOWNLOADS_S3_BUCKET }}/anyharness/model-catalog/v1/catalog.json" \
            --content-type "application/json" \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DESKTOP_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/anyharness/model-catalog/v1/catalog.json"
