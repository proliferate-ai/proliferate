name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to deploy. Defaults to the dispatch ref.
        required: false
        type: string
      force_surfaces:
        description: Comma-separated surfaces to force, or all.
        required: false
        type: string
      dry_run:
        description: Plan only; do not deploy.
        default: false
        required: false
        type: boolean

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    outputs:
      base_sha: ${{ steps.detect.outputs.base_sha }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      server: ${{ steps.detect.outputs.server }}
      workers: ${{ steps.detect.outputs.workers }}
      e2b: ${{ steps.detect.outputs.e2b }}
      web: ${{ steps.detect.outputs.web }}
      mobile: ${{ steps.detect.outputs.mobile }}
      desktop: ${{ steps.detect.outputs.desktop }}
      runtime: ${{ steps.detect.outputs.runtime }}
      changed_files_count: ${{ steps.detect.outputs.changed_files_count }}
      summary_json: ${{ steps.detect.outputs.summary_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref || github.sha }}

      - name: Resolve deploy metadata
        id: meta
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          fallback="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-list --max-parents=0 "$head_sha" | tail -n1)"
          dry_run="${DRY_RUN:-false}"
          {
            echo "head_sha=$head_sha"
            echo "fallback_sha=$fallback"
            echo "dry_run=$dry_run"
          } >> "$GITHUB_OUTPUT"
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Wait for Server CI if present
        run: |
          set -euo pipefail
          head_sha="${{ steps.meta.outputs.head_sha }}"

          for _ in $(seq 1 90); do
            mapfile -t runs < <(
              gh run list \
                --workflow server-ci.yml \
                --commit "$head_sha" \
                --limit 20 \
                --json databaseId,status,conclusion,url \
                --jq '.[] | select(.conclusion != "skipped") | [.databaseId, .status, (.conclusion // ""), .url] | @tsv'
            )

            if [[ "${#runs[@]}" -eq 0 ]]; then
              echo "No Server CI run found for $head_sha; continuing."
              exit 0
            fi

            pending=0
            for run in "${runs[@]}"; do
              IFS=$'\t' read -r run_id status conclusion url <<< "$run"
              if [[ "$status" != "completed" ]]; then
                echo "Server CI $run_id is $status; waiting. $url"
                pending=1
                continue
              fi
              if [[ "$conclusion" != "success" ]]; then
                echo "Server CI $run_id finished with $conclusion. $url" >&2
                exit 1
              fi
            done

            if [[ "$pending" == "0" ]]; then
              echo "Server CI succeeded for $head_sha."
              exit 0
            fi

            sleep 30
          done

          echo "Timed out waiting for Server CI for $head_sha." >&2
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve previous successful staging deploy
        id: base
        run: >
          node scripts/ci-cd/resolve-deploy-base.mjs
          --workflow deploy-staging.yml
          --branch main
          --head "${{ steps.meta.outputs.head_sha }}"
          --fallback "${{ steps.meta.outputs.fallback_sha }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect deploy surfaces
        id: detect
        run: >
          node scripts/ci-cd/detect-deploy-surfaces.mjs
          --base "${{ steps.base.outputs.base_sha }}"
          --head "${{ steps.meta.outputs.head_sha }}"
          --force "$FORCE_SURFACES"
        env:
          FORCE_SURFACES: ${{ github.event.inputs.force_surfaces || '' }}

      - name: Summarize plan
        run: |
          {
            echo "### Staging deploy plan"
            echo "- Base: \`${{ steps.detect.outputs.base_sha }}\`"
            echo "- Head: \`${{ steps.detect.outputs.head_sha }}\`"
            echo "- Changed files: \`${{ steps.detect.outputs.changed_files_count }}\`"
            echo "- Dry run: \`${{ steps.meta.outputs.dry_run }}\`"
            echo ""
            echo "| Surface | Deploy |"
            echo "| --- | --- |"
            echo "| server | \`${{ steps.detect.outputs.server }}\` |"
            echo "| workers | \`${{ steps.detect.outputs.workers }}\` |"
            echo "| e2b | \`${{ steps.detect.outputs.e2b }}\` |"
            echo "| web | \`${{ steps.detect.outputs.web }}\` |"
            echo "| mobile | \`${{ steps.detect.outputs.mobile }}\` |"
            echo "| desktop | \`${{ steps.detect.outputs.desktop }}\` |"
            echo "| runtime | \`${{ steps.detect.outputs.runtime }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-e2b:
    needs: [plan]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-e2b.yml
    with:
      environment: staging
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.e2b == 'true' }}
      rolling_tag: staging
      mode: build_and_promote
    secrets: inherit

  deploy-server:
    needs: [plan, deploy-e2b]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-server.yml
    with:
      environment: staging
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.server == 'true' }}
    secrets: inherit

  deploy-workers:
    needs: [plan, deploy-server]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-workers.yml
    with:
      environment: staging
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.workers == 'true' }}
    secrets: inherit

  deploy-web:
    needs: [plan, deploy-server]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-web.yml
    with:
      environment: staging
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.web == 'true' }}
    secrets: inherit

  deploy-mobile:
    needs: [plan]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-mobile.yml
    with:
      environment: staging
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.mobile == 'true' }}
    secrets: inherit

  deploy-desktop:
    needs: [plan]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-desktop.yml
    with:
      environment: staging
      git_sha: ${{ needs.plan.outputs.head_sha }}
      enabled: ${{ needs.plan.outputs.desktop == 'true' }}
    secrets: inherit

  summary:
    needs:
      - plan
      - deploy-e2b
      - deploy-server
      - deploy-workers
      - deploy-web
      - deploy-mobile
      - deploy-desktop
    if: ${{ always() && needs.plan.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write deploy summary artifact
        run: |
          set -euo pipefail
          mkdir -p deploy-summary
          cat > deploy-summary/staging.json <<'JSON'
          ${{ needs.plan.outputs.summary_json }}
          JSON
          {
            echo "### Staging deploy result"
            echo "- Head: \`${{ needs.plan.outputs.head_sha }}\`"
            echo "- E2B: \`${{ needs.deploy-e2b.result }}\`"
            echo "- Server: \`${{ needs.deploy-server.result }}\`"
            echo "- Workers: \`${{ needs.deploy-workers.result }}\`"
            echo "- Web: \`${{ needs.deploy-web.result }}\`"
            echo "- Mobile: \`${{ needs.deploy-mobile.result }}\`"
            echo "- Desktop: \`${{ needs.deploy-desktop.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-summary-staging
          path: deploy-summary/staging.json
