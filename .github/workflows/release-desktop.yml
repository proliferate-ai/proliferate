name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip GitHub release creation and updater publish)"
        type: boolean
        default: false
      publish_updater:
        description: "Publish updater/download assets to S3 and CloudFront on manual runs"
        type: boolean
        default: false
      target_os:
        description: "Target OS"
        type: choice
        options:
          - all
          - macos
        default: all

permissions:
  contents: write
  id-token: write

env:
  VITE_PROLIFERATE_API_BASE_URL: ${{ vars.VITE_PROLIFERATE_API_BASE_URL }}
  VITE_PROLIFERATE_ENVIRONMENT: ${{ vars.VITE_PROLIFERATE_ENVIRONMENT || 'production' }}
  VITE_REQUIRE_AUTH: ${{ vars.VITE_REQUIRE_AUTH || 'true' }}
  VITE_PROLIFERATE_SENTRY_DSN: ${{ vars.VITE_PROLIFERATE_SENTRY_DSN }}
  VITE_PROLIFERATE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_PROLIFERATE_SENTRY_TRACES_SAMPLE_RATE }}
  VITE_PROLIFERATE_SENTRY_ENABLE_LOGS: ${{ vars.VITE_PROLIFERATE_SENTRY_ENABLE_LOGS }}
  VITE_PROLIFERATE_POSTHOG_KEY: ${{ vars.VITE_PROLIFERATE_POSTHOG_KEY }}
  VITE_PROLIFERATE_POSTHOG_HOST: ${{ vars.VITE_PROLIFERATE_POSTHOG_HOST }}
  PROLIFERATE_DESKTOP_SENTRY_DSN: ${{ vars.PROLIFERATE_DESKTOP_SENTRY_DSN || vars.VITE_PROLIFERATE_SENTRY_DSN }}
  PROLIFERATE_DESKTOP_SENTRY_ENVIRONMENT: ${{ vars.PROLIFERATE_DESKTOP_SENTRY_ENVIRONMENT || vars.VITE_PROLIFERATE_ENVIRONMENT || 'production' }}
  PROLIFERATE_DESKTOP_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.PROLIFERATE_DESKTOP_SENTRY_TRACES_SAMPLE_RATE || vars.VITE_PROLIFERATE_SENTRY_TRACES_SAMPLE_RATE }}
  ANYHARNESS_SENTRY_DSN: ${{ vars.ANYHARNESS_SENTRY_DSN || vars.E2B_RUNTIME_SENTRY_DSN }}
  ANYHARNESS_SENTRY_ENVIRONMENT: ${{ vars.ANYHARNESS_SENTRY_ENVIRONMENT || vars.E2B_RUNTIME_SENTRY_ENVIRONMENT || vars.VITE_PROLIFERATE_ENVIRONMENT || 'production' }}
  ANYHARNESS_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.ANYHARNESS_SENTRY_TRACES_SAMPLE_RATE || vars.E2B_RUNTIME_SENTRY_TRACES_SAMPLE_RATE }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            runner_os: macos
          - os: macos-15-intel
            target: x86_64-apple-darwin
            runner_os: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Decide whether to build this matrix entry
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ "${{ inputs.target_os }}" != "all" ]] && [[ "${{ inputs.target_os }}" != "${{ matrix.runner_os }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release ref
        if: steps.filter.outputs.skip != 'true' && github.event_name == 'workflow_dispatch' && !inputs.dry_run
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != desktop-v* ]]; then
            echo "::error::Manual non-dry-run desktop releases must run from a desktop-v* tag ref, not ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Validate version consistency
        if: steps.filter.outputs.skip != 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#desktop-v}"
          PKG_VERSION=$(node -p "require('./desktop/package.json').version")
          TAURI_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./desktop/src-tauri/tauri.conf.json','utf8')).version")
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]] || [[ "$TAG_VERSION" != "$TAURI_VERSION" ]] || [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION pkg=$PKG_VERSION tauri=$TAURI_VERSION cargo=$CARGO_VERSION"
            exit 1
          fi

      - name: Setup Node 22
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve release metadata
        if: steps.filter.outputs.skip != 'true'
        shell: bash
        run: |
          package_version=$(node -p "require('./desktop/package.json').version")
          if [[ "${GITHUB_REF_NAME:-}" == desktop-v* ]]; then
            release_version="${GITHUB_REF_NAME#desktop-v}"
          else
            safe_ref=$(printf '%s' "${GITHUB_REF_NAME:-$GITHUB_SHA}" | sed 's/[^A-Za-z0-9._-]/-/g')
            release_version="${package_version}-${safe_ref}-${GITHUB_SHA::12}"
          fi
          echo "PROLIFERATE_RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          echo "Using release version $release_version"

      - name: Setup pnpm
        if: steps.filter.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Rust stable
        if: steps.filter.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build AnyHarness runtime for target
        if: steps.filter.outputs.skip != 'true'
        shell: bash
        run: |
          cargo build --release -p anyharness --target "${{ matrix.target }}"
          mkdir -p desktop/src-tauri/binaries
          if [[ "${{ matrix.runner_os }}" == "windows" ]]; then
            cp "target/${{ matrix.target }}/release/anyharness.exe" "desktop/src-tauri/binaries/anyharness-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/anyharness" "desktop/src-tauri/binaries/anyharness-${{ matrix.target }}"
            chmod +x "desktop/src-tauri/binaries/anyharness-${{ matrix.target }}"
          fi

      - name: Install seed packaging tools
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        shell: bash
        run: brew install zstd

      - name: Build bundled agent seed
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        shell: bash
        run: |
          TMP_SEED_RUNTIME="$(mktemp -d)"
          node scripts/build-agent-seed.mjs \
            --target "${{ matrix.target }}" \
            --anyharness-bin "$PWD/target/${{ matrix.target }}/release/anyharness" \
            --runtime-home "$TMP_SEED_RUNTIME" \
            --output-dir "$PWD/desktop/src-tauri/agent-seeds"

          test -s "desktop/src-tauri/agent-seeds/agent-seed-${{ matrix.target }}.tar.zst"
          test -s "desktop/src-tauri/agent-seeds/agent-seed-${{ matrix.target }}.sha256"
          seed_count=$(find desktop/src-tauri/agent-seeds -maxdepth 1 -type f -name 'agent-seed-*.tar.zst' | wc -l | tr -d ' ')
          [[ "$seed_count" == "1" ]] || { echo "::error::Expected one target seed archive, found $seed_count"; exit 1; }
          NODE_BIN="$TMP_SEED_RUNTIME/node/${{ matrix.target }}/bin/node"
          codesign --verify --verbose "$NODE_BIN"
          spctl --assess --verbose=4 --type open --context context:primary-signature "$NODE_BIN"

          TMP_SEED_EXTRACT="$(mktemp -d)"
          zstd -dc "desktop/src-tauri/agent-seeds/agent-seed-${{ matrix.target }}.tar.zst" | tar -xf - -C "$TMP_SEED_EXTRACT"
          EXTRACTED_NODE_BIN="$TMP_SEED_EXTRACT/node/${{ matrix.target }}/bin/node"
          codesign --verify --verbose "$EXTRACTED_NODE_BIN"
          spctl --assess --verbose=4 --type open --context context:primary-signature "$EXTRACTED_NODE_BIN"

      - name: Build Proliferate debug helper for target
        if: steps.filter.outputs.skip != 'true'
        shell: bash
        run: |
          cargo build --release -p proliferate-debug --target "${{ matrix.target }}"
          mkdir -p desktop/src-tauri/binaries
          if [[ "${{ matrix.runner_os }}" == "windows" ]]; then
            cp "target/${{ matrix.target }}/release/proliferate-debug.exe" "desktop/src-tauri/binaries/proliferate-debug-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/proliferate-debug" "desktop/src-tauri/binaries/proliferate-debug-${{ matrix.target }}"
            chmod +x "desktop/src-tauri/binaries/proliferate-debug-${{ matrix.target }}"
          fi

      - name: Generate and build SDK
        if: steps.filter.outputs.skip != 'true'
        shell: bash
        run: |
          pnpm install
          cd anyharness/sdk && pnpm run generate && pnpm run build
          cd ../sdk-react && pnpm run build

      - name: Prepare Sentry CLI
        if: steps.filter.outputs.skip != 'true'
        shell: bash
        run: pnpm rebuild @sentry/cli

      - name: Build frontend
        if: steps.filter.outputs.skip != 'true'
        working-directory: desktop
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          export VITE_PROLIFERATE_RELEASE="proliferate-desktop@${PROLIFERATE_RELEASE_VERSION}"
          pnpm run build

      - name: Import Apple Developer Certificate
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "No Apple certificate configured, skipping code signing setup"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Write App Store Connect API key
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [[ -z "$APPLE_API_KEY" ]]; then
            echo "No App Store Connect API key configured, skipping notarization setup"
            exit 0
          fi
          mkdir -p "$HOME/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "$HOME/private_keys/AuthKey_${APPLE_API_KEY}.p8"

      - name: Build Tauri app
        if: steps.filter.outputs.skip != 'true'
        working-directory: desktop
        shell: bash
        env:
          _SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          _API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          export VITE_PROLIFERATE_RELEASE="${VITE_PROLIFERATE_RELEASE:-proliferate-desktop@${PROLIFERATE_RELEASE_VERSION}}"
          export PROLIFERATE_DESKTOP_SENTRY_RELEASE="${PROLIFERATE_DESKTOP_SENTRY_RELEASE:-proliferate-desktop-native@${PROLIFERATE_RELEASE_VERSION}}"
          export ANYHARNESS_SENTRY_RELEASE="${ANYHARNESS_SENTRY_RELEASE:-anyharness-sidecar@${PROLIFERATE_RELEASE_VERSION}}"

          if [[ "${{ matrix.runner_os }}" == "windows" ]]; then
            export ANYHARNESS_BIN="$PWD/src-tauri/binaries/anyharness-${{ matrix.target }}.exe"
          else
            export ANYHARNESS_BIN="$PWD/src-tauri/binaries/anyharness-${{ matrix.target }}"
          fi

          if [[ "${{ matrix.runner_os }}" == "macos" ]]; then
            if [[ -n "$_SIGNING_IDENTITY" ]]; then
              export APPLE_SIGNING_IDENTITY="$_SIGNING_IDENTITY"
              export APPLE_API_ISSUER="$_API_ISSUER"
              export APPLE_API_KEY="$_API_KEY"
              export APPLE_API_KEY_PATH="$HOME/private_keys/AuthKey_${_API_KEY}.p8"
            else
              export APPLE_SIGNING_IDENTITY="-"
            fi
            # Build the DMG in the known-good path first, then build the updater-
            # enabled app bundle separately so the mac updater tarball is emitted.
            pnpm tauri build --target ${{ matrix.target }} --bundles dmg
            pnpm tauri build --target ${{ matrix.target }} --bundles app
          else
            pnpm tauri build --target ${{ matrix.target }} --bundles msi,nsis
          fi

      - name: Verify updater artifacts
        if: steps.filter.outputs.skip != 'true'
        working-directory: desktop
        shell: bash
        run: |
          base="../target/${{ matrix.target }}/release/bundle"
          find "$base" -type f | sort

          if [[ "${{ matrix.runner_os }}" == "macos" ]]; then
            compgen -G "$base/dmg/*.dmg" > /dev/null || { echo "::error::Missing macOS DMG"; exit 1; }
            compgen -G "$base/macos/*.app.tar.gz" > /dev/null || { echo "::error::Missing macOS updater tarball"; exit 1; }
            compgen -G "$base/macos/*.app.tar.gz.sig" > /dev/null || { echo "::error::Missing macOS updater signature"; exit 1; }
          else
            compgen -G "$base/nsis/*-setup.exe" > /dev/null || { echo "::error::Missing Windows NSIS installer"; exit 1; }
            compgen -G "$base/nsis/*-setup.exe.sig" > /dev/null || { echo "::error::Missing Windows updater signature"; exit 1; }
          fi

      - name: Normalize updater artifact names (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        working-directory: desktop
        shell: bash
        run: |
          base="../target/${{ matrix.target }}/release/bundle/macos"
          version="${PROLIFERATE_RELEASE_VERSION}"

          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            suffix="aarch64"
          else
            suffix="x64"
          fi

          archive_src=$(find "$base" -maxdepth 1 -type f -name '*.app.tar.gz' ! -name '*_*.app.tar.gz' | head -n 1)
          sig_src=$(find "$base" -maxdepth 1 -type f -name '*.app.tar.gz.sig' ! -name '*_*.app.tar.gz.sig' | head -n 1)

          [[ -n "$archive_src" ]] || { echo "::error::Missing source updater archive"; exit 1; }
          [[ -n "$sig_src" ]] || { echo "::error::Missing source updater signature"; exit 1; }

          archive_dst="$base/Proliferate_${version}_${suffix}.app.tar.gz"
          sig_dst="$archive_dst.sig"

          mv "$archive_src" "$archive_dst"
          mv "$sig_src" "$sig_dst"

          echo "Normalized updater archive to $(basename "$archive_dst")"
          echo "Normalized updater signature to $(basename "$sig_dst")"

      - name: Normalize installer artifact names (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        working-directory: desktop
        shell: bash
        run: |
          base="../target/${{ matrix.target }}/release/bundle/dmg"
          version="${PROLIFERATE_RELEASE_VERSION}"

          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            suffix="aarch64"
          else
            suffix="x64"
          fi

          dmg_src=$(find "$base" -maxdepth 1 -type f -name '*.dmg' | head -n 1)
          [[ -n "$dmg_src" ]] || { echo "::error::Missing source DMG installer"; exit 1; }

          dmg_dst="$base/Proliferate_${version}_${suffix}.dmg"
          if [[ "$dmg_src" != "$dmg_dst" ]]; then
            mv "$dmg_src" "$dmg_dst"
          fi

          echo "Normalized DMG installer to $(basename "$dmg_dst")"

      - name: Verify normalized updater artifact names (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        working-directory: desktop
        shell: bash
        run: |
          base="../target/${{ matrix.target }}/release/bundle/macos"
          dmg_base="../target/${{ matrix.target }}/release/bundle/dmg"
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            suffix="aarch64"
          else
            suffix="x64"
          fi

          compgen -G "$dmg_base/*_${suffix}.dmg" > /dev/null || { echo "::error::Missing normalized macOS DMG"; exit 1; }
          compgen -G "$base/*_${suffix}.app.tar.gz" > /dev/null || { echo "::error::Missing normalized macOS updater tarball"; exit 1; }
          compgen -G "$base/*_${suffix}.app.tar.gz.sig" > /dev/null || { echo "::error::Missing normalized macOS updater signature"; exit 1; }

      - name: Stage release artifacts (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        working-directory: desktop
        shell: bash
        run: |
          stage="../target/${{ matrix.target }}/release/release-artifacts"
          rm -rf "$stage"
          mkdir -p "$stage"

          cp ../target/${{ matrix.target }}/release/bundle/dmg/*.dmg "$stage/"
          cp ../target/${{ matrix.target }}/release/bundle/macos/*_*.app.tar.gz "$stage/"
          cp ../target/${{ matrix.target }}/release/bundle/macos/*_*.app.tar.gz.sig "$stage/"

          find "$stage" -maxdepth 1 -type f | sort

      - name: Upload build artifacts (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/release-artifacts/*
          if-no-files-found: error
          compression-level: 0

      - name: Upload DMG-only artifact (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.runner_os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: proliferate-dmg-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/release-artifacts/*.dmg
          if-no-files-found: error
          compression-level: 0

  create-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - name: Validate release ref
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != desktop-v* ]]; then
            echo "::error::Manual non-dry-run desktop releases must run from a desktop-v* tag ref, not ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: desktop-*
          merge-multiple: false

      - name: List artifacts
        run: find all-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Proliferate Desktop ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: all-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-updater:
    needs: [build-desktop, create-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run && inputs.publish_updater)
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: desktop-*
          merge-multiple: false

      - name: List artifacts
        run: find all-artifacts -type f | sort

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DESKTOP_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate updater manifest
        run: |
          node scripts/generate-updater-manifest.mjs \
            --version "${GITHUB_REF_NAME#desktop-v}" \
            --artifacts-dir all-artifacts \
            --base-url "${{ vars.DESKTOP_DOWNLOADS_BASE_URL }}/desktop/stable" \
            --output latest.json

      - name: Generate installer manifest
        run: |
          node scripts/generate-desktop-installer-manifest.mjs \
            --version "${GITHUB_REF_NAME#desktop-v}" \
            --artifacts-dir all-artifacts \
            --base-url "${{ vars.DESKTOP_DOWNLOADS_BASE_URL }}/desktop/stable" \
            --output installers.json

      - name: Upload desktop assets to S3
        run: |
          BUCKET="${{ vars.DESKTOP_DOWNLOADS_S3_BUCKET }}"
          find all-artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*-setup.exe" -o \
            -name "*-setup.exe.sig" \
          \) -print0 | while IFS= read -r -d '' file; do
            aws s3 cp "$file" "s3://${BUCKET}/desktop/stable/$(basename "$file")"
          done

      - name: Upload manifest to S3
        run: |
          aws s3 cp latest.json \
            "s3://${{ vars.DESKTOP_DOWNLOADS_S3_BUCKET }}/desktop/stable/latest.json" \
            --content-type "application/json" \
            --cache-control "max-age=300"
          aws s3 cp installers.json \
            "s3://${{ vars.DESKTOP_DOWNLOADS_S3_BUCKET }}/desktop/stable/installers.json" \
            --content-type "application/json" \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DESKTOP_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/desktop/stable/latest.json" "/desktop/stable/installers.json"
