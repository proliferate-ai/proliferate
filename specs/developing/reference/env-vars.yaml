  secret: true
  default: ""
  description: Slack incoming webhook for support messages and completed support report notifications (Proliferate Cloud only)
  tags: [production]

- name: SUPPORT_REPORT_S3_BUCKET
  secret: false
  default: ""
  description: Private S3 bucket used for support report diagnostics and attachments; leave blank to disable support report uploads
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_S3_PREFIX
  secret: false
  default: "support/reports"
  description: S3 key prefix for support report request, diagnostics, attachment, and completion objects
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_S3_REGION
  secret: false
  default: ""
  description: Optional AWS region override for support report S3 clients and presigned URLs
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_UPLOAD_URL_EXPIRES_SECONDS
  secret: false
  default: "900"
  description: Lifetime in seconds for support report presigned PUT URLs
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_DIAGNOSTICS_MAX_BYTES
  secret: false
  default: "26214400"
  description: Maximum uncompressed diagnostics package size accepted for a support report
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_ATTACHMENT_MAX_BYTES
  secret: false
  default: "26214400"
  description: Maximum size of a single support report attachment
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_TOTAL_ATTACHMENT_MAX_BYTES
  secret: false
  default: "104857600"
  description: Maximum combined size of all support report attachments
  tags: [local-dev, self-hosted, production]

- name: SUPPORT_REPORT_INTERNAL_BASE_URL
  secret: false
  default: ""
  description: Internal support-report viewer URL prefix; Slack, GitHub, and Linear receive only this report URL or report ID, never S3 keys
  tags: [production]

- name: SUPPORT_FEED_BEARER_TOKEN
  secret: true
  default: ""
  description: Dedicated Bearer key for the private completed-report feed (GET /internal/support/reports); empty rejects every request so the route is dark-deployable. In hosted deploys it is never set as a plain value — the server ECS task receives it as a secret reference projected from the SUPPORT_FEED_SECRET_ARN record's supportFeedToken field
  tags: [production]

- name: SUPPORT_FEED_SECRET_ARN
  secret: false
  default: ""
  description: Non-secret ARN of the environment's AWS Secrets Manager support-feed record (JSON field supportFeedToken). Set as a GitHub environment variable; _deploy-server.yml requires it, verifies the field exists without reading the value, and renders exactly one SUPPORT_FEED_BEARER_TOKEN ECS secret with valueFrom `<ARN>:supportFeedToken::`. GitHub stores only the ARN; ECS resolves the token through the execution role
  tags: [ci, production]

- name: SUPPORT_REPORT_REQUIRE_CLIENT_RELEASE
  secret: false
  default: "false"
  description: When true, report completion rejects a NEW report whose client provided a release value that failed canonical validation; legacy clients that never send the field still complete with a warning. Off by default — production enablement is an explicit ops flip once desktop client adoption of canonical release IDs is confirmed
  tags: [production]

- name: PROLIFERATE_REQUIRE_RELEASE_IDENTITY
  secret: false
  default: "false"
  description: When true, the server fails closed (raises at release-ID construction) instead of emitting a degraded `0.0.0-dev`/SHA-less release. Production task definitions set this so a build shipped without a stamped version/SHA cannot emit a non-deterministic release
  tags: [production]

- name: SIGNUPS_SLACK_WEBHOOK_URL
  secret: true
  default: ""
  description: Slack incoming webhook for internal desktop GitHub hosted-user signup notifications; messages include user email, GitHub handle/id, name, and creation date
  tags: [production]

- name: BILLING_POSITIVE_SLACK_WEBHOOK_URL
  secret: true
  default: ""
  description: Slack incoming webhook for internal positive billing notifications; messages include billing owner email, GitHub handle/id, name, creation date, workspace count, and org user count
  tags: [production]

- name: BILLING_NEGATIVE_SLACK_WEBHOOK_URL
  secret: true
  default: ""
  description: Slack incoming webhook for internal negative billing notifications; messages include billing owner email, GitHub handle/id, name, creation date, workspace count, and org user count
  tags: [production]

