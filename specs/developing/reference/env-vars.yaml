# ═══════════════════════════════════════════════════════════════════════
# Server: Agent LLM Gateway (LiteLLM)
# ═══════════════════════════════════════════════════════════════════════

- name: AGENT_GATEWAY_ENABLED
  secret: false
  default: "false"
  description: Enables the LiteLLM-backed agent LLM gateway on the control plane
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_LITELLM_BASE_URL
  secret: false
  default: "http://127.0.0.1:14000"
  description: Private LiteLLM admin/base URL (in-VPC) used by the control plane for teams, users, virtual keys, and spend logs
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL
  secret: false
  default: ""
  description: Public LiteLLM inference base URL rendered into sandbox/local harness auth config
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_LITELLM_MASTER_KEY
  secret: true
  default: ""
  description: LiteLLM master key for the management API; never sent to sandboxes or clients
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_LITELLM_TIMEOUT_SECONDS
  secret: false
  default: "30.0"
  description: Timeout for LiteLLM management API requests
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_DEFAULT_USER_BUDGET_USD
  secret: false
  default: "5"
  description: Default LiteLLM budget (USD) applied to a personal team and virtual key at enrollment; "0" means uncapped
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_DEFAULT_ORG_BUDGET_USD
  secret: false
  default: "0"
  description: Default LiteLLM budget (USD) applied to an organization team at enrollment; "0" means uncapped (hard caps arrive with limits/top-ups)
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_BACKFILL_INTERVAL_SECONDS
  secret: false
  default: "300.0"
  description: Interval for the enrollment backfill worker that retries pending/failed LiteLLM enrollments and enrolls pre-existing users
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_FREE_CREDIT_USD
  secret: false
  default: "5"
  description: One-time free LLM credit (USD) granted at enrollment, deduped through free_cloud_allocation; "0" disables the grant
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_USAGE_IMPORT_INTERVAL_SECONDS
  secret: false
  default: "60.0"
  description: Interval for the usage-import worker that pages LiteLLM spend logs into the LLM usage ledger and enforces credit exhaustion
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_USAGE_IMPORT_OVERLAP_SECONDS
  secret: false
  default: "300.0"
  description: Overlap window (seconds) re-read on each usage-import tick; dedupe on litellm_request_id makes overlapping windows safe
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_TOPUP_INTERVAL_SECONDS
  secret: false
  default: "300.0"
  description: Interval for the LLM auto top-up worker that charges overage-enabled subjects below the credit threshold
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_TOPUP_THRESHOLD_USD
  secret: false
  default: "2"
  description: Remaining LLM credit (USD) below which an overage-enabled subject is auto-topped-up
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_TOPUP_AMOUNT_USD
  secret: false
  default: "10"
  description: LLM credit (USD) granted per auto top-up charge; must match the configured Stripe top-up price
  tags: [local-dev, self-hosted, production]

- name: AGENT_GATEWAY_LLM_TOPUP_PRICE_ID
  secret: false
  default: ""
  description: Stripe price id charged once per LLM auto top-up (distinct from the compute overage meter/price); empty disables auto top-ups entirely
  tags: [production]

- name: AGENT_GATEWAY_POLICY_MIN_PLAN
  secret: false
  default: "pro"
  description: Minimum org plan required to edit the org agent policy ("free" disables the gate; "pro" requires a healthy paid cloud subscription or an active unlimited-cloud entitlement); reading the policy and violations is never plan-gated
  tags: [local-dev, self-hosted, production]

