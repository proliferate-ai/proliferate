<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <!--
    DMG installer background — mono dark, matching the product palette
    (design/src/css/product.css: background #181818, faint = 49.8% white).
    Geometry is coupled to tauri.conf.json > bundle.macOS.dmg:
      window 660x400, app icon center (180,170), Applications center (480,170).
    The dotted guide runs exactly on the icon row (y=170).
    Rasterized to dmg-background.tiff (1x + 2x) — see assets/render-dmg-background.sh.
  -->
  <rect width="660" height="400" fill="#080808"/>

  <!-- Proliferate mark (ProliferateMark.tsx node grid), centered above, 22px -->
  <g transform="translate(319 44) scale(0.11)" fill="#ffffff" shape-rendering="crispEdges">
    <g transform="translate(-300 -300)">
      <rect x="375" y="375" width="50" height="50"/>
      <rect x="387.67" y="305" width="24.67" height="24.67"/>
      <rect x="429" y="346.33" width="24.67" height="24.67"/>
      <rect x="470.33" y="387.67" width="24.67" height="24.67"/>
      <rect x="429" y="429" width="24.67" height="24.67"/>
      <rect x="387.67" y="470.33" width="24.67" height="24.67"/>
      <rect x="346.33" y="429" width="24.67" height="24.67"/>
      <rect x="305" y="387.67" width="24.67" height="24.67"/>
      <rect x="346.33" y="346.33" width="24.67" height="24.67"/>
    </g>
  </g>

  <text x="330" y="94" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" letter-spacing="0.2" fill="#ffffff">Proliferate</text>

  <!-- Dotted guide on the icon row: app icon right edge -> Applications left edge -->
  <g stroke="rgba(255,255,255,0.32)" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="262" y1="170" x2="384" y2="170" stroke-dasharray="0.1 9"/>
    <path d="M387 161 L396 170 L387 179"/>
  </g>

  <text x="330" y="356" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.498)">Drag Proliferate into Applications to install</text>
</svg>
