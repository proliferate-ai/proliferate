        clientSecretEnv: CLOUD_MCP_GOOGLE_WORKSPACE_OAUTH_CLIENT_SECRET

  - key: google_calendar
    displayName: Google Calendar
    namespace: google_calendar
    providerGroup: google_workspace
    docsUrl: https://developers.google.com/workspace/guides/configure-mcp-servers
    transport: http
    implementation: upstream_mcp
    mcpUrl: https://calendarmcp.googleapis.com/mcp/v1
    defaultEnabled: true
    iconId: google_calendar
    authModes:
      - kind: oauth2
        clientStrategy: static
        clientIdEnv: CLOUD_MCP_GOOGLE_WORKSPACE_OAUTH_CLIENT_ID
        clientSecretEnv: CLOUD_MCP_GOOGLE_WORKSPACE_OAUTH_CLIENT_SECRET

  - key: vercel
    displayName: Vercel
    namespace: vercel
    providerGroup: vercel
    docsUrl: https://vercel.com/docs/mcp/deploy-mcp-servers-to-vercel
    transport: http
    implementation: upstream_mcp
    mcpUrl: https://mcp.vercel.com
    defaultEnabled: true
    iconId: vercel
    authModes:
      - kind: oauth2
        clientStrategy: static
        clientIdEnv: VERCEL_MCP_CLIENT_ID
        clientSecretEnv: VERCEL_MCP_CLIENT_SECRET

  - key: railway
    displayName: Railway
    namespace: railway
    providerGroup: railway
    docsUrl: https://docs.railway.com/ai/mcp-server
    transport: http
    implementation: upstream_mcp
    mcpUrl: https://mcp.railway.com
    defaultEnabled: true
    iconId: railway
    authModes:
      - kind: oauth2
        clientStrategy: static
        clientIdEnv: RAILWAY_MCP_CLIENT_ID
