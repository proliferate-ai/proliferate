        clientSecretEnv: CLOUD_MCP_GOOGLE_WORKSPACE_OAUTH_CLIENT_SECRET

  - key: google_drive
    displayName: Google Drive
    namespace: google_drive
    providerGroup: google_workspace
    docsUrl: https://developers.google.com/workspace/guides/configure-mcp-servers
    transport: http
