services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proliferate
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: proliferate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proliferate"]
      interval: 5s
      timeout: 3s
      retries: 5

  litellm-db:
    image: postgres:16-alpine
    profiles: ["agent-gateway"]
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: litellm
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    profiles: ["agent-gateway"]
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_URL: postgresql://litellm:localdev@litellm-db:5432/litellm
      LITELLM_MASTER_KEY: ${AGENT_GATEWAY_LITELLM_MASTER_KEY:-sk-local-dev-agent-gateway}
      STORE_MODEL_IN_DB: "True"
    depends_on:
      litellm-db:
        condition: service_healthy
    command: ["--host", "0.0.0.0", "--port", "4000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://proliferate:localdev@db:5432/proliferate
      JWT_SECRET: local-dev-secret-change-in-production
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://proliferate:localdev@db:5432/proliferate
      JWT_SECRET: local-dev-secret-change-in-production
      DEBUG: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  litellm_pgdata:
