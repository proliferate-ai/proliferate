AWSTemplateFormatVersion: "2010-09-09"
Description: Proliferate self-hosted control plane on a single EC2 host.

Parameters:
  ReleaseVersion:
    Type: String
    Description: Unprefixed release version used for the GHCR image tag; the default runtime asset is downloaded from server-v<ReleaseVersion>.

  ServerImageRepository:
    Type: String
    Default: ghcr.io/proliferate-ai/proliferate-server
    Description: Container image repository for the Proliferate API.

  RuntimeBinaryUrl:
    Type: String
    Default: ""
    Description: Optional override for the runtime binary tarball URL. Leave blank to use the server release asset.

  RuntimeBinaryChecksumUrl:
    Type: String
    Default: ""
    Description: Optional override for a SHA256SUMS file used to verify the runtime tarball. Leave blank to use the matching server release asset checksum file when RuntimeBinaryUrl is also blank.

  SiteAddress:
    Type: String
    Default: ""
    Description: Public hostname for the control plane. Required unless UseSslipFallback is true.

  UseSslipFallback:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Use an sslip.io hostname derived from the Elastic IP instead of a custom domain.

  CreateRoute53Record:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Create a Route53 A record for SiteAddress.

  HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 hosted zone id for SiteAddress when CreateRoute53Record is true.

  ExistingVpcId:
    Type: String
    Default: ""
    Description: Optional existing VPC id to reuse instead of creating a dedicated VPC.

  ExistingSubnetId:
    Type: String
    Default: ""
    Description: Optional existing public subnet id to reuse instead of creating a dedicated subnet.

  AllocateElasticIp:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Allocate and attach a dedicated Elastic IP. Set false to rely on the instance public IP.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
    Description: EC2 instance type for the self-hosted control plane.

  PostgresPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional password for the bundled Postgres container. Leave blank to auto-generate and persist one on first bootstrap.

  JwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional JWT signing secret for the control plane. Leave blank to auto-generate and persist one on first bootstrap.

  CloudSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional secret key used for cloud auth/session signing. Leave blank to auto-generate and persist one on first bootstrap.

  GitHubOAuthClientId:
    Type: String
    Default: ""
    Description: GitHub OAuth client id for the shared sign-in callback.

  GitHubOAuthClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: GitHub OAuth client secret for the shared sign-in callback.

  E2BApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: E2B API key for managed cloud sandboxes.

  E2BTemplateName:
    Type: String
    Default: ""
    Description: E2B template ref, for example team-slug/proliferate-runtime-cloud:production.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Amazon Linux 2023 arm64 AMI id.

Rules:
  SiteAddressRequiredWithoutSslip:
    RuleCondition: !Equals [!Ref UseSslipFallback, "false"]
    Assertions:
      - Assert: !Not [!Equals [!Ref SiteAddress, ""]]
        AssertDescription: SiteAddress is required unless UseSslipFallback is true.

  HostedZoneRequiredWhenRoute53Enabled:
    RuleCondition: !Equals [!Ref CreateRoute53Record, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref HostedZoneId, ""]]
        AssertDescription: HostedZoneId is required when CreateRoute53Record is true.
      - Assert: !Equals [!Ref UseSslipFallback, "false"]
        AssertDescription: CreateRoute53Record cannot be used with UseSslipFallback.

  ExistingVpcRequiresSubnet:
    RuleCondition: !Not [!Equals [!Ref ExistingVpcId, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingSubnetId, ""]]
        AssertDescription: ExistingSubnetId is required when ExistingVpcId is provided.

  ExistingSubnetRequiresVpc:
    RuleCondition: !Not [!Equals [!Ref ExistingSubnetId, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingVpcId, ""]]
        AssertDescription: ExistingVpcId is required when ExistingSubnetId is provided.

  # Cloud sandboxes are an optional add-on: the base install must launch with
  # no E2B configuration at all. Only enforce that the two settings arrive as
  # a pair when the operator opts in.
  E2BTemplateRequiredWithApiKey:
    RuleCondition: !Not [!Equals [!Ref E2BApiKey, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref E2BTemplateName, ""]]
        AssertDescription: E2BTemplateName is required when E2BApiKey is set.

  E2BApiKeyRequiredWithTemplate:
    RuleCondition: !Not [!Equals [!Ref E2BTemplateName, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref E2BApiKey, ""]]
        AssertDescription: E2BApiKey is required when E2BTemplateName is set.

Conditions:
  UsesSslipFallback: !Equals [!Ref UseSslipFallback, "true"]
  HasExistingVpcId: !Not [!Equals [!Ref ExistingVpcId, ""]]
  HasExistingSubnetId: !Not [!Equals [!Ref ExistingSubnetId, ""]]
  UsesExistingNetwork: !And
    - !Condition HasExistingVpcId
    - !Condition HasExistingSubnetId
  CreatesVpcResources: !Not [!Condition UsesExistingNetwork]
  UsesElasticIp: !Equals [!Ref AllocateElasticIp, "true"]
  CreatesRoute53Record: !And
    - !Equals [!Ref CreateRoute53Record, "true"]
    - !Not [!Equals [!Ref HostedZoneId, ""]]
    - !Not [!Condition UsesSslipFallback]
  HasRuntimeBinaryUrlOverride: !Not [!Equals [!Ref RuntimeBinaryUrl, ""]]
  HasRuntimeBinaryChecksumUrlOverride: !Not [!Equals [!Ref RuntimeBinaryChecksumUrl, ""]]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Condition: CreatesVpcResources
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreatesVpcResources
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreatesVpcResources
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreatesVpcResources
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.42.0.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreatesVpcResources
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Condition: CreatesVpcResources
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreatesVpcResources
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  ProliferateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ingress for the Proliferate control plane.
      VpcId: !If
        - UsesExistingNetwork
        - !Ref ExistingVpcId
        - !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-sg

  ProliferateEip:
    Type: AWS::EC2::EIP
    Condition: UsesElasticIp
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-eip

  ProliferateEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: UsesElasticIp
    Properties:
      AllocationId: !GetAtt ProliferateEip.AllocationId
      InstanceId: !Ref ProliferateInstance

  ProliferateIamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: CloudFormationBootstrapAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:SignalResource
                Resource: "*"

  ProliferateInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref ProliferateIamRole]

  ProliferateInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          bootstrap:
            - install
            - write_files
            - deploy
          update:
            - write_files
            - deploy-update

        install:
          commands:
            01-install-base:
              command: |
                dnf install -y docker awscli aws-cfn-bootstrap tar openssl
            02-install-compose-plugin:
              command: |
                if ! docker compose version >/dev/null 2>&1; then
                  dnf install -y docker-compose-plugin || true
                fi
                if ! docker compose version >/dev/null 2>&1; then
                  arch="$(uname -m)"
                  case "$arch" in
                    aarch64|arm64)
                      compose_arch="aarch64"
                      ;;
                    x86_64|amd64)
                      compose_arch="x86_64"
                      ;;
                    *)
                      echo "Unsupported architecture for Docker Compose plugin: $arch" >&2
                      exit 1
                      ;;
                  esac
                  mkdir -p /usr/local/lib/docker/cli-plugins
                  curl -fsSL "https://github.com/docker/compose/releases/download/v2.39.4/docker-compose-linux-${compose_arch}" \
                    -o /usr/local/lib/docker/cli-plugins/docker-compose
                  chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                fi
                docker compose version
            03-enable-docker:
              command: systemctl enable --now docker
            04-create-directories:
              command: mkdir -p /opt/proliferate/server/deploy /opt/proliferate/bin /etc/cfn/hooks.d

        write_files:
          files:
            /opt/proliferate/server/deploy/docker-compose.production.yml:
              mode: "000644"
              owner: root
              group: root
              content: |
                services:
                  caddy:
                    image: caddy:2
                    restart: unless-stopped
                    ports:
                      - "80:80"
                      - "443:443"
                    environment:
                      SITE_ADDRESS: ${SITE_ADDRESS}
                    volumes:
                      - ./Caddyfile:/etc/caddy/Caddyfile:ro
                      - caddy_data:/data
                      - caddy_config:/config
                    depends_on:
                      api:
                        condition: service_started

                  db:
                    image: postgres:16-alpine
                    restart: unless-stopped
                    environment:
                      POSTGRES_DB: ${POSTGRES_DB}
                      POSTGRES_USER: ${POSTGRES_USER}
                      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                    volumes:
                      - pgdata:/var/lib/postgresql/data
                    healthcheck:
                      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
                      interval: 5s
                      timeout: 3s
                      retries: 10

                  migrate:
                    image: ${PROLIFERATE_SERVER_IMAGE:-ghcr.io/proliferate-ai/proliferate-server}:${PROLIFERATE_SERVER_IMAGE_TAG:-stable}
                    restart: "no"
                    env_file:
                      - ${PROLIFERATE_ENV_FILE:-.env}
                    depends_on:
                      db:
                        condition: service_healthy
                    command: ["alembic", "upgrade", "head"]

                  api:
                    image: ${PROLIFERATE_SERVER_IMAGE:-ghcr.io/proliferate-ai/proliferate-server}:${PROLIFERATE_SERVER_IMAGE_TAG:-stable}
                    restart: unless-stopped
                    env_file:
                      - ${PROLIFERATE_ENV_FILE:-.env}
                    ports:
                      - "127.0.0.1:8000:8000"
                    volumes:
                      - ${PROLIFERATE_HOST_BIN_DIR:-/opt/proliferate/bin}:/opt/proliferate/bin:ro
                      # First-run setup token plaintext lives here until the instance is
                      # claimed. A named volume so restarts and image updates do not rotate it.
                      - setup_state:/var/lib/proliferate/setup
                    depends_on:
                      db:
                        condition: service_healthy
                    command:
                      [
                        "uvicorn",
                        "proliferate.main:app",
                        "--host",
                        "0.0.0.0",
                        "--port",
                        "8000",
                        "--proxy-headers",
                        "--forwarded-allow-ips",
                        "*",
                      ]

                volumes:
                  pgdata:
                  caddy_data:
                  caddy_config:
                  setup_state:

            /opt/proliferate/server/deploy/Caddyfile:
              mode: "000644"
              owner: root
              group: root
              content: |
                {$SITE_ADDRESS} {
                  encode zstd gzip
                  reverse_proxy api:8000
                }

            /opt/proliferate/server/deploy/bootstrap.sh:
              mode: "000755"
              owner: root
              group: root
              content: |
                #!/usr/bin/env bash

                set -euo pipefail

                SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                STATIC_ENV_FILE="$SCRIPT_DIR/.env.static"
                LEGACY_ENV_FILE="$SCRIPT_DIR/.env"
                RUNTIME_ENV_FILE="$SCRIPT_DIR/.env.runtime"
                EXAMPLE_ENV_FILE="$SCRIPT_DIR/.env.production.example"

                if [[ -f "$STATIC_ENV_FILE" ]]; then
                  ENV_FILE="$STATIC_ENV_FILE"
                else
                  ENV_FILE="$LEGACY_ENV_FILE"
                fi

                if ! command -v docker >/dev/null 2>&1; then
                  echo "Docker is required." >&2
                  exit 1
                fi

                if ! docker compose version >/dev/null 2>&1; then
                  echo "Docker Compose v2 is required." >&2
                  exit 1
                fi

                if [[ ! -f "$ENV_FILE" ]]; then
                  cp "$EXAMPLE_ENV_FILE" "$STATIC_ENV_FILE"
                  echo "Created $STATIC_ENV_FILE from $EXAMPLE_ENV_FILE."
                  echo "Edit it, point DNS at your host, then rerun this script."
                  exit 0
                fi

                export PROLIFERATE_STATIC_ENV_FILE="$ENV_FILE"
                export PROLIFERATE_ENV_FILE="$RUNTIME_ENV_FILE"

                "$SCRIPT_DIR/ensure-secrets.sh"
                "$SCRIPT_DIR/registry-login.sh"
                "$SCRIPT_DIR/install-runtime.sh"

                COMPOSE_ARGS=(--env-file "$RUNTIME_ENV_FILE" -f "$SCRIPT_DIR/docker-compose.production.yml")

                # Optional compose override, used by the self-host smoke (smoke/run-smoke.sh)
                # to remap host ports while exercising this exact bootstrap path.
                if [[ -n "${PROLIFERATE_COMPOSE_OVERRIDE_FILE:-}" ]]; then
                  COMPOSE_ARGS+=(-f "$PROLIFERATE_COMPOSE_OVERRIDE_FILE")
                fi

                docker compose "${COMPOSE_ARGS[@]}" up -d db
                docker compose "${COMPOSE_ARGS[@]}" run --rm migrate
                docker compose "${COMPOSE_ARGS[@]}" up -d api caddy

                # Waits for /health, then prints the first-run setup token and claim URL when
                # the instance is still unclaimed.
                "$SCRIPT_DIR/wait-for-health.sh"

            /opt/proliferate/server/deploy/update.sh:
              mode: "000755"
              owner: root
              group: root
              content: |
                #!/usr/bin/env bash

                set -euo pipefail

                SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                COMPOSE_FILE="$SCRIPT_DIR/docker-compose.production.yml"
                STATIC_ENV_FILE="$SCRIPT_DIR/.env.static"
                LEGACY_ENV_FILE="$SCRIPT_DIR/.env"
                RUNTIME_ENV_FILE="$SCRIPT_DIR/.env.runtime"

                if [[ -f "$STATIC_ENV_FILE" ]]; then
                  ENV_FILE="$STATIC_ENV_FILE"
                else
                  ENV_FILE="$LEGACY_ENV_FILE"
                fi

                if [[ ! -f "$ENV_FILE" ]]; then
                  echo "Missing $ENV_FILE. Copy .env.production.example to .env.static and set your values first." >&2
                  exit 1
                fi

                export PROLIFERATE_STATIC_ENV_FILE="$ENV_FILE"
                export PROLIFERATE_ENV_FILE="$RUNTIME_ENV_FILE"

                "$SCRIPT_DIR/ensure-secrets.sh"
                "$SCRIPT_DIR/registry-login.sh"
                "$SCRIPT_DIR/install-runtime.sh"

                COMPOSE_ARGS=(--env-file "$RUNTIME_ENV_FILE" -f "$COMPOSE_FILE")

                docker compose "${COMPOSE_ARGS[@]}" pull
                docker compose "${COMPOSE_ARGS[@]}" run --rm migrate
                docker compose "${COMPOSE_ARGS[@]}" up -d

                "$SCRIPT_DIR/wait-for-health.sh"

            /opt/proliferate/server/deploy/ensure-secrets.sh:
              mode: "000755"
              owner: root
              group: root
              content: |
                #!/usr/bin/env bash

                set -euo pipefail

                SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                STATIC_ENV_FILE="${PROLIFERATE_STATIC_ENV_FILE:-$SCRIPT_DIR/.env.static}"
                LOCAL_ENV_FILE="${PROLIFERATE_LOCAL_ENV_FILE:-$SCRIPT_DIR/.env.local}"
                LEGACY_ENV_FILE="$SCRIPT_DIR/.env"
                GENERATED_ENV_FILE="${PROLIFERATE_GENERATED_ENV_FILE:-$SCRIPT_DIR/.env.generated}"
                RUNTIME_ENV_FILE="${PROLIFERATE_ENV_FILE:-$SCRIPT_DIR/.env.runtime}"

                if [[ ! -f "$STATIC_ENV_FILE" && -f "$LEGACY_ENV_FILE" ]]; then
                  STATIC_ENV_FILE="$LEGACY_ENV_FILE"
                fi

                if [[ ! -f "$STATIC_ENV_FILE" ]]; then
                  echo "Missing static env file. Create $SCRIPT_DIR/.env.static (or legacy $LEGACY_ENV_FILE) first." >&2
                  exit 1
                fi

                read_env_value() {
                  local file="$1"
                  local key="$2"
                  local line

                  if [[ ! -f "$file" ]]; then
                    return 0
                  fi

                  line="$(grep -m1 "^${key}=" "$file" || true)"
                  if [[ -z "$line" ]]; then
                    return 0
                  fi

                  printf '%s' "${line#*=}"
                }

                read_config_env_value() {
                  local key="$1"
                  local value

                  value="$(read_env_value "$LOCAL_ENV_FILE" "$key")"
                  if [[ -n "$value" ]]; then
                    printf '%s' "$value"
                    return 0
                  fi

                  read_env_value "$STATIC_ENV_FILE" "$key"
                }

                copy_unmanaged_env_values() {
                  local source_file="$1"
                  local override_file="${2:-}"
                  local managed_pattern

                  if [[ ! -f "$source_file" ]]; then
                    return 0
                  fi

                  managed_pattern="^(POSTGRES_PASSWORD|DATABASE_URL|JWT_SECRET|CLOUD_SECRET_KEY|SITE_ADDRESS|API_BASE_URL|PROLIFERATE_PUBLIC_HEALTHCHECK_URL|PROLIFERATE_USE_SSLIP_FALLBACK)$"

                  if [[ -n "$override_file" && -f "$override_file" ]]; then
                    awk -F= -v managed_pattern="$managed_pattern" '
                      FNR == NR {
                        if ($0 ~ /^[A-Za-z_][A-Za-z0-9_]*=/) {
                          overrides[$1] = 1
                        }
                        next
                      }
                      $0 ~ /^[A-Za-z_][A-Za-z0-9_]*=/ {
                        if ($1 ~ managed_pattern || $1 in overrides) {
                          next
                        }
                      }
                      { print }
                    ' "$override_file" "$source_file"
                    return 0
                  fi

                  awk -F= -v managed_pattern="$managed_pattern" '
                    $0 ~ /^[A-Za-z_][A-Za-z0-9_]*=/ {
                      if ($1 ~ managed_pattern) {
                        next
                      }
                    }
                    { print }
                  ' "$source_file"
                }

                resolve_instance_public_ip() {
                  local token=""
                  local ip=""
                  local attempt

                  for attempt in $(seq 1 30); do
                    token="$(curl -fsS --connect-timeout 1 --max-time 2 -X PUT \
                      "http://169.254.169.254/latest/api/token" \
                      -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" || true)"

                    if [[ -n "$token" ]]; then
                      ip="$(curl -fsS --connect-timeout 1 --max-time 2 \
                        -H "X-aws-ec2-metadata-token: $token" \
                        "http://169.254.169.254/latest/meta-data/public-ipv4" || true)"
                    else
                      ip="$(curl -fsS --connect-timeout 1 --max-time 2 \
                        "http://169.254.169.254/latest/meta-data/public-ipv4" || true)"
                    fi

                    if [[ -n "$ip" ]]; then
                      printf '%s' "$ip"
                      return 0
                    fi

                    sleep 2
                  done

                  echo "Unable to resolve the instance public IPv4 for sslip fallback." >&2
                  exit 1
                }

                # Compose a URL from SITE_ADDRESS. Operators may set SITE_ADDRESS with or
                # without a scheme (Caddy accepts both); Caddy serves https unless the
                # operator configured an explicit http:// site.
                site_url_from_address() {
                  local address="$1"
                  local path="$2"
                  local scheme="https"
                  local host="$address"

                  if [[ "$host" == http://* ]]; then
                    scheme="http"
                    host="${host#http://}"
                  elif [[ "$host" == https://* ]]; then
                    host="${host#https://}"
                  fi
                  host="${host%/}"

                  printf '%s://%s%s' "$scheme" "$host" "$path"
                }

                random_hex() {
                  local bytes="$1"

                  if command -v openssl >/dev/null 2>&1; then
                    openssl rand -hex "$bytes"
                    return 0
                  fi

                  python3 - "$bytes" <<'PY'
                import secrets
                import sys

                print(secrets.token_hex(int(sys.argv[1])))
                PY
                }

                resolve_value() {
                  local key="$1"
                  local generated_value="$2"
                  local static_value="$3"
                  local random_bytes="$4"

                  if [[ -n "$generated_value" ]]; then
                    printf '%s' "$generated_value"
                    return 0
                  fi

                  if [[ -n "$static_value" ]]; then
                    printf '%s' "$static_value"
                    return 0
                  fi

                  random_hex "$random_bytes"
                }

                POSTGRES_DB="$(read_config_env_value POSTGRES_DB)"
                POSTGRES_USER="$(read_config_env_value POSTGRES_USER)"
                POSTGRES_DB="${POSTGRES_DB:-proliferate}"
                POSTGRES_USER="${POSTGRES_USER:-proliferate}"
                SITE_ADDRESS="$(read_config_env_value SITE_ADDRESS)"
                PUBLIC_HEALTHCHECK_URL="$(read_config_env_value PROLIFERATE_PUBLIC_HEALTHCHECK_URL)"
                USE_SSLIP_FALLBACK="$(read_config_env_value PROLIFERATE_USE_SSLIP_FALLBACK)"

                if [[ -z "$SITE_ADDRESS" && "$USE_SSLIP_FALLBACK" == "true" ]]; then
                  SITE_ADDRESS="$(resolve_instance_public_ip).sslip.io"
                fi

                if [[ -z "$SITE_ADDRESS" ]]; then
                  echo "SITE_ADDRESS must be set unless PROLIFERATE_USE_SSLIP_FALLBACK=true." >&2
                  exit 1
                fi

                if [[ -z "$PUBLIC_HEALTHCHECK_URL" ]]; then
                  PUBLIC_HEALTHCHECK_URL="$(site_url_from_address "$SITE_ADDRESS" /health)"
                fi

                # The server embeds API_BASE_URL in configuration it pushes to workspaces.
                # Operators can set it explicitly; otherwise derive it from SITE_ADDRESS so
                # the sslip fallback (where SITE_ADDRESS is resolved at runtime) works too.
                API_BASE_URL="$(read_config_env_value API_BASE_URL)"
                if [[ -z "$API_BASE_URL" ]]; then
                  API_BASE_URL="$(site_url_from_address "$SITE_ADDRESS" "")"
                fi

                POSTGRES_PASSWORD="$(resolve_value \
                  POSTGRES_PASSWORD \
                  "$(read_env_value "$GENERATED_ENV_FILE" POSTGRES_PASSWORD)" \
                  "$(read_config_env_value POSTGRES_PASSWORD)" \
                  24)"
                JWT_SECRET="$(resolve_value \
                  JWT_SECRET \
                  "$(read_env_value "$GENERATED_ENV_FILE" JWT_SECRET)" \
                  "$(read_config_env_value JWT_SECRET)" \
                  32)"
                CLOUD_SECRET_KEY="$(resolve_value \
                  CLOUD_SECRET_KEY \
                  "$(read_env_value "$GENERATED_ENV_FILE" CLOUD_SECRET_KEY)" \
                  "$(read_config_env_value CLOUD_SECRET_KEY)" \
                  32)"
                cat >"$GENERATED_ENV_FILE" <<EOF
                # Generated on first bootstrap. Preserve this file to keep stack-managed secrets stable.
                POSTGRES_PASSWORD=$POSTGRES_PASSWORD
                JWT_SECRET=$JWT_SECRET
                CLOUD_SECRET_KEY=$CLOUD_SECRET_KEY
                EOF

                {
                  printf '# Generated runtime env. Do not edit directly.\n'
                  copy_unmanaged_env_values "$STATIC_ENV_FILE" "$LOCAL_ENV_FILE"
                  copy_unmanaged_env_values "$LOCAL_ENV_FILE"
                  printf 'SITE_ADDRESS=%s\n' "$SITE_ADDRESS"
                  printf 'API_BASE_URL=%s\n' "$API_BASE_URL"
                  printf 'PROLIFERATE_PUBLIC_HEALTHCHECK_URL=%s\n' "$PUBLIC_HEALTHCHECK_URL"
                  printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
                  printf 'DATABASE_URL=postgresql+asyncpg://%s:%s@db:5432/%s\n' "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$POSTGRES_DB"
                  printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
                  printf 'CLOUD_SECRET_KEY=%s\n' "$CLOUD_SECRET_KEY"
                } >"$RUNTIME_ENV_FILE"

                chmod 600 "$GENERATED_ENV_FILE" "$RUNTIME_ENV_FILE"

            /opt/proliferate/server/deploy/install-runtime.sh:
              mode: "000755"
              owner: root
              group: root
              content: |
                #!/usr/bin/env bash

                set -euo pipefail

                SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                ENV_FILE="${PROLIFERATE_ENV_FILE:-$SCRIPT_DIR/.env}"

                if [[ ! -f "$ENV_FILE" ]]; then
                  echo "Missing $ENV_FILE. Generate the runtime env via bootstrap/update first." >&2
                  exit 1
                fi

                read_env_value() {
                  local key="$1"
                  local line

                  line="$(grep -m1 "^${key}=" "$ENV_FILE" || true)"
                  if [[ -z "$line" ]]; then
                    return 0
                  fi

                  printf '%s' "${line#*=}"
                }

                TARGET_PATH="$(read_env_value CLOUD_RUNTIME_SOURCE_BINARY_PATH)"
                WORKER_TARGET_PATH="$(read_env_value CLOUD_WORKER_SOURCE_BINARY_PATH)"
                SUPERVISOR_TARGET_PATH="$(read_env_value CLOUD_SUPERVISOR_SOURCE_BINARY_PATH)"
                RUNTIME_URL="$(read_env_value RUNTIME_BINARY_URL)"
                RUNTIME_SHA256="$(read_env_value RUNTIME_BINARY_SHA256)"
                RUNTIME_SHA256_URL="$(read_env_value RUNTIME_BINARY_SHA256_URL)"

                if [[ -z "$TARGET_PATH" && -z "$WORKER_TARGET_PATH" && -z "$SUPERVISOR_TARGET_PATH" ]]; then
                  exit 0
                fi

                needs_download=0
                for requested_path in "$TARGET_PATH" "$WORKER_TARGET_PATH" "$SUPERVISOR_TARGET_PATH"; do
                  if [[ -n "$requested_path" && ! -x "$requested_path" ]]; then
                    needs_download=1
                  fi
                done

                if [[ "$needs_download" == "0" && -z "$RUNTIME_URL" ]]; then
                  exit 0
                fi

                if [[ -z "$RUNTIME_URL" ]]; then
                  echo "Missing one or more runtime bundle binaries and RUNTIME_BINARY_URL is not set." >&2
                  exit 1
                fi

                for requested_path in "$TARGET_PATH" "$WORKER_TARGET_PATH" "$SUPERVISOR_TARGET_PATH"; do
                  if [[ -n "$requested_path" ]]; then
                    mkdir -p "$(dirname "$requested_path")"
                  fi
                done

                temp_dir="$(mktemp -d)"
                trap 'rm -rf "$temp_dir"' EXIT

                archive_path="$temp_dir/runtime.tar.gz"
                curl -fsSL "$RUNTIME_URL" -o "$archive_path"

                if [[ -z "$RUNTIME_SHA256" && -n "$RUNTIME_SHA256_URL" ]]; then
                  checksum_path="$temp_dir/SHA256SUMS"
                  runtime_filename="$(basename "$RUNTIME_URL")"
                  curl -fsSL "$RUNTIME_SHA256_URL" -o "$checksum_path"
                  RUNTIME_SHA256="$(
                    awk -v filename="$runtime_filename" '$2 == filename { print $1; exit }' "$checksum_path"
                  )"

                  if [[ -z "$RUNTIME_SHA256" ]]; then
                    echo "Checksum file $RUNTIME_SHA256_URL did not contain an entry for $runtime_filename." >&2
                    exit 1
                  fi
                fi

                if [[ -n "$RUNTIME_SHA256" ]]; then
                  actual_sha256="$(sha256sum "$archive_path" | awk '{print $1}')"
                  if [[ "$actual_sha256" != "$RUNTIME_SHA256" ]]; then
                    echo "Runtime archive checksum mismatch for $RUNTIME_URL." >&2
                    exit 1
                  fi
                fi

                tar xzf "$archive_path" -C "$temp_dir"

                if [[ ! -f "$temp_dir/anyharness" ]]; then
                  echo "Downloaded runtime archive did not contain an anyharness binary." >&2
                  exit 1
                fi

                install_binary_if_requested() {
                  local binary_name="$1"
                  local target_path="$2"

                  if [[ -z "$target_path" ]]; then
                    return 0
                  fi
                  if [[ ! -f "$temp_dir/$binary_name" ]]; then
                    echo "Downloaded runtime archive did not contain a $binary_name binary." >&2
                    exit 1
                  fi
                  install -m 0755 "$temp_dir/$binary_name" "$target_path"
                }

                install_binary_if_requested anyharness "$TARGET_PATH"
                install_binary_if_requested proliferate-worker "$WORKER_TARGET_PATH"
                install_binary_if_requested proliferate-supervisor "$SUPERVISOR_TARGET_PATH"

            /opt/proliferate/server/deploy/registry-login.sh:
              mode: "000755"
              owner: root
              group: root
              content: |
                #!/usr/bin/env bash

                set -euo pipefail

                SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                ENV_FILE="${PROLIFERATE_ENV_FILE:-$SCRIPT_DIR/.env}"

                if [[ ! -f "$ENV_FILE" ]]; then
                  echo "Missing $ENV_FILE. Generate the runtime env via bootstrap/update first." >&2
                  exit 1
                fi

                read_env_value() {
                  local key="$1"
                  local line

                  line="$(grep -m1 "^${key}=" "$ENV_FILE" || true)"
                  if [[ -z "$line" ]]; then
                    return 0
                  fi

                  printf '%s' "${line#*=}"
                }

                IMAGE_REPOSITORY="$(read_env_value PROLIFERATE_SERVER_IMAGE)"
                if [[ -z "$IMAGE_REPOSITORY" ]]; then
                  IMAGE_REPOSITORY="ghcr.io/proliferate-ai/proliferate-server"
                fi
                REGISTRY_HOST="${IMAGE_REPOSITORY%%/*}"

                if [[ ! "$REGISTRY_HOST" =~ \.dkr\.ecr\.[^.]+\.amazonaws\.com$ ]]; then
                  exit 0
                fi

                if ! command -v aws >/dev/null 2>&1; then
                  echo "aws CLI is required to authenticate to private ECR registries." >&2
                  exit 1
                fi

                AWS_REGION_VALUE="$(read_env_value AWS_REGION)"
                if [[ -z "$AWS_REGION_VALUE" ]]; then
                  echo "AWS_REGION must be set when pulling Proliferate images from private ECR." >&2
                  exit 1
                fi

                aws ecr get-login-password --region "$AWS_REGION_VALUE" \
                  | docker login --username AWS --password-stdin "$REGISTRY_HOST"

            /opt/proliferate/server/deploy/wait-for-health.sh:
              mode: "000755"
              owner: root
              group: root
              content: |
                #!/usr/bin/env bash

                set -euo pipefail

                SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
                HEALTHCHECK_URL="${PROLIFERATE_HEALTHCHECK_URL:-http://127.0.0.1:8000/health}"
                PUBLIC_HEALTHCHECK_URL="${PROLIFERATE_PUBLIC_HEALTHCHECK_URL:-}"
                MAX_ATTEMPTS="${PROLIFERATE_HEALTHCHECK_ATTEMPTS:-60}"
                SLEEP_SECONDS="${PROLIFERATE_HEALTHCHECK_SLEEP_SECONDS:-2}"
                COMPOSE_FILE="${PROLIFERATE_COMPOSE_FILE:-$SCRIPT_DIR/docker-compose.production.yml}"
                SETUP_TOKEN_PATH="${PROLIFERATE_SETUP_TOKEN_PATH:-/var/lib/proliferate/setup/setup-token}"

                warn() {
                  echo "WARNING: $*" >&2
                }

                # Resolve the compose env file explicitly so this script also works standalone
                # (bootstrap.sh exports PROLIFERATE_ENV_FILE, but an operator re-running the
                # health gate by hand does not). Prefer the generated runtime env, then the
                # operator's static env next to this script.
                resolve_runtime_env_file() {
                  if [[ -n "${PROLIFERATE_ENV_FILE:-}" ]]; then
                    printf '%s' "$PROLIFERATE_ENV_FILE"
                    return 0
                  fi

                  local candidate
                  for candidate in "$SCRIPT_DIR/.env.runtime" "$SCRIPT_DIR/.env.static" "$SCRIPT_DIR/.env"; do
                    if [[ -f "$candidate" ]]; then
                      printf '%s' "$candidate"
                      return 0
                    fi
                  done

                  printf '%s' "$SCRIPT_DIR/.env.runtime"
                }

                RUNTIME_ENV_FILE="$(resolve_runtime_env_file)"

                read_env_value() {
                  local file="$1"
                  local key="$2"
                  local line

                  if [[ ! -f "$file" ]]; then
                    return 0
                  fi

                  line="$(grep -m1 "^${key}=" "$file" || true)"
                  if [[ -z "$line" ]]; then
                    return 0
                  fi

                  printf '%s' "${line#*=}"
                }

                # Compose a browser URL from SITE_ADDRESS. Operators may set SITE_ADDRESS with
                # or without a scheme (Caddy accepts both); Caddy serves https unless the
                # operator configured an explicit http:// site.
                site_url_from_address() {
                  local address="$1"
                  local path="$2"
                  local scheme="https"
                  local host="$address"

                  if [[ "$host" == http://* ]]; then
                    scheme="http"
                    host="${host#http://}"
                  elif [[ "$host" == https://* ]]; then
                    host="${host#https://}"
                  fi
                  host="${host%/}"

                  printf '%s://%s%s' "$scheme" "$host" "$path"
                }

                wait_for_url() {
                  local url="$1"
                  local attempt=1

                  until curl -fsS "$url" >/dev/null; do
                    if (( attempt >= MAX_ATTEMPTS )); then
                      echo "Health check failed for $url after $MAX_ATTEMPTS attempts." >&2
                      exit 1
                    fi

                    attempt=$((attempt + 1))
                    sleep "$SLEEP_SECONDS"
                  done
                }

                print_setup_instructions() {
                  # While the instance is unclaimed the api container holds the first-run
                  # setup token in a local file (never served over HTTP). Print it together
                  # with the claim URL. Prints nothing once the instance is claimed or in
                  # hosted mode, and warns loudly when it cannot check at all.
                  local token=""
                  local site_address=""
                  local api_container=""
                  local claim_url=""

                  if ! command -v docker >/dev/null 2>&1; then
                    warn "docker not found; cannot check whether first-run setup is pending."
                    return 0
                  fi
                  if [[ ! -f "$COMPOSE_FILE" ]]; then
                    warn "Compose file not found at $COMPOSE_FILE; cannot check whether \
                first-run setup is pending. Point PROLIFERATE_COMPOSE_FILE at your \
                docker-compose.production.yml."
                    return 0
                  fi
                  if [[ ! -f "$RUNTIME_ENV_FILE" ]]; then
                    warn "Env file not found at $RUNTIME_ENV_FILE; cannot check whether \
                first-run setup is pending. Run bootstrap.sh first, or point \
                PROLIFERATE_ENV_FILE at the generated .env.runtime."
                    return 0
                  fi

                  api_container="$(docker compose --env-file "$RUNTIME_ENV_FILE" -f "$COMPOSE_FILE" \
                    ps -q api 2>/dev/null || true)"
                  if [[ -z "$api_container" ]]; then
                    warn "No running api container found for $COMPOSE_FILE (env file: \
                $RUNTIME_ENV_FILE); cannot check whether first-run setup is pending. Start \
                the stack with bootstrap.sh, and run this script next to the deploy files it \
                was started from."
                    return 0
                  fi

                  if ! docker compose --env-file "$RUNTIME_ENV_FILE" -f "$COMPOSE_FILE" \
                    exec -T api test -f "$SETUP_TOKEN_PATH" >/dev/null 2>&1; then
                    # No token file: the instance is already claimed (or running hosted mode).
                    return 0
                  fi

                  token="$(docker compose --env-file "$RUNTIME_ENV_FILE" -f "$COMPOSE_FILE" \
                    exec -T api cat "$SETUP_TOKEN_PATH" 2>/dev/null | tr -d '[:space:]' || true)"
                  if [[ -z "$token" ]]; then
                    warn "The setup token file exists at $SETUP_TOKEN_PATH inside the api \
                container but could not be read. Try: docker compose --env-file \
                $RUNTIME_ENV_FILE -f $COMPOSE_FILE exec api cat $SETUP_TOKEN_PATH"
                    return 0
                  fi

                  site_address="$(read_env_value "$RUNTIME_ENV_FILE" SITE_ADDRESS)"
                  if [[ -n "$site_address" ]]; then
                    claim_url="$(site_url_from_address "$site_address" /setup)"
                  else
                    claim_url="https://<your-host>/setup"
                  fi

                  echo ""
                  echo "First-run setup is pending. Claim this instance in a browser:"
                  echo ""
                  echo "  Setup token: $token"
                  echo "  Claim URL:   $claim_url"
                  echo ""
                  echo "The token stays available at $SETUP_TOKEN_PATH inside the api container"
                  echo "until the instance is claimed."
                }

                if [[ -z "$PUBLIC_HEALTHCHECK_URL" ]]; then
                  PUBLIC_HEALTHCHECK_URL="$(read_env_value "$RUNTIME_ENV_FILE" PROLIFERATE_PUBLIC_HEALTHCHECK_URL)"
                fi

                wait_for_url "$HEALTHCHECK_URL"

                if [[ -n "$PUBLIC_HEALTHCHECK_URL" ]]; then
                  wait_for_url "$PUBLIC_HEALTHCHECK_URL"
                fi

                print_setup_instructions

            /opt/proliferate/server/deploy/.env.production.example:
              mode: "000644"
              owner: root
              group: root
              content: |
                # Public API hostname served by Caddy. Point DNS here before first startup so
                # Let's Encrypt can issue a certificate.
                SITE_ADDRESS=api.company.com
                # Optional public endpoint check after local API health passes. The AWS stack
                # sets this automatically so CloudFormation only succeeds once the advertised
                # HTTPS endpoint responds.
                PROLIFERATE_PUBLIC_HEALTHCHECK_URL=

                # Server image source for self-hosted deploys.
                PROLIFERATE_SERVER_IMAGE=ghcr.io/proliferate-ai/proliferate-server
                PROLIFERATE_SERVER_IMAGE_TAG=stable
                PROLIFERATE_HOST_BIN_DIR=/opt/proliferate/bin
                # Optional when pulling from private ECR.
                AWS_REGION=

                # Bundled PostgreSQL credentials and control-plane database URL.
                POSTGRES_DB=proliferate
                POSTGRES_USER=proliferate
                # Leave blank to auto-generate and persist on first bootstrap.
                POSTGRES_PASSWORD=

                # Core control-plane secrets. Leave blank to auto-generate and persist them on first bootstrap.
                JWT_SECRET=
                CLOUD_SECRET_KEY=
                PROLIFERATE_TELEMETRY_MODE=self_managed
                PROLIFERATE_ANONYMOUS_TELEMETRY_ENDPOINT=https://app.proliferate.com/api/v1/telemetry/anonymous
                PROLIFERATE_ANONYMOUS_TELEMETRY_DISABLED=false

                # Background jobs. These are dormant until the worker-tier deployment slice
                # starts Celery worker and Beat services.
                CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
                CELERY_WORKER_QUEUES=periodic.default,default,notifications
                CELERY_TASK_ALWAYS_EAGER=false
                CELERY_TASK_TIME_LIMIT_SECONDS=3600
                CELERY_TASK_SOFT_TIME_LIMIT_SECONDS=3300
                REDBEAT_REDIS_URL=redis://redis:6379/0
                REDBEAT_KEY_PREFIX=redbeat:proliferate:

                # Browser/Tauri origins that may call the control plane.
                CORS_ALLOW_ORIGINS=http://localhost:1420,http://127.0.0.1:1420,http://localhost:3000,http://127.0.0.1:3000,http://tauri.localhost,tauri://localhost

                # Instance admins. Comma-separated emails that always hold at least the admin
                # role in the instance organization. Asserted at account creation and at every
                # sign-in, so adding an email here and restarting the server is the
                # lockout-recovery path. Removing an email never demotes anyone.
                # WARNING: this reinstatement is deliberate lockout-recovery behavior. A listed
                # email that was removed from the instance in-product regains admin access at
                # its next sign-in. To offboard someone, remove them from this list as well as
                # from the instance organization.
                ADMIN_EMAILS=

                # Optional registration domain gate. Comma-separated email domains (for example
                # corp.example.com) that invited users must belong to before they can
                # self-register. Empty means invited emails at any domain may register. This is
                # a gate on top of invitations, never a grant: nobody registers without an
                # invitation, and it assigns no roles.
                ALLOWED_EMAIL_DOMAINS=

                # Desktop GitHub sign-in. Optional: when unset, the desktop app signs in with
                # email and password instead.
                GITHUB_OAUTH_CLIENT_ID=
                GITHUB_OAUTH_CLIENT_SECRET=

                # Cloud MCP.
                CLOUD_MCP_ENABLED=true
                CLOUD_MCP_OAUTH_CALLBACK_BASE_URL=
                CLOUD_MCP_SLACK_ENABLED=false
                CLOUD_MCP_SLACK_CLIENT_ID=
                CLOUD_MCP_SLACK_CLIENT_SECRET=
                CLOUD_MCP_SLACK_TOKEN_ENDPOINT_AUTH_METHOD=client_secret_post

                # Agent LLM gateway (optional LiteLLM add-on). Enabling it is two steps: set
                # AGENT_GATEWAY_ENABLED=true here, then start the profiled services with
                # `docker compose --env-file .env.runtime -f docker-compose.production.yml
                # --profile agent-gateway up -d`. Plain bootstrap.sh/update.sh runs never
                # start litellm/litellm-db. Docs: /docs/deployment/add-ons/model-gateway
                AGENT_GATEWAY_ENABLED=false
                AGENT_GATEWAY_LITELLM_BASE_URL=http://litellm:4000
                # Public URL agents use to reach LiteLLM, for example https://llm.company.com
                AGENT_GATEWAY_LITELLM_PUBLIC_BASE_URL=
                # Generate with `openssl rand -hex 32`. AGENT_GATEWAY_LITELLM_MASTER_KEY must
                # be the exact same value as LITELLM_MASTER_KEY.
                AGENT_GATEWAY_LITELLM_MASTER_KEY=
                LITELLM_MASTER_KEY=
                LITELLM_POSTGRES_PASSWORD=
                AGENT_GATEWAY_DEFAULT_USER_BUDGET_USD=5
                AGENT_GATEWAY_DEFAULT_ORG_BUDGET_USD=0
                # Provider keys the gateway routes centrally live with the LiteLLM service;
                # ANTHROPIC_API_KEY below also serves AI session titles. Add OPENAI_API_KEY /
                # XAI_API_KEY when you route those providers.
                OPENAI_API_KEY=
                XAI_API_KEY=

                # Cloud workspace provider.
                E2B_API_KEY=

                # Optional observability. Self-managed deploys leave vendor Sentry empty in v1.
                SENTRY_DSN=
                SENTRY_ENVIRONMENT=self-hosted
                SENTRY_RELEASE=proliferate-server@self-hosted
                SENTRY_TRACES_SAMPLE_RATE=1.0
                SUPPORT_SLACK_WEBHOOK_URL=
                SUPPORT_REPORT_S3_BUCKET=
                SUPPORT_REPORT_S3_PREFIX=support/reports
                SUPPORT_REPORT_S3_REGION=
                SUPPORT_REPORT_UPLOAD_URL_EXPIRES_SECONDS=900
                SUPPORT_REPORT_DIAGNOSTICS_MAX_BYTES=26214400
                SUPPORT_REPORT_ATTACHMENT_MAX_BYTES=26214400
                SUPPORT_REPORT_TOTAL_ATTACHMENT_MAX_BYTES=104857600
                SIGNUPS_SLACK_WEBHOOK_URL=
                BILLING_POSITIVE_SLACK_WEBHOOK_URL=
                BILLING_NEGATIVE_SLACK_WEBHOOK_URL=
                CUSTOMERIO_SITE_ID=
                CUSTOMERIO_API_KEY=
                CUSTOMERIO_APP_API_KEY=
                # Set to a sender address on a sending domain you own and have verified in
                # Customer.io. The hosted Proliferate workspace uses hello@proliferate.com;
                # self-hosted operators must use their own verified domain.
                CUSTOMERIO_FROM_EMAIL=
                CUSTOMERIO_WELCOME_TRANSACTIONAL_MESSAGE_ID=
                ANTHROPIC_API_KEY=
                AI_MAGIC_SESSION_TITLE_MODEL=claude-haiku-4-5-20251001
                # Required for self-hosted cloud workspace provisioning. Place Linux runtime
                # bundle binaries on the host inside PROLIFERATE_HOST_BIN_DIR, or set
                # RUNTIME_BINARY_URL to a release tarball that contains all three binaries.
                CLOUD_RUNTIME_SOURCE_BINARY_PATH=
                CLOUD_WORKER_SOURCE_BINARY_PATH=
                CLOUD_SUPERVISOR_SOURCE_BINARY_PATH=
                RUNTIME_BINARY_URL=
                # Optional checksum verification for downloaded runtime archives.
                RUNTIME_BINARY_SHA256=
                RUNTIME_BINARY_SHA256_URL=
                # Hosted-product only. Self-managed and local-dev omit runtime Sentry injection.
                CLOUD_RUNTIME_SENTRY_DSN=
                CLOUD_RUNTIME_SENTRY_ENVIRONMENT=
                CLOUD_RUNTIME_SENTRY_RELEASE=
                CLOUD_RUNTIME_SENTRY_TRACES_SAMPLE_RATE=1.0
                CLOUD_TARGET_SENTRY_DSN=
                CLOUD_TARGET_SENTRY_ENVIRONMENT=
                CLOUD_TARGET_SENTRY_RELEASE=
                CLOUD_TARGET_SENTRY_TRACES_SAMPLE_RATE=1.0

            /opt/proliferate/server/deploy/.env.static:
              mode: "000600"
              owner: root
              group: root
              content: !Sub
                - |
                  SITE_ADDRESS=${ResolvedStaticSiteAddress}
                  PROLIFERATE_PUBLIC_HEALTHCHECK_URL=
                  PROLIFERATE_USE_SSLIP_FALLBACK=${UseSslipFallback}
                  PROLIFERATE_TELEMETRY_MODE=self_managed
                  PROLIFERATE_SERVER_IMAGE=${ServerImageRepository}
                  PROLIFERATE_SERVER_IMAGE_TAG=${ReleaseVersion}
                  PROLIFERATE_HOST_BIN_DIR=/opt/proliferate/bin
                  AWS_REGION=${AWS::Region}
                  POSTGRES_DB=proliferate
                  POSTGRES_USER=proliferate
                  POSTGRES_PASSWORD=${PostgresPassword}
                  JWT_SECRET=${JwtSecret}
                  CLOUD_SECRET_KEY=${CloudSecretKey}
                  CORS_ALLOW_ORIGINS=http://localhost:1420,http://127.0.0.1:1420,http://localhost:3000,http://127.0.0.1:3000,http://tauri.localhost,tauri://localhost
                  GITHUB_OAUTH_CLIENT_ID=${GitHubOAuthClientId}
                  GITHUB_OAUTH_CLIENT_SECRET=${GitHubOAuthClientSecret}
                  E2B_API_KEY=${E2BApiKey}
                  E2B_TEMPLATE_NAME=${E2BTemplateName}
                  CLOUD_RUNTIME_SOURCE_BINARY_PATH=/opt/proliferate/bin/anyharness-linux
                  CLOUD_WORKER_SOURCE_BINARY_PATH=/opt/proliferate/bin/proliferate-worker-linux
                  CLOUD_SUPERVISOR_SOURCE_BINARY_PATH=/opt/proliferate/bin/proliferate-supervisor-linux
                  RUNTIME_BINARY_URL=${ResolvedRuntimeBinaryUrl}
                  RUNTIME_BINARY_SHA256_URL=${ResolvedRuntimeBinaryChecksumUrl}
                - ResolvedStaticSiteAddress: !If
                    - UsesSslipFallback
                    - !If
                        - UsesElasticIp
                        - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
                        - ""
                    - !Ref SiteAddress
                  ResolvedRuntimeBinaryUrl: !If
                    - HasRuntimeBinaryUrlOverride
                    - !Ref RuntimeBinaryUrl
                    # The default instance types are all Graviton (arm64), so
                    # the default runtime asset must be the aarch64 build.
                    - !Sub https://github.com/proliferate-ai/proliferate/releases/download/server-v${ReleaseVersion}/anyharness-aarch64-unknown-linux-musl.tar.gz
                  ResolvedRuntimeBinaryChecksumUrl: !If
                    - HasRuntimeBinaryChecksumUrlOverride
                    - !Ref RuntimeBinaryChecksumUrl
                    - !If
                      - HasRuntimeBinaryUrlOverride
                      - ""
                      - !Sub https://github.com/proliferate-ai/proliferate/releases/download/server-v${ReleaseVersion}/self-hosted-assets.SHA256SUMS

            /etc/cfn/cfn-hup.conf:
              mode: "000400"
              owner: root
              group: root
              content: !Sub |
                [main]
                stack=${AWS::StackId}
                region=${AWS::Region}
                interval=5
                verbose=true

            /etc/cfn/hooks.d/proliferate-auto-update.conf:
              mode: "000400"
              owner: root
              group: root
              content: !Sub |
                [cfn-auto-reloader-hook]
                triggers=post.update
                path=Resources.ProliferateInstance.Metadata.AWS::CloudFormation::Init
                action=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource ProliferateInstance --region ${AWS::Region} --configsets update
                runas=root

            /etc/systemd/system/cfn-hup.service:
              mode: "000644"
              owner: root
              group: root
              content: |
                [Unit]
                Description=cfn-hup daemon
                After=network-online.target
                Wants=network-online.target

                [Service]
                Type=simple
                ExecStart=/opt/aws/bin/cfn-hup -v
                Restart=always

                [Install]
                WantedBy=multi-user.target

        deploy:
          commands:
            01-daemon-reload:
              command: systemctl daemon-reload
            02-bootstrap:
              command: cd /opt/proliferate/server/deploy && ./bootstrap.sh
            03-enable-cfn-hup:
              command: systemctl enable --now cfn-hup

        deploy-update:
          commands:
            01-daemon-reload:
              command: systemctl daemon-reload
            02-update:
              command: cd /opt/proliferate/server/deploy && ./update.sh
            03-restart-cfn-hup:
              command: systemctl restart cfn-hup

    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref ProliferateInstanceProfile
      SubnetId: !If
        - UsesExistingNetwork
        - !Ref ExistingSubnetId
        - !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref ProliferateSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-instance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y aws-cfn-bootstrap
          /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource ProliferateInstance --region ${AWS::Region} --configsets bootstrap
          EXIT_CODE=$?
          /opt/aws/bin/cfn-signal -e $EXIT_CODE --stack ${AWS::StackName} --resource ProliferateInstance --region ${AWS::Region}
          exit $EXIT_CODE

  ProliferateDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreatesRoute53Record
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub ${SiteAddress}.
      Type: A
      TTL: "60"
      ResourceRecords:
        - !If
            - UsesElasticIp
            - !Ref ProliferateEip
            - !GetAtt ProliferateInstance.PublicIp

Outputs:
  BaseUrl:
    Description: Public HTTPS URL for the Proliferate control plane.
    Value: !Sub
      - https://${ResolvedSiteAddress}
      - ResolvedSiteAddress: !If
          - UsesSslipFallback
          - !If
              - UsesElasticIp
              - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
              - !Join ["", [!GetAtt ProliferateInstance.PublicIp, ".sslip.io"]]
          - !Ref SiteAddress

  SiteAddress:
    Description: Public hostname configured for the control plane.
    Value: !If
      - UsesSslipFallback
      - !If
          - UsesElasticIp
          - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
          - !Join ["", [!GetAtt ProliferateInstance.PublicIp, ".sslip.io"]]
      - !Ref SiteAddress

  ElasticIp:
    Description: Elastic IP address assigned to the EC2 host.
    Condition: UsesElasticIp
    Value: !Ref ProliferateEip

  PublicIp:
    Description: Public IP address currently serving the control plane.
    Value: !If
      - UsesElasticIp
      - !Ref ProliferateEip
      - !GetAtt ProliferateInstance.PublicIp

  InstanceId:
    Description: EC2 instance id running the control plane.
    Value: !Ref ProliferateInstance

  SsmStartSessionCommand:
    Description: AWS CLI command to open an SSM shell on the host.
    Value: !Sub aws ssm start-session --target ${ProliferateInstance}

  SetupClaimUrl:
    Description: First-run claim page. Open in a browser with the setup token to create the admin account; returns 404 once the instance is claimed.
    Value: !Sub
      - https://${ResolvedSiteAddress}/setup
      - ResolvedSiteAddress: !If
          - UsesSslipFallback
          - !If
              - UsesElasticIp
              - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
              - !Join ["", [!GetAtt ProliferateInstance.PublicIp, ".sslip.io"]]
          - !Ref SiteAddress

  ReadSetupTokenCommand:
    Description: AWS CLI command that prints the one-time setup token (available only while the instance is unclaimed). The token also appears in /var/log/cfn-init-cmd.log on the host.
    Value: !Sub aws ssm start-session --target ${ProliferateInstance} --document-name AWS-StartInteractiveCommand --parameters '{"command":["sudo docker exec $(sudo docker ps -qf name=api) cat /var/lib/proliferate/setup/setup-token"]}'
