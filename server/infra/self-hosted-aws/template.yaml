AWSTemplateFormatVersion: "2010-09-09"
Description: Proliferate self-hosted control plane on a single EC2 host.

Parameters:
  ReleaseVersion:
    Type: String
    Description: Unprefixed release version used for the GHCR image tag; the default runtime asset is downloaded from server-v<ReleaseVersion>.

  ServerImageRepository:
    Type: String
    Default: ghcr.io/proliferate-ai/proliferate-server
    Description: Container image repository for the Proliferate API.

  RuntimeBinaryUrl:
    Type: String
    Default: ""
    Description: Optional override for the runtime binary tarball URL. Leave blank to use the server release asset.

  RuntimeBinaryChecksumUrl:
    Type: String
    Default: ""
    Description: Optional override for a SHA256SUMS file used to verify the runtime tarball. Leave blank to use the matching server release asset checksum file when RuntimeBinaryUrl is also blank.

  DeployBundleUrl:
    Type: String
    Default: ""
    Description: Optional override for the proliferate-deploy.tar.gz bundle URL. Leave blank to use the server release asset for ReleaseVersion.

  DeployBundleChecksumUrl:
    Type: String
    Default: ""
    Description: Optional override for a SHA256SUMS file used to verify the deploy bundle. Leave blank to use the matching server release asset checksum file when DeployBundleUrl is also blank.

  SiteAddress:
    Type: String
    Default: ""
    Description: Public hostname for the control plane. Required unless UseSslipFallback is true.

  UseSslipFallback:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Use an sslip.io hostname derived from the Elastic IP instead of a custom domain.

  CreateRoute53Record:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Create a Route53 A record for SiteAddress.

  HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 hosted zone id for SiteAddress when CreateRoute53Record is true.

  ExistingVpcId:
    Type: String
    Default: ""
    Description: Optional existing VPC id to reuse instead of creating a dedicated VPC.

  ExistingSubnetId:
    Type: String
    Default: ""
    Description: Optional existing public subnet id to reuse instead of creating a dedicated subnet.

  AllocateElasticIp:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Allocate and attach a dedicated Elastic IP. Set false to rely on the instance public IP.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
    Description: EC2 instance type for the self-hosted control plane.

  PostgresPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional password for the bundled Postgres container. Leave blank to auto-generate and persist one on first bootstrap.

  JwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional JWT signing secret for the control plane. Leave blank to auto-generate and persist one on first bootstrap.

  CloudSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional secret key used for cloud auth/session signing. Leave blank to auto-generate and persist one on first bootstrap.

  GitHubOAuthClientId:
    Type: String
    Default: ""
    Description: GitHub OAuth client id for the shared sign-in callback.

  GitHubOAuthClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: GitHub OAuth client secret for the shared sign-in callback.

  E2BApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: E2B API key for managed cloud sandboxes.

  E2BTemplateName:
    Type: String
    Default: ""
    Description: E2B template ref, for example team-slug/proliferate-runtime-cloud:production.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Amazon Linux 2023 arm64 AMI id.

Rules:
  SiteAddressRequiredWithoutSslip:
    RuleCondition: !Equals [!Ref UseSslipFallback, "false"]
    Assertions:
      - Assert: !Not [!Equals [!Ref SiteAddress, ""]]
        AssertDescription: SiteAddress is required unless UseSslipFallback is true.

  HostedZoneRequiredWhenRoute53Enabled:
    RuleCondition: !Equals [!Ref CreateRoute53Record, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref HostedZoneId, ""]]
        AssertDescription: HostedZoneId is required when CreateRoute53Record is true.
      - Assert: !Equals [!Ref UseSslipFallback, "false"]
        AssertDescription: CreateRoute53Record cannot be used with UseSslipFallback.

  ExistingVpcRequiresSubnet:
    RuleCondition: !Not [!Equals [!Ref ExistingVpcId, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingSubnetId, ""]]
        AssertDescription: ExistingSubnetId is required when ExistingVpcId is provided.

  ExistingSubnetRequiresVpc:
    RuleCondition: !Not [!Equals [!Ref ExistingSubnetId, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingVpcId, ""]]
        AssertDescription: ExistingVpcId is required when ExistingSubnetId is provided.

  # Cloud sandboxes are an optional add-on: the base install must launch with
  # no E2B configuration at all. Only enforce that the two settings arrive as
  # a pair when the operator opts in.
  E2BTemplateRequiredWithApiKey:
    RuleCondition: !Not [!Equals [!Ref E2BApiKey, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref E2BTemplateName, ""]]
        AssertDescription: E2BTemplateName is required when E2BApiKey is set.

  E2BApiKeyRequiredWithTemplate:
    RuleCondition: !Not [!Equals [!Ref E2BTemplateName, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref E2BApiKey, ""]]
        AssertDescription: E2BApiKey is required when E2BTemplateName is set.

Conditions:
  UsesSslipFallback: !Equals [!Ref UseSslipFallback, "true"]
  HasExistingVpcId: !Not [!Equals [!Ref ExistingVpcId, ""]]
  HasExistingSubnetId: !Not [!Equals [!Ref ExistingSubnetId, ""]]
  UsesExistingNetwork: !And
    - !Condition HasExistingVpcId
    - !Condition HasExistingSubnetId
  CreatesVpcResources: !Not [!Condition UsesExistingNetwork]
  UsesElasticIp: !Equals [!Ref AllocateElasticIp, "true"]
  CreatesRoute53Record: !And
    - !Equals [!Ref CreateRoute53Record, "true"]
    - !Not [!Equals [!Ref HostedZoneId, ""]]
    - !Not [!Condition UsesSslipFallback]
  HasRuntimeBinaryUrlOverride: !Not [!Equals [!Ref RuntimeBinaryUrl, ""]]
  HasRuntimeBinaryChecksumUrlOverride: !Not [!Equals [!Ref RuntimeBinaryChecksumUrl, ""]]
  HasDeployBundleUrlOverride: !Not [!Equals [!Ref DeployBundleUrl, ""]]
  HasDeployBundleChecksumUrlOverride: !Not [!Equals [!Ref DeployBundleChecksumUrl, ""]]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Condition: CreatesVpcResources
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreatesVpcResources
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreatesVpcResources
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreatesVpcResources
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.42.0.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreatesVpcResources
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Condition: CreatesVpcResources
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreatesVpcResources
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  ProliferateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ingress for the Proliferate control plane.
      VpcId: !If
        - UsesExistingNetwork
        - !Ref ExistingVpcId
        - !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-sg

  ProliferateEip:
    Type: AWS::EC2::EIP
    Condition: UsesElasticIp
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-eip

  ProliferateEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: UsesElasticIp
    Properties:
      AllocationId: !GetAtt ProliferateEip.AllocationId
      InstanceId: !Ref ProliferateInstance

  ProliferateIamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: CloudFormationBootstrapAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:SignalResource
                Resource: "*"

  ProliferateInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref ProliferateIamRole]

  ProliferateInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          bootstrap:
            - install
            - fetch_bundle
            - write_files
            - deploy
          update:
            - fetch_bundle
            - write_files
            - deploy-update

        install:
          commands:
            01-install-base:
              command: |
                dnf install -y docker awscli aws-cfn-bootstrap tar openssl
            02-install-compose-plugin:
              command: |
                if ! docker compose version >/dev/null 2>&1; then
                  dnf install -y docker-compose-plugin || true
                fi
                if ! docker compose version >/dev/null 2>&1; then
                  arch="$(uname -m)"
                  case "$arch" in
                    aarch64|arm64)
                      compose_arch="aarch64"
                      ;;
                    x86_64|amd64)
                      compose_arch="x86_64"
                      ;;
                    *)
                      echo "Unsupported architecture for Docker Compose plugin: $arch" >&2
                      exit 1
                      ;;
                  esac
                  mkdir -p /usr/local/lib/docker/cli-plugins
                  curl -fsSL "https://github.com/docker/compose/releases/download/v2.39.4/docker-compose-linux-${compose_arch}" \
                    -o /usr/local/lib/docker/cli-plugins/docker-compose
                  chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                fi
                docker compose version
            03-enable-docker:
              command: systemctl enable --now docker
            04-create-directories:
              command: mkdir -p /opt/proliferate/server/deploy /opt/proliferate/bin /opt/proliferate/secrets/github-app /etc/cfn/hooks.d

        fetch_bundle:
          commands:
            01-fetch-verify-extract:
              command: !Sub
                - |
                  set -euo pipefail
                  # Fetch the versioned deploy bundle (the same server/deploy/**
                  # scripts + compose an operator downloads), verify it against
                  # the published checksums, then refresh the deploy dir. This is
                  # the one owned deployment layer: the stack no longer embeds
                  # duplicate copies that could drift from server/deploy/**.
                  # Operator config/data (.env.static/.env.local/.env.generated/
                  # .env.runtime) is written/managed outside the bundle and is
                  # never present in it, so this cp never clobbers it.
                  tmp="$(mktemp -d)"
                  trap 'rm -rf "$tmp"' EXIT
                  curl -fsSL "${ResolvedDeployBundleUrl}" -o "$tmp/proliferate-deploy.tar.gz"
                  if [ -n "${ResolvedDeployBundleChecksumUrl}" ]; then
                    curl -fsSL "${ResolvedDeployBundleChecksumUrl}" -o "$tmp/self-hosted-assets.SHA256SUMS"
                    ( cd "$tmp" && sha256sum -c --ignore-missing self-hosted-assets.SHA256SUMS )
                  fi
                  # --strip-components=1 drops the proliferate-deploy/ prefix so
                  # files land directly in the deploy dir with their tar modes
                  # (executable scripts stay executable). The bundle carries no
                  # .env.* files, so operator config is untouched.
                  tar xzf "$tmp/proliferate-deploy.tar.gz" \
                    -C /opt/proliferate/server/deploy --strip-components=1
                - ResolvedDeployBundleUrl: !If
                    - HasDeployBundleUrlOverride
                    - !Ref DeployBundleUrl
                    - !Sub https://github.com/proliferate-ai/proliferate/releases/download/server-v${ReleaseVersion}/proliferate-deploy.tar.gz
                  ResolvedDeployBundleChecksumUrl: !If
                    - HasDeployBundleChecksumUrlOverride
                    - !Ref DeployBundleChecksumUrl
                    - !If
                      - HasDeployBundleUrlOverride
                      - ""
                      - !Sub https://github.com/proliferate-ai/proliferate/releases/download/server-v${ReleaseVersion}/self-hosted-assets.SHA256SUMS

        write_files:
          files:
            /opt/proliferate/server/deploy/.env.static:
              mode: "000600"
              owner: root
              group: root
              content: !Sub
                - |
                  SITE_ADDRESS=${ResolvedStaticSiteAddress}
                  PROLIFERATE_PUBLIC_HEALTHCHECK_URL=
                  PROLIFERATE_USE_SSLIP_FALLBACK=${UseSslipFallback}
                  PROLIFERATE_TELEMETRY_MODE=self_managed
                  PROLIFERATE_SERVER_IMAGE=${ServerImageRepository}
                  PROLIFERATE_SERVER_IMAGE_TAG=${ReleaseVersion}
                  PROLIFERATE_HOST_BIN_DIR=/opt/proliferate/bin
                  AWS_REGION=${AWS::Region}
                  POSTGRES_DB=proliferate
                  POSTGRES_USER=proliferate
                  POSTGRES_PASSWORD=${PostgresPassword}
                  JWT_SECRET=${JwtSecret}
                  CLOUD_SECRET_KEY=${CloudSecretKey}
                  CORS_ALLOW_ORIGINS=http://localhost:1420,http://127.0.0.1:1420,http://localhost:3000,http://127.0.0.1:3000,http://tauri.localhost,tauri://localhost
                  GITHUB_OAUTH_CLIENT_ID=${GitHubOAuthClientId}
                  GITHUB_OAUTH_CLIENT_SECRET=${GitHubOAuthClientSecret}
                  E2B_API_KEY=${E2BApiKey}
                  E2B_TEMPLATE_NAME=${E2BTemplateName}
                  CLOUD_RUNTIME_SOURCE_BINARY_PATH=/opt/proliferate/bin/anyharness-linux
                  CLOUD_WORKER_SOURCE_BINARY_PATH=/opt/proliferate/bin/proliferate-worker-linux
                  CLOUD_SUPERVISOR_SOURCE_BINARY_PATH=/opt/proliferate/bin/proliferate-supervisor-linux
                  RUNTIME_BINARY_URL=${ResolvedRuntimeBinaryUrl}
                  RUNTIME_BINARY_SHA256_URL=${ResolvedRuntimeBinaryChecksumUrl}
                - ResolvedStaticSiteAddress: !If
                    - UsesSslipFallback
                    - !If
                        - UsesElasticIp
                        - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
                        - ""
                    - !Ref SiteAddress
                  ResolvedRuntimeBinaryUrl: !If
                    - HasRuntimeBinaryUrlOverride
                    - !Ref RuntimeBinaryUrl
                    # The default instance types are all Graviton (arm64), so
                    # the default runtime asset must be the aarch64 build.
                    - !Sub https://github.com/proliferate-ai/proliferate/releases/download/server-v${ReleaseVersion}/anyharness-aarch64-unknown-linux-musl.tar.gz
                  ResolvedRuntimeBinaryChecksumUrl: !If
                    - HasRuntimeBinaryChecksumUrlOverride
                    - !Ref RuntimeBinaryChecksumUrl
                    - !If
                      - HasRuntimeBinaryUrlOverride
                      - ""
                      - !Sub https://github.com/proliferate-ai/proliferate/releases/download/server-v${ReleaseVersion}/self-hosted-assets.SHA256SUMS

            /etc/cfn/cfn-hup.conf:
              mode: "000400"
              owner: root
              group: root
              content: !Sub |
                [main]
                stack=${AWS::StackId}
                region=${AWS::Region}
                interval=5
                verbose=true

            /etc/cfn/hooks.d/proliferate-auto-update.conf:
              mode: "000400"
              owner: root
              group: root
              content: !Sub |
                [cfn-auto-reloader-hook]
                triggers=post.update
                path=Resources.ProliferateInstance.Metadata.AWS::CloudFormation::Init
                action=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource ProliferateInstance --region ${AWS::Region} --configsets update
                runas=root

            /etc/systemd/system/cfn-hup.service:
              mode: "000644"
              owner: root
              group: root
              content: |
                [Unit]
                Description=cfn-hup daemon
                After=network-online.target
                Wants=network-online.target

                [Service]
                Type=simple
                ExecStart=/opt/aws/bin/cfn-hup -v
                Restart=always

                [Install]
                WantedBy=multi-user.target

        deploy:
          commands:
            01-daemon-reload:
              command: systemctl daemon-reload
            02-bootstrap:
              command: cd /opt/proliferate/server/deploy && ./bootstrap.sh
            03-enable-cfn-hup:
              command: systemctl enable --now cfn-hup

        deploy-update:
          commands:
            01-daemon-reload:
              command: systemctl daemon-reload
            02-update:
              command: cd /opt/proliferate/server/deploy && ./update.sh
            03-restart-cfn-hup:
              command: systemctl restart cfn-hup

    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref ProliferateInstanceProfile
      SubnetId: !If
        - UsesExistingNetwork
        - !Ref ExistingSubnetId
        - !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref ProliferateSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-instance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y aws-cfn-bootstrap
          /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource ProliferateInstance --region ${AWS::Region} --configsets bootstrap
          EXIT_CODE=$?
          /opt/aws/bin/cfn-signal -e $EXIT_CODE --stack ${AWS::StackName} --resource ProliferateInstance --region ${AWS::Region}
          exit $EXIT_CODE

  ProliferateDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreatesRoute53Record
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub ${SiteAddress}.
      Type: A
      TTL: "60"
      ResourceRecords:
        - !If
            - UsesElasticIp
            - !Ref ProliferateEip
            - !GetAtt ProliferateInstance.PublicIp

Outputs:
  BaseUrl:
    Description: Public HTTPS URL for the Proliferate control plane.
    Value: !Sub
      - https://${ResolvedSiteAddress}
      - ResolvedSiteAddress: !If
          - UsesSslipFallback
          - !If
              - UsesElasticIp
              - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
              - !Join ["", [!GetAtt ProliferateInstance.PublicIp, ".sslip.io"]]
          - !Ref SiteAddress

  SiteAddress:
    Description: Public hostname configured for the control plane.
    Value: !If
      - UsesSslipFallback
      - !If
          - UsesElasticIp
          - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
          - !Join ["", [!GetAtt ProliferateInstance.PublicIp, ".sslip.io"]]
      - !Ref SiteAddress

  ElasticIp:
    Description: Elastic IP address assigned to the EC2 host.
    Condition: UsesElasticIp
    Value: !Ref ProliferateEip

  PublicIp:
    Description: Public IP address currently serving the control plane.
    Value: !If
      - UsesElasticIp
      - !Ref ProliferateEip
      - !GetAtt ProliferateInstance.PublicIp

  InstanceId:
    Description: EC2 instance id running the control plane.
    Value: !Ref ProliferateInstance

  SsmStartSessionCommand:
    Description: AWS CLI command to open an SSM shell on the host.
    Value: !Sub aws ssm start-session --target ${ProliferateInstance}

  SetupClaimUrl:
    Description: First-run claim page. Open in a browser with the setup token to create the admin account; returns 404 once the instance is claimed.
    Value: !Sub
      - https://${ResolvedSiteAddress}/setup
      - ResolvedSiteAddress: !If
          - UsesSslipFallback
          - !If
              - UsesElasticIp
              - !Join ["", [!Ref ProliferateEip, ".sslip.io"]]
              - !Join ["", [!GetAtt ProliferateInstance.PublicIp, ".sslip.io"]]
          - !Ref SiteAddress

  ReadSetupTokenCommand:
    Description: AWS CLI command that prints the one-time setup token (available only while the instance is unclaimed). The token also appears in /var/log/cfn-init-cmd.log on the host.
    Value: !Sub aws ssm start-session --target ${ProliferateInstance} --document-name AWS-StartInteractiveCommand --parameters '{"command":["sudo docker exec $(sudo docker ps -qf name=api) cat /var/lib/proliferate/setup/setup-token"]}'
